name: "Build VIP Scanner Z+2"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Step 1: Checkout Repository"
        uses: actions/checkout@v4

      - name: "Step 2: Set up Java 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: "Step 3: Create App Structure"
        run: |
          mkdir -p app/src/main/java/com/zatomic/scanner
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26

      - name: "Step 4: Master Gradle Settings"
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = "VIPScannerZ"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          plugins { id 'com.android.application' version '8.3.0' apply false; id 'org.jetbrains.kotlin.android' version '1.9.0' apply false }
          EOF

          cat << 'EOF' > gradle.properties
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
          EOF
          
          gradle wrapper --gradle-version 8.4 --distribution-type bin

      - name: "Step 5: Add VIP Logo (Shield Icon)"
        run: |
          cat << 'EOF' > app/src/main/res/drawable/ic_launcher_foreground.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#1E88E5" android:pathData="M54,12 L20,26 V50 C20,74 34,96 54,104 C74,96 88,74 88,50 V26 Z"/>
              <path android:fillColor="#FFD700" android:pathData="M44,68 L32,56 L38,50 L44,56 L70,30 L76,36 Z"/>
          </vector>
          EOF
          cat << 'EOF' > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          <?xml version="1.0" encoding="utf-8"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@android:color/black"/><foreground android:drawable="@drawable/ic_launcher_foreground"/></adaptive-icon>
          EOF
          cat << 'EOF' > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          <?xml version="1.0" encoding="utf-8"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@android:color/black"/><foreground android:drawable="@drawable/ic_launcher_foreground"/></adaptive-icon>
          EOF

      - name: "Step 6: Android App Config (Coroutines & DB Fixed)"
        run: |
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android'; id 'kotlin-kapt' }
          android {
              namespace 'com.zatomic.scanner'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.zatomic.scanner'
                  minSdk 26
                  targetSdk 34
                  versionCode 7
                  versionName "7.0-DeepScan-Fixed"
                  externalNativeBuild { cmake { cppFlags "" } }
              }
              externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt"; version "3.22.1" } }
              buildTypes { release { minifyEnabled true; proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro' } }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
              
              // Coroutines
              implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
              
              // Room DB
              implementation "androidx.room:room-runtime:2.6.1"
              kapt "androidx.room:room-compiler:2.6.1"
          }
          EOF

      - name: "Step 7: C++ Engine Config"
        run: |
          cat << 'EOF' > app/src/main/cpp/CMakeLists.txt
          cmake_minimum_required(VERSION 3.22.1)
          project("vipscanner")
          add_library(vipscanner SHARED native-lib.cpp)
          find_library(log-lib log)
          target_link_libraries(vipscanner ${log-lib})
          EOF

      - name: "Step 8: C++ HYBRID ENGINE (200 Movie Sites)"
        run: |
          cat << 'EOF' > app/src/main/cpp/native-lib.cpp
          #include <jni.h>
          #include <string>
          #include <vector>

          extern "C" JNIEXPORT jobjectArray JNICALL
          Java_com_zatomic_scanner_MainActivity_scanForMovieSites(JNIEnv* env, jobject /* this */, jstring browserName) {
              std::vector<std::string> baseNames = {
                  "filmyzilla", "khatrimaza", "tamilrockers", "moviesflix", "ibomma", 
                  "vegamovies", "sdmoviespoint", "pagalmovies", "mp4moviez", "9xmovies", 
                  "bolly4u", "moviesda", "tamilyogi", "isaimini", "movierulz", 
                  "jalshamoviez", "extramovies", "hindilinks4u", "yts", "1337x", 
                  "thepiratebay", "rarbg", "einthusan", "filmywap", "katmoviehd", 
                  "worldfree4u", "skymovieshd", "hdhub4u", "afilmywap", "movieswood",
                  "downloadhub", "bolly2tolly", "todaypk", "watchonlinemovies", "foumovies",
                  "moviecounter", "yomovies", "123movies", "putlocker", "fmovies"
              };
              std::vector<std::string> domains = {".to", ".in", ".org", ".cc", ".net"};
              std::vector<std::string> finalSites;
              
              for(const auto& domain : domains) {
                  for(const auto& name : baseNames) {
                      finalSites.push_back(name + domain);
                  }
              }
              
              jclass stringClass = env->FindClass("java/lang/String");
              jobjectArray stringArray = env->NewObjectArray(finalSites.size(), stringClass, nullptr);
              for (size_t i = 0; i < finalSites.size(); ++i) {
                  env->SetObjectArrayElement(stringArray, i, env->NewStringUTF(finalSites[i].c_str()));
              }
              return stringArray;
          }
          EOF

      - name: "Step 9: UI Layouts (Bug Fixed - XML Escaping)"
        run: |
          cat << 'EOF' > app/src/main/res/layout/activity_main.xml
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#F5F5F5" android:padding="12dp">
              <LinearLayout android:id="@+id/topBar" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:weightSum="2" android:gravity="center">
                  <Button android:id="@+id/btnAppScan" android:layout_width="0dp" android:layout_weight="1" android:layout_height="wrap_content" android:text="APP SCAN" android:backgroundTint="#4CAF50" android:textColor="#FFFFFF" android:layout_marginEnd="5dp" android:textStyle="bold"/>
                  <Button android:id="@+id/btnSiteScan" android:layout_width="0dp" android:layout_weight="1" android:layout_height="wrap_content" android:text="SITE SCAN" android:backgroundTint="#F44336" android:textColor="#FFFFFF" android:layout_marginStart="5dp" android:textStyle="bold"/>
              </LinearLayout>
              <TextView android:id="@+id/tvHeader" android:layout_width="match_parent" android:layout_height="wrap_content" android:layout_below="@id/topBar" android:layout_marginTop="10dp" android:text="History Log (Max 50MB)" android:textSize="18sp" android:textColor="#333333" android:textStyle="bold" android:gravity="center"/>
              <androidx.recyclerview.widget.RecyclerView android:id="@+id/recyclerView" android:layout_width="match_parent" android:layout_height="match_parent" android:layout_below="@id/tvHeader" android:layout_marginTop="10dp"/>
          </RelativeLayout>
          EOF

          cat << 'EOF' > app/src/main/res/layout/item_site_row.xml
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:padding="14dp" android:layout_marginBottom="4dp" android:background="#FFFFFF" android:elevation="2dp">
              <TextView android:id="@+id/tvSerial" android:layout_width="40dp" android:layout_height="wrap_content" android:textColor="#555555" android:textStyle="bold"/>
              <TextView android:id="@+id/tvName" android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:textColor="#1E88E5" android:textStyle="bold" android:textSize="16sp"/>
              <TextView android:id="@+id/tvStatus" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Copied" android:textColor="#F44336" android:visibility="invisible"/>
          </LinearLayout>
          EOF

      - name: "Step 10: Kotlin Code (Advanced Permissions & DB)"
        run: |
          cat << 'EOF' > app/src/main/java/com/zatomic/scanner/HistoryDB.kt
          package com.zatomic.scanner
          import androidx.room.*
          import android.content.Context

          @Entity(tableName = "history_table")
          data class HistoryItem(@PrimaryKey(autoGenerate = true) val id: Int = 0, val name: String, val type: String)

          @Dao
          interface HistoryDao {
              @Insert(onConflict = OnConflictStrategy.REPLACE)
              fun insert(item: HistoryItem)
              @Query("SELECT * FROM history_table ORDER BY id DESC")
              fun getAll(): List<HistoryItem>
              @Query("DELETE FROM history_table")
              fun deleteAll()
          }

          @Database(entities = [HistoryItem::class], version = 1, exportSchema = false)
          abstract class AppDatabase : RoomDatabase() {
              abstract fun historyDao(): HistoryDao
              companion object {
                  @Volatile private var INSTANCE: AppDatabase? = null
                  fun getDatabase(context: Context): AppDatabase {
                      return INSTANCE ?: synchronized(this) {
                          val instance = Room.databaseBuilder(context.applicationContext, AppDatabase::class.java, "scanner_database").build()
                          INSTANCE = instance
                          instance
                      }
                  }
              }
          }
          EOF

          cat << 'EOF' > app/src/main/java/com/zatomic/scanner/SiteAdapter.kt
          package com.zatomic.scanner
          import android.graphics.Color
          import android.view.LayoutInflater
          import android.view.View
          import android.view.ViewGroup
          import android.widget.TextView
          import androidx.recyclerview.widget.RecyclerView

          class SiteAdapter(private val siteList: List<HistoryItem>, private val onItemClick: (String) -> Unit) : RecyclerView.Adapter<SiteAdapter.ViewHolder>() {
              class ViewHolder(view: View) : RecyclerView.ViewHolder(view) {
                  val tvSerial: TextView = view.findViewById(R.id.tvSerial)
                  val tvName: TextView = view.findViewById(R.id.tvName)
                  val tvStatus: TextView = view.findViewById(R.id.tvStatus)
              }
              override fun onCreateViewHolder(parent: ViewGroup, viewType: Int): ViewHolder {
                  val view = LayoutInflater.from(parent.context).inflate(R.layout.item_site_row, parent, false)
                  return ViewHolder(view)
              }
              override fun onBindViewHolder(holder: ViewHolder, position: Int) {
                  val item = siteList[position]
                  holder.tvSerial.text = "${position + 1}."
                  holder.tvName.text = item.name
                  if(item.type == "APP") { holder.tvName.setTextColor(Color.parseColor("#4CAF50")) } 
                  else { holder.tvName.setTextColor(Color.parseColor("#1E88E5")) }
                  holder.itemView.setOnClickListener { 
                      holder.tvStatus.visibility = View.VISIBLE
                      onItemClick(item.name) 
                  }
              }
              override fun getItemCount() = siteList.size
          }
          EOF

          cat << 'EOF' > app/src/main/java/com/zatomic/scanner/MainActivity.kt
          package com.zatomic.scanner

          import android.Manifest
          import android.content.ClipData
          import android.content.ClipboardManager
          import android.content.Context
          import android.content.Intent
          import android.content.pm.PackageManager
          import android.os.Build
          import android.os.Bundle
          import android.widget.Button
          import android.widget.TextView
          import android.widget.Toast
          import androidx.appcompat.app.AlertDialog
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.app.ActivityCompat
          import androidx.core.content.ContextCompat
          import androidx.recyclerview.widget.LinearLayoutManager
          import androidx.recyclerview.widget.RecyclerView
          import kotlinx.coroutines.*
          import java.io.File

          class MainActivity : AppCompatActivity() {
              init { System.loadLibrary("vipscanner") }
              private external fun scanForMovieSites(browserName: String): Array<String>

              private lateinit var btnAppScan: Button
              private lateinit var btnSiteScan: Button
              private lateinit var tvHeader: TextView
              private lateinit var recyclerView: RecyclerView
              private lateinit var database: AppDatabase

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)

                  database = AppDatabase.getDatabase(this)
                  btnAppScan = findViewById(R.id.btnAppScan)
                  btnSiteScan = findViewById(R.id.btnSiteScan)
                  tvHeader = findViewById(R.id.tvHeader)
                  recyclerView = findViewById(R.id.recyclerView)
                  recyclerView.layoutManager = LinearLayoutManager(this)

                  requestAppPermissions()

                  checkDatabaseSizeAndClean()
                  loadHistory()

                  btnAppScan.setOnClickListener { 
                      tvHeader.text = "Scanning Installed Apps..."
                      scanInstalledBrowsers() 
                  }
                  btnSiteScan.setOnClickListener { 
                      tvHeader.text = "Choose App to Scan Sites"
                      showBrowserSelectionForSiteScan() 
                  }
              }

              private fun requestAppPermissions() {
                  val permissionsNeeded = mutableListOf<String>()
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      if (ContextCompat.checkSelfPermission(this, Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) {
                          permissionsNeeded.add(Manifest.permission.POST_NOTIFICATIONS)
                      }
                  }
                  if (permissionsNeeded.isNotEmpty()) {
                      ActivityCompat.requestPermissions(this, permissionsNeeded.toTypedArray(), 101)
                  }
              }

              override fun onRequestPermissionsResult(requestCode: Int, permissions: Array<out String>, grantResults: IntArray) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults)
                  if (requestCode == 101) {
                      if (grantResults.isNotEmpty() && grantResults[0] == PackageManager.PERMISSION_GRANTED) {
                          Toast.makeText(this, "Permission Allowed! Setup Complete.", Toast.LENGTH_SHORT).show()
                      } else {
                          Toast.makeText(this, "Permission Denied. Features may be limited.", Toast.LENGTH_LONG).show()
                      }
                  }
              }

              private fun loadHistory() {
                  CoroutineScope(Dispatchers.IO).launch {
                      val historyList = database.historyDao().getAll()
                      withContext(Dispatchers.Main) {
                          if (historyList.isEmpty()) {
                              tvHeader.text = "No History Found. Please Scan."
                          } else {
                              tvHeader.text = "History Log (Max 50MB Mode)"
                              recyclerView.adapter = SiteAdapter(historyList) { name -> copyToClipboard(name) }
                          }
                      }
                  }
              }

              private fun checkDatabaseSizeAndClean() {
                  CoroutineScope(Dispatchers.IO).launch {
                      val dbFile = getDatabasePath("scanner_database")
                      if (dbFile.exists()) {
                          val sizeInMB = dbFile.length() / (1024 * 1024)
                          if (sizeInMB >= 50) {
                              database.historyDao().deleteAll()
                              withContext(Dispatchers.Main) {
                                  Toast.makeText(this@MainActivity, "Auto-Cleaned: DB exceeded 50MB", Toast.LENGTH_LONG).show()
                                  loadHistory()
                              }
                          }
                      }
                  }
              }

              private fun scanInstalledBrowsers() {
                  val browserIntent = Intent(Intent.ACTION_VIEW, android.net.Uri.parse("http://www.google.com"))
                  val resolveInfoList = if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      packageManager.queryIntentActivities(browserIntent, PackageManager.ResolveInfoFlags.of(PackageManager.MATCH_DEFAULT_ONLY.toLong()))
                  } else {
                      packageManager.queryIntentActivities(browserIntent, PackageManager.MATCH_DEFAULT_ONLY)
                  }
                  val browserNames = resolveInfoList.map { it.loadLabel(packageManager).toString() }.distinct()
                  
                  CoroutineScope(Dispatchers.IO).launch {
                      browserNames.forEach { database.historyDao().insert(HistoryItem(name = it, type = "APP")) }
                      loadHistory()
                  }
              }

              private fun showBrowserSelectionForSiteScan() {
                  val browserIntent = Intent(Intent.ACTION_VIEW, android.net.Uri.parse("http://www.google.com"))
                  val resolveInfoList = if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      packageManager.queryIntentActivities(browserIntent, PackageManager.ResolveInfoFlags.of(PackageManager.MATCH_DEFAULT_ONLY.toLong()))
                  } else {
                      packageManager.queryIntentActivities(browserIntent, PackageManager.MATCH_DEFAULT_ONLY)
                  }
                  val browserNames = resolveInfoList.map { it.loadLabel(packageManager).toString() }.distinct()

                  AlertDialog.Builder(this)
                      .setTitle("Choose App to Start Search")
                      .setItems(browserNames.toTypedArray()) { _, which ->
                          startSiteScanning(browserNames[which])
                      }.show()
              }

              private fun startSiteScanning(browserName: String) {
                  Toast.makeText(this, "Searching 200 sites via $browserName...", Toast.LENGTH_LONG).show()
                  val resultSites = scanForMovieSites(browserName)
                  CoroutineScope(Dispatchers.IO).launch {
                      resultSites.forEach { database.historyDao().insert(HistoryItem(name = it, type = "SITE")) }
                      loadHistory()
                  }
              }

              private fun copyToClipboard(siteName: String) {
                  val clipboard = getSystemService(Context.CLIPBOARD_SERVICE) as ClipboardManager
                  val clip = ClipData.newPlainText("Piracy Site", siteName)
                  clipboard.setPrimaryClip(clip)
                  Toast.makeText(this, "Copied securely! Link won't open.", Toast.LENGTH_SHORT).show()
              }
          }
          EOF

      - name: "Step 11: Official Android Manifest"
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <application android:label="Z+2 Scanner" android:icon="@mipmap/ic_launcher" android:roundIcon="@mipmap/ic_launcher_round" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: "Step 12: Build Final VIP APK"
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug
          
      - name: "Step 13: Upload Final APK"
        uses: actions/upload-artifact@v4
        with:
          name: "Z+2-Scanner-App"
          path: app/build/outputs/apk/debug/app-debug.apk
