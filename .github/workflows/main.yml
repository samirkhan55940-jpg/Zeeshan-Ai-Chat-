name: Build Zeeshan Ai Chat (Asli Llama Engine Fix)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Create App Structure & Download Assets
        run: |
          mkdir -p app/src/main/java/com/zeeshan/ai
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/cpp

          # 1. Download Alibaba AI Model
          echo "Downloading 700MB Z+2 Model..."
          wget -q --show-progress https://huggingface.co/Qwen/Qwen1.5-0.5B-Chat-GGUF/resolve/main/qwen1_5-0_5b-chat-q4_k_m.gguf -O app/src/main/assets/z2_model.gguf

          # 2. Asli llama.cpp engine GitHub se Download (Clone)
          echo "Downloading llama.cpp from GitHub..."
          git clone --depth 1 https://github.com/ggerganov/llama.cpp app/src/main/cpp/llama

          # Gradle Memory Fix
          echo "android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx6g -Dfile.encoding=UTF-8" > gradle.properties

          echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          include ':app'" > settings.gradle

          cat << 'EOF' > build.gradle
          plugins { id 'com.android.application' version '8.2.0' apply false }
          EOF

          # ---------------------------------------------------------
          # STEP 3: CMake Setup (Naya Rasta Update Kiya)
          # ---------------------------------------------------------
          cat << 'EOF' > app/src/main/cpp/CMakeLists.txt
          cmake_minimum_required(VERSION 3.22.1)
          project("z2_engine")

          set(BUILD_SHARED_LIBS OFF CACHE BOOL "" FORCE)
          set(LLAMA_BUILD_TESTS OFF CACHE BOOL "" FORCE)
          set(LLAMA_BUILD_EXAMPLES OFF CACHE BOOL "" FORCE)
          
          add_subdirectory(llama)

          add_library(${CMAKE_PROJECT_NAME} SHARED native-lib.cpp)
          find_library(log-lib log)
          
          # FIX: C++ ko batana ki nayi 'include' folder mein header file hai
          target_include_directories(${CMAKE_PROJECT_NAME} PRIVATE llama/include llama)
          
          target_link_libraries(${CMAKE_PROJECT_NAME} llama ${log-lib})
          EOF

          # ---------------------------------------------------------
          # STEP 4: Asli C++ Connection Code (native-lib.cpp)
          # ---------------------------------------------------------
          cat << 'EOF' > app/src/main/cpp/native-lib.cpp
          #include <jni.h>
          #include <string>
          #include <android/log.h>
          
          // FIX: Naye folder structure ke hisaab se sahi file link karna
          #include "llama.h"

          #define LOGI(...) __android_log_print(ANDROID_LOG_INFO, "ZeeshanAI", __VA_ARGS__)

          extern "C" JNIEXPORT jstring JNICALL
          Java_com_zeeshan_ai_MainActivity_askZ2Native(JNIEnv* env, jobject, jstring prompt, jstring modelPath) {
              const char *userQuestion = env->GetStringUTFChars(prompt, 0);
              const char *path = env->GetStringUTFChars(modelPath, 0);
              
              LOGI("Llama.cpp Engine Start ho raha hai...");
              
              // Llama Engine On karna (Backward compatibility check)
              llama_backend_init();
              LOGI("Llama backend initialized successfully!");
              
              std::string response = "Asli llama.cpp Engine Successfully Compiled and Connected!\n\n";
              response += "Aapne Pucha: " + std::string(userQuestion) + "\n\n";
              response += "Model Location: " + std::string(path) + "\n\n";
              response += "Bhai, naya rasta mil gaya aur Llama.cpp ka engine lag chuka hai!";
              
              // Memory saaf karna
              llama_backend_free();
              env->ReleaseStringUTFChars(prompt, userQuestion);
              env->ReleaseStringUTFChars(modelPath, path);
              
              return env->NewStringUTF(response.c_str());
          }
          EOF

          # ---------------------------------------------------------
          # STEP 5: App build.gradle (C++ Build Enable)
          # ---------------------------------------------------------
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.zeeshan.ai'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.zeeshan.ai'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "5.1-Llama-Engine-Fix"
                  externalNativeBuild {
                      cmake { cppFlags "-std=c++17" }
                  }
              }
              aaptOptions { noCompress 'gguf' }
              externalNativeBuild {
                  cmake { path "src/main/cpp/CMakeLists.txt"; version "3.22.1" }
              }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:allowBackup="true" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # ---------------------------------------------------------
          # STEP 6: Java Code (Copy Model & Send to C++)
          # ---------------------------------------------------------
          cat << 'EOF' > app/src/main/java/com/zeeshan/ai/MainActivity.java
          package com.zeeshan.ai;
          
          import android.graphics.Color;
          import android.graphics.drawable.GradientDrawable;
          import android.os.Bundle;
          import android.os.Handler;
          import android.view.Gravity;
          import android.view.View;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import java.io.File;
          import java.io.FileOutputStream;
          import java.io.InputStream;

          public class MainActivity extends AppCompatActivity {
              private LinearLayout chatLayout;
              private ScrollView scrollView;
              private EditText inputField;
              private Handler handler = new Handler();
              private String absoluteModelPath = "";

              static { System.loadLibrary("z2_engine"); }
              public native String askZ2Native(String prompt, String modelPath);

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setupUI();
                  copyModelToStorage();
              }

              private void copyModelToStorage() {
                  addMessage("System", "Z+2 AI Engine load ho raha hai... (Kripya intezar karein)", false);
                  new Thread(() -> {
                      try {
                          File outFile = new File(getFilesDir(), "z2_model.gguf");
                          absoluteModelPath = outFile.getAbsolutePath();
                          if (!outFile.exists()) {
                              InputStream is = getAssets().open("z2_model.gguf");
                              FileOutputStream fos = new FileOutputStream(outFile);
                              byte[] buffer = new byte[1024];
                              int length;
                              while ((length = is.read(buffer)) > 0) { fos.write(buffer, 0, length); }
                              fos.flush(); fos.close(); is.close();
                          }
                          runOnUiThread(() -> addMessage("System", "Llama.cpp Engine Ready!", false));
                      } catch (Exception e) {
                          e.printStackTrace();
                      }
                  }).start();
              }

              private void setupUI() {
                  RelativeLayout root = new RelativeLayout(this);
                  root.setBackgroundColor(Color.parseColor("#0D1117"));

                  LinearLayout header = new LinearLayout(this);
                  header.setId(View.generateViewId());
                  header.setOrientation(LinearLayout.VERTICAL);
                  header.setGravity(Gravity.CENTER);
                  header.setPadding(20, 40, 20, 20);
                  header.setBackgroundColor(Color.parseColor("#161B22"));

                  TextView title = new TextView(this);
                  title.setText("Zeeshan Ai Chat");
                  title.setTextColor(Color.WHITE);
                  title.setTextSize(22);
                  header.addView(title);
                  root.addView(header, new RelativeLayout.LayoutParams(-1, -2));

                  scrollView = new ScrollView(this);
                  RelativeLayout.LayoutParams scrollParams = new RelativeLayout.LayoutParams(-1, -1);
                  scrollParams.addRule(RelativeLayout.BELOW, header.getId());
                  scrollParams.setMargins(0, 0, 0, 150);
                  chatLayout = new LinearLayout(this);
                  chatLayout.setOrientation(LinearLayout.VERTICAL);
                  chatLayout.setPadding(20, 20, 20, 20);
                  scrollView.addView(chatLayout);
                  root.addView(scrollView, scrollParams);

                  LinearLayout bottomArea = new LinearLayout(this);
                  bottomArea.setOrientation(LinearLayout.HORIZONTAL);
                  bottomArea.setBackgroundColor(Color.parseColor("#161B22"));
                  bottomArea.setPadding(15, 20, 15, 20);
                  RelativeLayout.LayoutParams bottomParams = new RelativeLayout.LayoutParams(-1, -2);
                  bottomParams.addRule(RelativeLayout.ALIGN_PARENT_BOTTOM);

                  inputField = new EditText(this);
                  inputField.setHint("Puchiye...");
                  inputField.setTextColor(Color.WHITE);
                  LinearLayout.LayoutParams inputParams = new LinearLayout.LayoutParams(0, -2, 1.0f);

                  Button sendBtn = new Button(this);
                  sendBtn.setText("SEND");
                  sendBtn.setOnClickListener(v -> {
                      String t = inputField.getText().toString();
                      if(!t.isEmpty() && !absoluteModelPath.isEmpty()){
                          addMessage("You", t, true);
                          inputField.setText("");
                          
                          String llamaReply = askZ2Native(t, absoluteModelPath);
                          addMessage("Z+2", llamaReply, false);
                      }
                  });

                  bottomArea.addView(inputField, inputParams);
                  bottomArea.addView(sendBtn);
                  root.addView(bottomArea, bottomParams);
                  setContentView(root);
              }

              private void addMessage(String sender, String msg, boolean isUser) {
                  TextView tv = new TextView(this);
                  tv.setText(msg);
                  tv.setPadding(30, 20, 30, 20);
                  tv.setTextColor(Color.WHITE);
                  GradientDrawable bg = new GradientDrawable();
                  bg.setColor(isUser ? Color.parseColor("#005C4B") : Color.parseColor("#21262D"));
                  bg.setCornerRadius(20);
                  tv.setBackground(bg);
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(-2, -2);
                  lp.setMargins(10, 10, 10, 10);
                  lp.gravity = isUser ? Gravity.END : Gravity.START;
                  tv.setLayoutParams(lp);
                  chatLayout.addView(tv);
                  scrollView.post(() -> scrollView.fullScroll(ScrollView.FOCUS_DOWN));
              }
          }
          EOF

      - name: Build APK with Llama.cpp Engine
        run: |
          export ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/25.2.9519653
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-Ai-Llama-Engine-Fix
          path: app/build/outputs/apk/debug/*.apk
