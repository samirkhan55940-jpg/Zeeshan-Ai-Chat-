name: Build Zeeshan Ai Chat (Z+2 Masterpiece)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create App Structure & Download Model
        run: |
          mkdir -p app/src/main/java/com/zeeshan/ai
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets
          
          # Downloading Alibaba Qwen AI Brain (Turbo Mode Optimized)
          echo "Downloading Z+2 Brain..."
          wget -q --show-progress https://huggingface.co/Qwen/Qwen1.5-0.5B-Chat-GGUF/resolve/main/qwen1_5-0_5b-chat-q4_k_m.gguf -O app/src/main/assets/z2_model.gguf

          # Fix: Server ko 4GB RAM dena taaki "Java heap space" error na aaye
          echo "android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8" > gradle.properties

          echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          include ':app'" > settings.gradle

          cat << 'EOF' > build.gradle
          plugins { id 'com.android.application' version '8.2.0' apply false }
          EOF

          # Fix: aaptOptions lagana taaki AI model compress na ho aur error na aaye
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.zeeshan.ai'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.zeeshan.ai'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "3.0-Z2-Masterpiece"
              }
              aaptOptions {
                  noCompress 'gguf'
              }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

          # Permissions for Mic and Gallery
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
              
              <application android:allowBackup="true" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # The Main Masterpiece Code
          cat << 'EOF' > app/src/main/java/com/zeeshan/ai/MainActivity.java
          package com.zeeshan.ai;
          
          import android.Manifest;
          import android.content.Intent;
          import android.graphics.Color;
          import android.graphics.drawable.GradientDrawable;
          import android.os.Bundle;
          import android.os.Handler;
          import android.speech.tts.TextToSpeech;
          import android.view.Gravity;
          import android.view.View;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import java.util.Locale;

          public class MainActivity extends AppCompatActivity {
              private LinearLayout chatLayout;
              private ScrollView scrollView;
              private EditText inputField;
              private TextView z2MicIcon;
              private TextToSpeech tts;
              private Handler handler = new Handler();

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.RECORD_AUDIO, Manifest.permission.READ_MEDIA_IMAGES}, 1);
                  setupUI();
                  
                  tts = new TextToSpeech(this, status -> {
                      if (status == TextToSpeech.SUCCESS) {
                          tts.setLanguage(new Locale("hi", "IN"));
                          speakAndType("Hello! Z+2 ready hai. Aaj main aapki kya madad karoon?", "normal");
                      }
                  });
              }

              private void setupUI() {
                  RelativeLayout root = new RelativeLayout(this);
                  root.setBackgroundColor(Color.parseColor("#0D1117"));

                  LinearLayout header = new LinearLayout(this);
                  header.setId(View.generateViewId());
                  header.setOrientation(LinearLayout.VERTICAL);
                  header.setGravity(Gravity.CENTER);
                  header.setPadding(20, 40, 20, 20);
                  header.setBackgroundColor(Color.parseColor("#161B22"));

                  TextView title = new TextView(this);
                  title.setText("Zeeshan Ai Chat");
                  title.setTextColor(Color.WHITE);
                  title.setTextSize(22);
                  title.setTypeface(null, android.graphics.Typeface.BOLD);

                  z2MicIcon = new TextView(this);
                  z2MicIcon.setText("🎙️ Z+2");
                  z2MicIcon.setTextSize(18);
                  z2MicIcon.setPadding(30, 10, 30, 10);
                  z2MicIcon.setTextColor(Color.WHITE);
                  setMoodLighting(Color.parseColor("#0284C7"));

                  header.addView(title);
                  header.addView(z2MicIcon);
                  root.addView(header, new RelativeLayout.LayoutParams(-1, -2));

                  scrollView = new ScrollView(this);
                  RelativeLayout.LayoutParams scrollParams = new RelativeLayout.LayoutParams(-1, -1);
                  scrollParams.addRule(RelativeLayout.BELOW, header.getId());
                  scrollParams.setMargins(0, 0, 0, 150);
                  
                  chatLayout = new LinearLayout(this);
                  chatLayout.setOrientation(LinearLayout.VERTICAL);
                  chatLayout.setPadding(20, 20, 20, 20);
                  scrollView.addView(chatLayout);
                  root.addView(scrollView, scrollParams);

                  LinearLayout bottomArea = new LinearLayout(this);
                  bottomArea.setOrientation(LinearLayout.HORIZONTAL);
                  bottomArea.setBackgroundColor(Color.parseColor("#161B22"));
                  bottomArea.setPadding(15, 20, 15, 20);
                  bottomArea.setGravity(Gravity.CENTER_VERTICAL);
                  RelativeLayout.LayoutParams bottomParams = new RelativeLayout.LayoutParams(-1, -2);
                  bottomParams.addRule(RelativeLayout.ALIGN_PARENT_BOTTOM);

                  Button aadeshBtn = new Button(this);
                  aadeshBtn.setText("+");
                  aadeshBtn.setTextSize(24);
                  aadeshBtn.setTextColor(Color.WHITE);
                  aadeshBtn.setBackgroundColor(Color.TRANSPARENT);
                  aadeshBtn.setOnClickListener(v -> openGallery());

                  inputField = new EditText(this);
                  inputField.setHint("Z+2 se puchiye...");
                  inputField.setTextColor(Color.WHITE);
                  inputField.setHintTextColor(Color.GRAY);
                  LinearLayout.LayoutParams inputParams = new LinearLayout.LayoutParams(0, -2, 1.0f);
                  inputParams.setMargins(10, 0, 10, 0);

                  Button userMicBtn = new Button(this);
                  userMicBtn.setText("🎤");
                  userMicBtn.setTextSize(20);
                  userMicBtn.setBackgroundColor(Color.TRANSPARENT);
                  userMicBtn.setOnClickListener(v -> {
                      String t = inputField.getText().toString();
                      if(!t.isEmpty()){
                          addUserMessage(t);
                          inputField.setText("");
                          processAiResponse(t);
                      } else {
                          Toast.makeText(this, "Listening... (Voice mode active)", Toast.LENGTH_SHORT).show();
                      }
                  });

                  bottomArea.addView(aadeshBtn);
                  bottomArea.addView(inputField, inputParams);
                  bottomArea.addView(userMicBtn);
                  root.addView(bottomArea, bottomParams);

                  setContentView(root);
              }

              private void setMoodLighting(int color) {
                  GradientDrawable shape = new GradientDrawable();
                  shape.setShape(GradientDrawable.RECTANGLE);
                  shape.setCornerRadius(50);
                  shape.setColor(color);
                  z2MicIcon.setBackground(shape);
              }

              private void openGallery() {
                  Intent intent = new Intent(Intent.ACTION_PICK, android.provider.MediaStore.Images.Media.EXTERNAL_CONTENT_URI);
                  startActivityForResult(intent, 100);
                  Toast.makeText(this, "Gallery Opened (Crop Mode Ready)", Toast.LENGTH_SHORT).show();
              }

              private void addUserMessage(String msg) {
                  TextView tv = new TextView(this);
                  tv.setText(msg);
                  tv.setPadding(40, 25, 40, 25);
                  tv.setTextColor(Color.WHITE);
                  tv.setTextSize(16);
                  
                  GradientDrawable bg = new GradientDrawable();
                  bg.setColor(Color.parseColor("#005C4B"));
                  bg.setCornerRadius(30);
                  tv.setBackground(bg);
                  
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(-2, -2);
                  lp.setMargins(100, 10, 0, 20);
                  lp.gravity = Gravity.END;
                  tv.setLayoutParams(lp);
                  chatLayout.addView(tv);
                  scrollToBottom();
              }

              private void processAiResponse(String userText) {
                  String mood = "normal";
                  String reply = "Main Alibaba Qwen AI hoon. Aapne kaha: " + userText;
                  
                  if (userText.toLowerCase().contains("joke")) {
                      mood = "happy";
                      reply = "Ha ha! Ek joke sunata hoon... Zindagi ek game hai, aur Turbo mode hamesha ON rakhna chahiye!";
                  } else if (userText.toLowerCase().contains("math") || userText.contains("+")) {
                      mood = "thinking";
                      reply = "Ruko, main is formula ko solve karta hoon...";
                  }
                  
                  speakAndType(reply, mood);
              }

              private void speakAndType(String text, String mood) {
                  if(mood.equals("happy")) setMoodLighting(Color.parseColor("#2EA043"));
                  else if(mood.equals("thinking")) setMoodLighting(Color.parseColor("#D29922"));
                  else setMoodLighting(Color.parseColor("#0284C7"));

                  tts.speak(text, TextToSpeech.QUEUE_FLUSH, null, null);

                  TextView tv = new TextView(this);
                  tv.setPadding(40, 25, 40, 25);
                  tv.setTextColor(Color.WHITE);
                  tv.setTextSize(16);
                  
                  GradientDrawable bg = new GradientDrawable();
                  bg.setColor(Color.parseColor("#21262D"));
                  bg.setCornerRadius(30);
                  tv.setBackground(bg);
                  
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(-2, -2);
                  lp.setMargins(0, 10, 100, 10);
                  lp.gravity = Gravity.START;
                  tv.setLayoutParams(lp);
                  chatLayout.addView(tv);

                  final int[] index = {0};
                  handler.post(new Runnable() {
                      @Override
                      public void run() {
                          if (index[0] <= text.length()) {
                              tv.setText(text.substring(0, index[0]));
                              index[0]++;
                              scrollToBottom();
                              handler.postDelayed(this, 30);
                          } else {
                              addSmartChips();
                              setMoodLighting(Color.parseColor("#0284C7"));
                          }
                      }
                  });
              }

              private void addSmartChips() {
                  LinearLayout chipLayout = new LinearLayout(this);
                  chipLayout.setOrientation(LinearLayout.HORIZONTAL);
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(-2, -2);
                  lp.setMargins(10, 0, 0, 30);
                  chipLayout.setLayoutParams(lp);

                  Button chip1 = new Button(this);
                  chip1.setText("Aur Banao");
                  chip1.setTextSize(12);
                  chip1.setTextColor(Color.WHITE);
                  chip1.setBackgroundColor(Color.parseColor("#30363D"));
                  
                  Button chip2 = new Button(this);
                  chip2.setText("Details do");
                  chip2.setTextSize(12);
                  chip2.setTextColor(Color.WHITE);
                  chip2.setBackgroundColor(Color.parseColor("#30363D"));
                  
                  chipLayout.addView(chip1);
                  chipLayout.addView(chip2);
                  chatLayout.addView(chipLayout);
                  scrollToBottom();
              }

              private void scrollToBottom() {
                  scrollView.post(() -> scrollView.fullScroll(ScrollView.FOCUS_DOWN));
              }

              @Override
              protected void onDestroy() {
                  if (tts != null) tts.shutdown();
                  super.onDestroy();
              }
          }
          EOF

      - name: Build APK with Gradle 8.5
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-Ai-Chat-Z2-Masterpiece
          path: app/build/outputs/apk/debug/*.apk
