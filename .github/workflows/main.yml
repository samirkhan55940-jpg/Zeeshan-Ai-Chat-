name: "Build phone call Z+2"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "1. Checkout Code"
        uses: actions/checkout@v4

      - name: "2. Set up JDK 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: "3. Create App Structure"
        run: |
          mkdir -p app/src/main/java/com/zatomic/aicaller
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/anim
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/assets

      - name: "4. Master Gradle Settings"
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = "ZAtomicVoice"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          plugins {
              id 'com.android.application' version '8.3.0' apply false
          }
          EOF

          cat << 'EOF' > gradle.properties
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
          EOF
          
          gradle wrapper --gradle-version 8.4

      - name: "5. Download 20MB Offline Brain (Bulletproof Auto-Retry)"
        run: |
          echo "Downloading Offline Search Engine with Auto-Retry..."
          # wget with 3 retries and timeout settings to prevent GitHub failure
          wget --no-check-certificate --tries=3 --timeout=15 -qO vosk-model.zip "https://alphacephei.com/vosk/models/vosk-model-small-en-in-0.4.zip"
          unzip -q vosk-model.zip
          mv vosk-model-small-en-in-0.4 app/src/main/assets/model
          rm vosk-model.zip

      - name: "6. Android App Config"
        run: |
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.zatomic.aicaller'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.zatomic.aicaller'
                  minSdk 26
                  targetSdk 34
                  versionCode 42
                  versionName "42.0-Master-Edition"
              }
              buildTypes {
                  release {
                      minifyEnabled true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              
              implementation 'net.java.dev.jna:jna:5.13.0@aar'
              implementation 'com.alphacephei:vosk-android:0.3.38@aar'
          }
          EOF

      - name: "7. VIP UI Resources & Premium Logo (Included ✅)"
        run: |
          cat << 'EOF' > app/src/main/res/values/colors.xml
          <resources>
              <color name="bg_pitch_black">#000000</color>
              <color name="text_gold">#FFD700</color>
              <color name="text_white">#FFFFFF</color>
              <color name="mic_disabled">#555555</color>
              <color name="mic_idle">#0A84FF</color>
              <color name="mic_listening">#FF3B30</color>
              <color name="iphone_green">#34C759</color>
          </resources>
          EOF

          cat << 'EOF' > app/src/main/res/values/themes.xml
          <resources>
              <style name="Theme.ZAtomic" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">@color/bg_pitch_black</item>
                  <item name="android:statusBarColor">@color/bg_pitch_black</item>
              </style>
          </resources>
          EOF

          cat << 'EOF' > app/src/main/res/drawable/bg_mic_circle.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="@color/mic_disabled"/>
          </shape>
          EOF

          cat << 'EOF' > app/src/main/res/anim/pulse.xml
          <set xmlns:android="http://schemas.android.com/apk/res/android">
              <scale android:fromXScale="1.0" android:toXScale="1.2" android:fromYScale="1.0" android:toYScale="1.2" android:pivotX="50%" android:pivotY="50%" android:duration="600" android:repeatCount="infinite" android:repeatMode="reverse"/>
          </set>
          EOF

          # --- VIP BLACK & GREEN CALL LOGO ---
          cat << 'EOF' > app/src/main/res/drawable/ic_launcher_foreground.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="24" android:viewportHeight="24"
              android:tint="@color/iphone_green">
              <path android:fillColor="@android:color/white"
                    android:pathData="M6.62,10.79c1.44,2.83 3.76,5.14 6.59,6.59l2.2,-2.2c0.27,-0.27 0.67,-0.36 1.02,-0.24 1.12,0.37 2.33,0.57 3.57,0.57 0.55,0 1,0.45 1,1V20c0,0.55 -0.45,1 -1,1 -9.39,0 -17,-7.61 -17,-17 0,-0.55 0.45,-1 1,-1h3.5c0.55,0 1,0.45 1,1 0,1.25 0.2,2.45 0.57,3.57 0.11,0.35 0.03,0.74 -0.25,1.02l-2.2,2.2z"/>
          </vector>
          EOF

          # PERFECT AAPT2 ADAPTIVE ICON RULES
          cat << 'EOF' > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:color="@color/bg_pitch_black"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

      - name: "8. Layout Design"
        run: |
          cat << 'EOF' > app/src/main/res/layout/activity_main.xml
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="@color/bg_pitch_black"
              android:padding="20dp">

              <TextView android:id="@+id/tv_app_title"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:layout_alignParentTop="true"
                  android:layout_marginTop="10dp"
                  android:text="Zeeshan Husain"
                  android:textColor="@color/text_gold"
                  android:textSize="26sp"
                  android:textStyle="bold"
                  android:gravity="center"/>

              <TextView android:id="@+id/tv_status"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:layout_below="@id/tv_app_title"
                  android:layout_marginTop="20dp"
                  android:text="Data aur Engine Load ho raha hai...\nKripya ruken."
                  android:textColor="@color/text_white"
                  android:textSize="22sp"
                  android:gravity="center"
                  android:lines="3"/>

              <ImageButton android:id="@+id/btn_giant_mic"
                  android:layout_width="220dp"
                  android:layout_height="220dp"
                  android:layout_centerInParent="true"
                  android:background="@drawable/bg_mic_circle"
                  android:src="@android:drawable/ic_btn_speak_now"
                  android:scaleType="fitCenter"
                  android:padding="50dp"
                  app:tint="#FFFFFF"
                  android:elevation="10dp"
                  android:enabled="false"/>
                  
              <TextView android:id="@+id/tv_mic_hint"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:layout_below="@id/btn_giant_mic"
                  android:layout_marginTop="20dp"
                  android:text="Loading..."
                  android:textColor="#555555"
                  android:textSize="18sp"
                  android:gravity="center"/>

          </RelativeLayout>
          EOF

      - name: "9. Java Code (Auto-Scan Magic + Vosk Engine)"
        run: |
          cat << 'EOF' > app/src/main/java/com/zatomic/aicaller/MainActivity.java
          package com.zatomic.aicaller;

          import android.Manifest;
          import android.content.ContentValues;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.database.Cursor;
          import android.database.sqlite.SQLiteDatabase;
          import android.net.Uri;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.provider.ContactsContract;
          import android.speech.tts.TextToSpeech;
          import android.view.animation.Animation;
          import android.view.animation.AnimationUtils;
          import android.widget.ImageButton;
          import android.widget.TextView;
          import android.widget.Toast;

          import androidx.annotation.NonNull;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;

          import org.json.JSONObject;
          import org.vosk.Model;
          import org.vosk.Recognizer;
          import org.vosk.android.RecognitionListener;
          import org.vosk.android.SpeechService;
          import org.vosk.android.StorageService;

          import java.util.ArrayList;
          import java.util.List;
          import java.util.Locale;

          public class MainActivity extends AppCompatActivity implements RecognitionListener {

              private TextView tvStatus, tvMicHint;
              private ImageButton btnGiantMic;
              private Animation pulseAnim;
              
              private Model voskModel;
              private SpeechService speechService;
              private TextToSpeech tts;
              private Handler mainHandler = new Handler(Looper.getMainLooper());
              private SQLiteDatabase memoryDB;
              
              private boolean isScanDone = false;
              private boolean isVoskReady = false;
              private boolean isEngineReady = false;

              private boolean waitingForChoice = false;
              private List<String[]> pendingContacts = new ArrayList<>();

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  tvStatus = findViewById(R.id.tv_status);
                  tvMicHint = findViewById(R.id.tv_mic_hint);
                  btnGiantMic = findViewById(R.id.btn_giant_mic);
                  pulseAnim = AnimationUtils.loadAnimation(this, R.anim.pulse);

                  btnGiantMic.setEnabled(false);
                  btnGiantMic.getBackground().mutate().setTint(ContextCompat.getColor(this, R.color.mic_disabled));

                  checkPermissionsAndStart();
                  
                  btnGiantMic.setOnClickListener(v -> toggleMic());
              }

              private void checkPermissionsAndStart() {
                  String[] perms = {Manifest.permission.READ_CONTACTS, Manifest.permission.CALL_PHONE, Manifest.permission.RECORD_AUDIO};
                  boolean allGranted = true;
                  for(String p : perms) {
                      if(ActivityCompat.checkSelfPermission(this, p) != PackageManager.PERMISSION_GRANTED) {
                          allGranted = false; break;
                      }
                  }
                  
                  if(allGranted) {
                      startBackgroundMagic();
                  } else {
                      ActivityCompat.requestPermissions(this, perms, 1);
                  }
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, @NonNull String[] permissions, @NonNull int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  boolean allGranted = true;
                  for(int res : grantResults) {
                      if(res != PackageManager.PERMISSION_GRANTED) {
                          allGranted = false; break;
                      }
                  }
                  if(allGranted && grantResults.length > 0) {
                      startBackgroundMagic();
                  } else {
                      tvStatus.setText("Permissions required to run!");
                  }
              }

              private void startBackgroundMagic() {
                  initDatabaseMemory();
                  setupTTS();
                  startSilentScan();
                  initVoskEngine();
              }

              private void initDatabaseMemory() {
                  memoryDB = openOrCreateDatabase("ZAtomicBrain", MODE_PRIVATE, null);
                  memoryDB.execSQL("CREATE TABLE IF NOT EXISTS phonebook(name VARCHAR, number VARCHAR);");
              }

              private void startSilentScan() {
                  new Thread(() -> {
                      memoryDB.execSQL("DELETE FROM phonebook"); 
                      Cursor cursor = getContentResolver().query(ContactsContract.CommonDataKinds.Phone.CONTENT_URI, null, null, null, null);
                      if (cursor != null) {
                          while (cursor.moveToNext()) {
                              int nameIdx = cursor.getColumnIndex(ContactsContract.CommonDataKinds.Phone.DISPLAY_NAME);
                              int numIdx = cursor.getColumnIndex(ContactsContract.CommonDataKinds.Phone.NUMBER);
                              if(nameIdx != -1 && numIdx != -1) {
                                  String name = cursor.getString(nameIdx);
                                  String num = cursor.getString(numIdx);
                                  if(name != null && num != null) {
                                      ContentValues values = new ContentValues();
                                      values.put("name", name.toLowerCase());
                                      values.put("number", num);
                                      memoryDB.insert("phonebook", null, values);
                                  }
                              }
                          }
                          cursor.close();
                      }
                      
                      mainHandler.post(() -> {
                          isScanDone = true;
                          checkIfAllReady();
                      });
                  }).start();
              }

              private void initVoskEngine() {
                  StorageService.unpack(this, "model", "model",
                          (model) -> {
                              this.voskModel = model;
                              isVoskReady = true;
                              runOnUiThread(() -> checkIfAllReady());
                          },
                          (exception) -> { 
                              runOnUiThread(() -> tvStatus.setText("Engine Load Error!"));
                          }
                  );
              }

              private void setupTTS() {
                  tts = new TextToSpeech(this, status -> {
                      if (status == TextToSpeech.SUCCESS) {
                          tts.setLanguage(new Locale("hi", "IN"));
                      }
                  });
              }

              private void checkIfAllReady() {
                  if (isScanDone && isVoskReady && !isEngineReady) {
                      isEngineReady = true;
                      
                      btnGiantMic.setEnabled(true);
                      btnGiantMic.getBackground().mutate().setTint(ContextCompat.getColor(this, R.color.mic_idle));
                      
                      tvStatus.setText("Z+2 AI Ready\n(100% Offline)");
                      tvMicHint.setText("Tap to Speak");
                      
                      speak("Salaam Seth! Main taiyar hoon, kisko phone lagau?");
                  }
              }
              
              private void speak(String text) {
                  if (tts != null) tts.speak(text, TextToSpeech.QUEUE_FLUSH, null, null);
              }

              private void toggleMic() {
                  if (!isEngineReady) return;

                  if (speechService != null) {
                      speechService.stop();
                      speechService = null;
                      btnGiantMic.clearAnimation();
                      btnGiantMic.getBackground().mutate().setTint(ContextCompat.getColor(this, R.color.mic_idle));
                      tvStatus.setText("Z+2 AI Ready");
                  } else {
                      try {
                          Recognizer rec = new Recognizer(voskModel, 16000.0f);
                          speechService = new SpeechService(rec, 16000.0f);
                          speechService.startListening(this);
                          
                          btnGiantMic.getBackground().mutate().setTint(ContextCompat.getColor(this, R.color.mic_listening));
                          btnGiantMic.startAnimation(pulseAnim);
                          if(tts != null && tts.isSpeaking()) tts.stop();
                          tvStatus.setText("Sun raha hoon...");
                      } catch (Exception e) {}
                  }
              }

              @Override
              public void onResult(String hypothesis) {
                  try {
                      JSONObject obj = new JSONObject(hypothesis);
                      String spokenText = obj.getString("text").trim();
                      if (!spokenText.isEmpty()) {
                          toggleMic(); 
                          processVoiceCommand(spokenText.toLowerCase());
                      }
                  } catch (Exception e) {}
              }

              @Override public void onPartialResult(String h) {}
              @Override public void onFinalResult(String h) { onResult(h); }
              @Override public void onError(Exception e) { toggleMic(); }
              @Override public void onTimeout() { toggleMic(); }

              private void processVoiceCommand(String input) {
                  tvStatus.setText("Aapne kaha:\n\"" + input + "\"");
                  
                  if (waitingForChoice) {
                      handleChoiceSelection(input);
                      return;
                  }

                  String cleanName = input.replaceAll("\\b(call|dial|phone|laga|lagao|karo|bhai|jaan|please|ko|hi|hello|mera|number|open|maro|jaldi|yaar|ko|kijiye)\\b", "").trim();
                  
                  if (cleanName.length() < 2) {
                      speak("Naam theek se samajh nahi aaya. Phir se dabaiye.");
                      tvStatus.setText("Naam theek se samajh nahi aaya.");
                      return;
                  }

                  searchDatabaseAndCall(cleanName);
              }

              private void searchDatabaseAndCall(String searchName) {
                  pendingContacts.clear();
                  
                  Cursor cursor = memoryDB.rawQuery("SELECT * FROM phonebook WHERE name LIKE ?", new String[]{"%" + searchName + "%"});

                  if (cursor != null) {
                      while (cursor.moveToNext()) {
                          pendingContacts.add(new String[]{cursor.getString(0), cursor.getString(1)});
                      }
                      cursor.close();
                  }

                  if (pendingContacts.isEmpty()) {
                      speak("Maaf karna, " + searchName + " naam ka number nahi mila.");
                      tvStatus.setText(searchName + "\nNahi Mila!");
                  } else if (pendingContacts.size() == 1) {
                      makeCall(pendingContacts.get(0)[0], pendingContacts.get(0)[1]);
                  } else {
                      waitingForChoice = true;
                      StringBuilder announcement = new StringBuilder(pendingContacts.size() + " naam mile hain. ");
                      for (int i = 0; i < Math.min(pendingContacts.size(), 3); i++) {
                          String pos = (i == 0) ? "Pehla" : (i == 1) ? "Dusra" : "Teesra";
                          announcement.append(pos).append(", ").append(pendingContacts.get(i)[0]).append(". ");
                      }
                      announcement.append("Kisko lagau?");
                      
                      speak(announcement.toString());
                      tvStatus.setText("Bohot naam mile!\nKisko lagau?\n(Pehla, Dusra...)");
                  }
              }

              private void handleChoiceSelection(String input) {
                  waitingForChoice = false;
                  int selectedIndex = -1;
                  
                  if (input.contains("pehla") || input.contains("ek") || input.contains("first") || input.contains("1") || input.contains("one")) selectedIndex = 0;
                  else if (input.contains("dusra") || input.contains("do") || input.contains("second") || input.contains("2") || input.contains("two")) selectedIndex = 1;
                  else if (input.contains("teesra") || input.contains("teen") || input.contains("third") || input.contains("3") || input.contains("three")) selectedIndex = 2;

                  if (selectedIndex >= 0 && selectedIndex < pendingContacts.size()) {
                      makeCall(pendingContacts.get(selectedIndex)[0], pendingContacts.get(selectedIndex)[1]);
                  } else {
                      speak("Samajh nahi aaya. Phir se mic dabakar naam bataiye.");
                      tvStatus.setText("Samajh nahi aaya.\nPhir se mic dabayein.");
                  }
              }

              private void makeCall(String name, String number) {
                  final String finalNumber = number; 
                  tvStatus.setText("Calling...\n" + name.toUpperCase());
                  speak("Ji seth, " + name + " ko call laga raha hoon.");
                  
                  mainHandler.postDelayed(() -> {
                      try {
                          startActivity(new Intent(Intent.ACTION_CALL, Uri.parse("tel:" + finalNumber)));
                      } catch (Exception e) {
                          Toast.makeText(MainActivity.this, "Calling Error", Toast.LENGTH_SHORT).show();
                      }
                  }, 2000);
              }

              @Override
              protected void onDestroy() {
                  if (speechService != null) { speechService.stop(); speechService.shutdown(); }
                  if (tts != null) { tts.stop(); tts.shutdown(); }
                  if (memoryDB != null) { memoryDB.close(); }
                  super.onDestroy();
              }
          }
          EOF

      - name: "10. Android Manifest"
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_CONTACTS" />
              <uses-permission android:name="android.permission.CALL_PHONE" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              
              <application android:label="phone call Z+2" android:icon="@mipmap/ic_launcher" android:theme="@style/Theme.ZAtomic">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="portrait">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: "11. Build Final Fast APK"
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug
          
      - name: "12. Upload Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "phone-call-Z+2"
          path: app/build/outputs/apk/debug/app-debug.apk

