name: Build Zeeshan Ai Chat (Step-By-Step Final Force)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code (Code Nikalna)
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17 (Java Tayar Karna)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Setup Android NDK (C++ Engine Tools)
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: 4. Create Folders & Repositories (Dukan Set Karna)
        run: |
          mkdir -p app/src/main/java/com/zeeshan/ai
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/cpp
          
          # Fix: Repositories ko ek dam clear batana
          echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS); repositories { google(); mavenCentral() } }
          include ':app'" > settings.gradle
          
          echo "android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx6g" > gradle.properties

      - name: 5. Download Alibaba Model (Dimaag Download)
        run: |
          wget -q --show-progress https://huggingface.co/Qwen/Qwen1.5-0.5B-Chat-GGUF/resolve/main/qwen1_5-0_5b-chat-q4_k_m.gguf -O app/src/main/assets/z2_model.gguf

      - name: 6. Download Llama Engine (Accelerator Engine)
        run: |
          git clone --depth 1 https://github.com/ggerganov/llama.cpp app/src/main/cpp/llama

      - name: 7. Write C++ Accelerator Code
        run: |
          cat << 'EOF' > app/src/main/cpp/CMakeLists.txt
          cmake_minimum_required(VERSION 3.22.1)
          project("z2_engine")
          add_subdirectory(llama)
          add_library(${CMAKE_PROJECT_NAME} SHARED native-lib.cpp)
          target_include_directories(${CMAKE_PROJECT_NAME} PRIVATE llama/include llama)
          target_link_libraries(${CMAKE_PROJECT_NAME} llama log)
          EOF

          cat << 'EOF' > app/src/main/cpp/native-lib.cpp
          #include <jni.h>
          #include <string>
          #include "llama.h"

          extern "C" JNIEXPORT jstring JNICALL
          Java_com_zeeshan_ai_MainActivity_askZ2Native(JNIEnv* env, jobject, jstring prompt, jstring modelPath) {
              const char *path = env->GetStringUTFChars(modelPath, 0);
              llama_backend_init();
              auto mparams = llama_model_default_params();
              llama_model * model = llama_load_model_from_file(path, mparams);
              
              std::string res = "Z+2 Accelerator Mode Active!\n";
              if(model) {
                  res += "Status: Alibaba AI Model RAM me Load ho gaya hai.";
                  llama_free_model(model);
              } else {
                  res += "Error: Memory me jagah kam hai.";
              }
              llama_backend_free();
              env->ReleaseStringUTFChars(modelPath, path);
              return env->NewStringUTF(res.c_str());
          }
          EOF

      - name: 8. Write Java UI & Build Config
        run: |
          cat << 'EOF' > build.gradle
          plugins { id 'com.android.application' version '8.2.0' apply false }
          EOF

          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.zeeshan.ai'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.zeeshan.ai'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "13.0-StepByStep"
                  ndk { abiFilters 'arm64-v8a' }
              }
              aaptOptions { noCompress 'gguf' }
              externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt" } }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

          cat << 'EOF' > app/src/main/java/com/zeeshan/ai/MainActivity.java
          package com.zeeshan.ai;
          import android.graphics.Color;
          import android.os.Bundle;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import java.io.*;

          public class MainActivity extends AppCompatActivity {
              private String path = "";
              static { System.loadLibrary("z2_engine"); }
              public native String askZ2Native(String p, String m);

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setBackgroundColor(Color.BLACK);
                  TextView tv = new TextView(this);
                  tv.setText("Z+2 Step-By-Step Engine");
                  tv.setTextColor(Color.WHITE);
                  Button btn = new Button(this);
                  btn.setText("START ACCELERATOR");
                  btn.setOnClickListener(v -> {
                      new Thread(() -> {
                          String r = askZ2Native("test", path);
                          runOnUiThread(() -> tv.setText(r));
                      }).start();
                  });
                  root.addView(tv); root.addView(btn);
                  setContentView(root);
                  new Thread(this::copyM).start();
              }
              private void copyM() {
                  try {
                      File f = new File(getFilesDir(), "z2_model.gguf");
                      path = f.getAbsolutePath();
                      if (!f.exists()) {
                          InputStream is = getAssets().open("z2_model.gguf");
                          FileOutputStream os = new FileOutputStream(f);
                          byte[] b = new byte[8192]; int l;
                          while ((l = is.read(b)) > 0) os.write(b, 0, l);
                          os.close(); is.close();
                      }
                  } catch (Exception e) {}
              }
          }
          EOF

          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 9. Final Build (Forced Execution)
        run: |
          export ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/25.2.9519653
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 10. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-Ai-StepByStep
          path: app/build/outputs/apk/debug/*.apk
