name: Build Zeeshan Z+2 (Ultimate Plugin Fix)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Create Root Settings & Plugin Links (THE FIX)
        run: |
          mkdir -p app/src/main/java/com/zeeshan/z2
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets

          # YAHAN GITHUB KO GOOGLE PLUGIN KA RASTA DIYA HAI
          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "Zeeshan-Z2-Chat"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF
          
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: 4. Arabi Jan Core (Mathematical Logic)
        run: |
          cat << 'EOF' > app/src/main/cpp/native-lib.cpp
          #include <jni.h>
          #include <string>
          #include <sstream>

          // ARABI JAN: 123 ABJAD FORMULA
          unsigned long long getArabiJanID(const char* text) {
              unsigned long long hash = 786;
              for(int i = 0; text[i] != '\0'; i++) {
                  hash = (hash * 33) ^ (unsigned char)tolower(text[i]);
              }
              return hash;
          }

          // MADAM ENGINE: THINKING LOGIC
          std::string madamThinking(std::string query, unsigned long long id) {
              if (query.find("paani") != std::string::npos || query.find("water") != std::string::npos) 
                  return "Madam Logic: ID " + std::to_string(id) + " -> Paani hi Zindagi hai, jameen ko hara karti hai.";
              if (query.find("insaan") != std::string::npos)
                  return "Madam Logic: ID " + std::to_string(id) + " -> Insaan aur Mitti ka rishta buniyaadi hai.";
              return "Z+2 Engine: Arabi Jan ID [" + std::to_string(id) + "] process ho gaya. Nayi soch taiyar hai!";
          }

          extern "C" JNIEXPORT jstring JNICALL
          Java_com_zeeshan_z2_MainActivity_processZ2(JNIEnv* env, jobject, jstring input) {
              const char *text = env->GetStringUTFChars(input, 0);
              unsigned long long id = getArabiJanID(text);
              std::string response = madamThinking(text, id);
              env->ReleaseStringUTFChars(input, text);
              return env->NewStringUTF(response.c_str());
          }
          EOF

          cat << 'EOF' > app/src/main/cpp/CMakeLists.txt
          cmake_minimum_required(VERSION 3.22.1)
          project("z2_core")
          add_library(z2_core SHARED native-lib.cpp)
          find_library(log-lib log)
          target_link_libraries(z2_core ${log-lib})
          EOF

      - name: 5. Z+2 Chat VIP Interface (Permissions Added)
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/z2/MainActivity.java
          package com.zeeshan.z2;
          import android.Manifest;
          import android.content.pm.PackageManager;
          import android.graphics.Color;
          import android.os.Bundle;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;

          public class MainActivity extends AppCompatActivity {
              static { System.loadLibrary("z2_core"); }
              public native String processZ2(String input);

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  String[] perms = {Manifest.permission.CAMERA, Manifest.permission.RECORD_AUDIO};
                  if (ActivityCompat.checkSelfPermission(this, perms[0]) != PackageManager.PERMISSION_GRANTED) {
                      ActivityCompat.requestPermissions(this, perms, 101);
                  }

                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setBackgroundColor(Color.parseColor("#080000")); // Deep Dark Red
                  root.setPadding(40, 60, 40, 40);

                  TextView title = new TextView(this);
                  title.setText("Zeeshan Z+2 (Offline AI)");
                  title.setTextColor(Color.RED);
                  title.setTextSize(24);

                  final TextView output = new TextView(this);
                  output.setTextColor(Color.WHITE);
                  output.setPadding(0, 50, 0, 50);
                  output.setTextSize(18);

                  final EditText input = new EditText(this);
                  input.setHint("Madam Engine se baat karein...");
                  input.setHintTextColor(Color.GRAY);
                  input.setTextColor(Color.WHITE);

                  Button btn = new Button(this);
                  btn.setText("EXECUTE ARABI LOGIC");
                  btn.setBackgroundColor(Color.RED);
                  btn.setTextColor(Color.WHITE);
                  btn.setOnClickListener(v -> {
                      output.setText(processZ2(input.getText().toString()));
                  });

                  root.addView(title); root.addView(output); root.addView(input); root.addView(btn);
                  setContentView(root);
              }
          }
          EOF

      - name: 6. App Build Config & Manifest
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.zeeshan.z2">
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <application android:label="Z+2 Chat" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.zeeshan.z2'
              compileSdk 34
              defaultConfig {
                  applicationId "com.zeeshan.z2"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "Z2-Perfect-Build"
                  ndk { abiFilters 'arm64-v8a' }
              }
              externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt" } }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

      - name: 7. Step-by-Step Gradle Build
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      - name: 8. Upload Zeeshan Z+2 Master APK
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-Z2-Ultimate-AI
          path: app/build/outputs/apk/debug/*.apk
