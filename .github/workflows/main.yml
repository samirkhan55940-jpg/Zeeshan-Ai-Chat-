name: "Build phone call Z+2"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "1. Checkout Code"
        uses: actions/checkout@v4

      - name: "2. Set up JDK 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: "3. Create App Structure"
        run: |
          mkdir -p app/src/main/java/com/zatomic/aicaller
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/anim
          mkdir -p app/src/main/res/mipmap-anydpi-v26

      - name: "4. Master Gradle Settings (ERROR FIXED)"
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = "ZAtomicVoice"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.0' }
          }
          // Yahan se allprojects block hata diya gaya hai taki clash na ho
          EOF

          cat << 'EOF' > gradle.properties
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
          EOF
          
          gradle wrapper --gradle-version 8.4

      - name: "5. Android App Config"
        run: |
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.zatomic.aicaller'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.zatomic.aicaller'
                  minSdk 26
                  targetSdk 34
                  versionCode 36
                  versionName "36.0-Z2-Fixed"
              }
              buildTypes {
                  release {
                      minifyEnabled true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

      - name: "6. UI Resources & Pulse Animation"
        run: |
          cat << 'EOF' > app/src/main/res/values/colors.xml
          <resources>
              <color name="bg_pitch_black">#000000</color>
              <color name="text_gold">#FFD700</color>
              <color name="text_white">#FFFFFF</color>
              <color name="mic_idle">#0A84FF</color>
              <color name="mic_listening">#FF3B30</color>
          </resources>
          EOF

          cat << 'EOF' > app/src/main/res/values/themes.xml
          <resources>
              <style name="Theme.ZAtomic" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">@color/bg_pitch_black</item>
                  <item name="android:statusBarColor">@color/bg_pitch_black</item>
              </style>
          </resources>
          EOF

          cat << 'EOF' > app/src/main/res/drawable/bg_mic_circle.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="@color/mic_idle"/>
          </shape>
          EOF

          cat << 'EOF' > app/src/main/res/anim/pulse.xml
          <set xmlns:android="http://schemas.android.com/apk/res/android">
              <scale android:fromXScale="1.0" android:toXScale="1.2" android:fromYScale="1.0" android:toYScale="1.2" android:pivotX="50%" android:pivotY="50%" android:duration="600" android:repeatCount="infinite" android:repeatMode="reverse"/>
          </set>
          EOF

          cat << 'EOF' > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:color="#990000"/>
              <foreground android:drawable="@android:drawable/ic_btn_speak_now"/>
          </adaptive-icon>
          EOF

      - name: "7. Layout Design (Zeeshan Husain Title Added)"
        run: |
          cat << 'EOF' > app/src/main/res/layout/activity_main.xml
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="@color/bg_pitch_black"
              android:padding="20dp">

              <TextView android:id="@+id/tv_app_title"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:layout_alignParentTop="true"
                  android:layout_marginTop="10dp"
                  android:text="Zeeshan Husain"
                  android:textColor="@color/text_gold"
                  android:textSize="26sp"
                  android:textStyle="bold"
                  android:gravity="center"/>

              <TextView android:id="@+id/tv_status"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:layout_below="@id/tv_app_title"
                  android:layout_marginTop="20dp"
                  android:text="Z+2 AI"
                  android:textColor="@color/text_white"
                  android:textSize="22sp"
                  android:gravity="center"
                  android:lines="3"/>

              <ImageButton android:id="@+id/btn_giant_mic"
                  android:layout_width="220dp"
                  android:layout_height="220dp"
                  android:layout_centerInParent="true"
                  android:background="@drawable/bg_mic_circle"
                  android:src="@android:drawable/ic_btn_speak_now"
                  android:scaleType="fitCenter"
                  android:padding="50dp"
                  android:tint="#FFFFFF"
                  android:elevation="10dp"/>
                  
              <TextView android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:layout_below="@id/btn_giant_mic"
                  android:layout_marginTop="30dp"
                  android:text="Tap to Speak"
                  android:textColor="#555555"
                  android:textSize="18sp"
                  android:gravity="center"/>

          </RelativeLayout>
          EOF

      - name: "8. Java Code (The Smart Brain)"
        run: |
          cat << 'EOF' > app/src/main/java/com/zatomic/aicaller/MainActivity.java
          package com.zatomic.aicaller;

          import android.Manifest;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.database.Cursor;
          import android.net.Uri;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.provider.ContactsContract;
          import android.speech.RecognitionListener;
          import android.speech.RecognizerIntent;
          import android.speech.SpeechRecognizer;
          import android.speech.tts.TextToSpeech;
          import android.view.animation.Animation;
          import android.view.animation.AnimationUtils;
          import android.widget.ImageButton;
          import android.widget.TextView;
          import android.widget.Toast;

          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;

          import java.util.ArrayList;
          import java.util.List;
          import java.util.Locale;

          public class MainActivity extends AppCompatActivity {

              private TextView tvStatus;
              private ImageButton btnGiantMic;
              private Animation pulseAnim;
              
              private SpeechRecognizer speechRecognizer;
              private TextToSpeech tts;
              private Handler mainHandler = new Handler(Looper.getMainLooper());
              
              private boolean waitingForChoice = false;
              private List<String[]> pendingContacts = new ArrayList<>();

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  tvStatus = findViewById(R.id.tv_status);
                  btnGiantMic = findViewById(R.id.btn_giant_mic);
                  pulseAnim = AnimationUtils.loadAnimation(this, R.anim.pulse);

                  checkPermissions();
                  setupTTS();
                  setupSpeechRecognizer();

                  btnGiantMic.setOnClickListener(v -> startListening());
              }

              private void setupTTS() {
                  tts = new TextToSpeech(this, status -> {
                      if (status == TextToSpeech.SUCCESS) {
                          tts.setLanguage(new Locale("hi", "IN"));
                          tvStatus.setText("Salaam!\nKisko call lagana hai?");
                          speak("Salaam! Kisko call lagana hai?");
                      }
                  });
              }
              
              private void speak(String text) {
                  if (tts != null) tts.speak(text, TextToSpeech.QUEUE_FLUSH, null, null);
              }

              private void setupSpeechRecognizer() {
                  speechRecognizer = SpeechRecognizer.createSpeechRecognizer(this);
                  speechRecognizer.setRecognitionListener(new RecognitionListener() {
                      @Override public void onReadyForSpeech(Bundle params) {
                          tvStatus.setText("Sun raha hoon...");
                          btnGiantMic.getBackground().mutate().setTint(ContextCompat.getColor(MainActivity.this, R.color.mic_listening));
                          btnGiantMic.startAnimation(pulseAnim);
                      }
                      @Override public void onBeginningOfSpeech() {}
                      @Override public void onRmsChanged(float rmsdB) {}
                      @Override public void onBufferReceived(byte[] buffer) {}
                      @Override public void onEndOfSpeech() { resetMic(); }
                      @Override public void onError(int error) {
                          resetMic();
                          tvStatus.setText("Aawaz nahi aayi.\nPhir se dabayein.");
                      }
                      @Override public void onResults(Bundle results) {
                          resetMic();
                          ArrayList<String> matches = results.getStringArrayList(SpeechRecognizer.RESULTS_RECOGNITION);
                          if (matches != null && !matches.isEmpty()) {
                              processVoiceCommand(matches.get(0).toLowerCase());
                          }
                      }
                      @Override public void onPartialResults(Bundle partialResults) {}
                      @Override public void onEvent(int eventType, Bundle params) {}
                  });
              }

              private void startListening() {
                  if (tts != null && tts.isSpeaking()) tts.stop();
                  Intent intent = new Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH);
                  intent.putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL, RecognizerIntent.LANGUAGE_MODEL_FREE_FORM);
                  intent.putExtra(RecognizerIntent.EXTRA_LANGUAGE, "hi-IN");
                  intent.putExtra(RecognizerIntent.EXTRA_PREFER_OFFLINE, true);
                  
                  try {
                      speechRecognizer.startListening(intent);
                  } catch (Exception e) {
                      Toast.makeText(this, "Mic Error", Toast.LENGTH_SHORT).show();
                  }
              }

              private void resetMic() {
                  btnGiantMic.clearAnimation();
                  btnGiantMic.getBackground().mutate().setTint(ContextCompat.getColor(this, R.color.mic_idle));
              }

              private void processVoiceCommand(String input) {
                  tvStatus.setText("Aapne kaha:\n\"" + input + "\"");
                  
                  if (waitingForChoice) {
                      handleChoiceSelection(input);
                      return;
                  }

                  String cleanName = input.replaceAll("\\b(call|dial|phone|laga|lagao|karo|bhai|jaan|please|ko|hi|hello|mera|number|open|maro|jaldi|yaar|ko|kijiye)\\b", "").trim();
                  
                  if (cleanName.length() < 2) {
                      speak("Naam theek se samajh nahi aaya. Phir se bataiye.");
                      tvStatus.setText("Naam theek se samajh nahi aaya.");
                      return;
                  }

                  searchAndCall(cleanName);
              }

              private void searchAndCall(String searchName) {
                  pendingContacts.clear();
                  Cursor cursor = getContentResolver().query(
                          ContactsContract.CommonDataKinds.Phone.CONTENT_URI,
                          new String[]{ContactsContract.CommonDataKinds.Phone.DISPLAY_NAME, ContactsContract.CommonDataKinds.Phone.NUMBER},
                          ContactsContract.CommonDataKinds.Phone.DISPLAY_NAME + " LIKE ?",
                          new String[]{"%" + searchName + "%"},
                          null
                  );

                  if (cursor != null) {
                      while (cursor.moveToNext()) {
                          pendingContacts.add(new String[]{cursor.getString(0), cursor.getString(1)});
                      }
                      cursor.close();
                  }

                  if (pendingContacts.isEmpty()) {
                      speak("Maaf karna, " + searchName + " naam ka koi number nahi mila.");
                      tvStatus.setText(searchName + "\nNahi Mila!");
                  } else if (pendingContacts.size() == 1) {
                      makeCall(pendingContacts.get(0)[0], pendingContacts.get(0)[1]);
                  } else {
                      waitingForChoice = true;
                      StringBuilder announcement = new StringBuilder(pendingContacts.size() + " naam mile hain. ");
                      for (int i = 0; i < Math.min(pendingContacts.size(), 3); i++) {
                          String pos = (i == 0) ? "Pehla" : (i == 1) ? "Dusra" : "Teesra";
                          announcement.append(pos).append(", ").append(pendingContacts.get(i)[0]).append(". ");
                      }
                      announcement.append("Kisko lagau?");
                      
                      speak(announcement.toString());
                      tvStatus.setText("Bohot naam mile!\nKisko lagau?\n(Pehla, Dusra...)");
                  }
              }

              private void handleChoiceSelection(String input) {
                  waitingForChoice = false;
                  int selectedIndex = -1;
                  
                  if (input.contains("pehla") || input.contains("ek") || input.contains("first") || input.contains("1")) selectedIndex = 0;
                  else if (input.contains("dusra") || input.contains("do") || input.contains("second") || input.contains("2")) selectedIndex = 1;
                  else if (input.contains("teesra") || input.contains("teen") || input.contains("third") || input.contains("3")) selectedIndex = 2;

                  if (selectedIndex >= 0 && selectedIndex < pendingContacts.size()) {
                      makeCall(pendingContacts.get(selectedIndex)[0], pendingContacts.get(selectedIndex)[1]);
                  } else {
                      speak("Main samajh nahi paya. Kripya shuru se naam bataiye.");
                      tvStatus.setText("Samajh nahi aaya.\nPhir se mic dabayein.");
                  }
              }

              private void makeCall(String name, String number) {
                  final String finalNumber = number; 
                  tvStatus.setText("Calling...\n" + name.toUpperCase());
                  speak("Ji seth, " + name + " ko call laga raha hoon.");
                  
                  mainHandler.postDelayed(() -> {
                      try {
                          startActivity(new Intent(Intent.ACTION_CALL, Uri.parse("tel:" + finalNumber)));
                      } catch (Exception e) {
                          Toast.makeText(MainActivity.this, "Calling Error", Toast.LENGTH_SHORT).show();
                      }
                  }, 2000);
              }

              private void checkPermissions() {
                  String[] perms = {Manifest.permission.READ_CONTACTS, Manifest.permission.CALL_PHONE, Manifest.permission.RECORD_AUDIO};
                  for(String p : perms) {
                      if(ActivityCompat.checkSelfPermission(this, p) != PackageManager.PERMISSION_GRANTED) {
                          ActivityCompat.requestPermissions(this, perms, 1);
                          return;
                      }
                  }
              }

              @Override
              protected void onDestroy() {
                  if (speechRecognizer != null) { speechRecognizer.destroy(); }
                  if (tts != null) { tts.stop(); tts.shutdown(); }
                  super.onDestroy();
              }
          }
          EOF

      - name: "9. Android Manifest (App Name Updated)"
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_CONTACTS" />
              <uses-permission android:name="android.permission.CALL_PHONE" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              
              <queries>
                  <intent><action android:name="android.speech.RecognitionService" /></intent>
                  <intent><action android:name="android.intent.action.TTS_SERVICE" /></intent>
              </queries>
              
              <application android:label="phone call Z+2" android:icon="@mipmap/ic_launcher" android:theme="@style/Theme.ZAtomic">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="portrait">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: "10. Build Final Fast APK"
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug
          
      - name: "11. Upload Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "phone-call-Z+2"
          path: app/build/outputs/apk/debug/app-debug.apk
