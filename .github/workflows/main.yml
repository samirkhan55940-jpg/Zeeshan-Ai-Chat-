name: "Build Z-Atomic Scan AI (Official Edition)"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "1. Checkout Code"
        uses: actions/checkout@v4

      - name: "2. Set up JDK 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: "3. Create App Structure"
        run: |
          mkdir -p app/src/main/java/com/zatomic/caller
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/res/anim

      - name: "4. Initialize Build Files"
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = "ZAtomicScan"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          plugins { id 'com.android.application' version '8.3.0' apply false }
          EOF

          cat << 'EOF' > gradle.properties
          android.useAndroidX=true
          EOF
          
          gradle wrapper --gradle-version 8.4

      - name: "5. UI Design & Themes"
        run: |
          cat << 'EOF' > app/src/main/res/values/colors.xml
          <resources>
              <color name="bg_dark">#080808</color>
              <color name="bg_panel">#121212</color>
              <color name="accent_gold">#FFD700</color>
              <color name="matrix_green">#00FF41</color>
              <color name="chat_ai">#1B5E20</color>
              <color name="chat_user">#212121</color>
          </resources>
          EOF

          cat << 'EOF' > app/src/main/res/values/themes.xml
          <resources>
              <style name="Theme.ZAtomic" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">@color/bg_dark</item>
                  <item name="android:statusBarColor">@color/bg_panel</item>
              </style>
          </resources>
          EOF

          cat << 'EOF' > app/src/main/res/drawable/bg_rounded.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="@color/bg_panel"/><corners android:radius="15dp"/><stroke android:width="1dp" android:color="@color/accent_gold"/>
          </shape>
          EOF

          cat << 'EOF' > app/src/main/res/drawable/ic_launcher_foreground.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="@color/accent_gold" android:pathData="M30,30h48v10l-30,30h30v10h-48v-10l30,-30h-30z"/>
          </vector>
          EOF

          cat << 'EOF' > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/bg_dark"/><foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

      - name: "6. Layout Design (Drawer + Chat + Scan)"
        run: |
          cat << 'EOF' > app/src/main/res/layout/activity_main.xml
          <androidx.drawerlayout.widget.DrawerLayout xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:id="@+id/drawer_layout"
              android:layout_width="match_parent"
              android:layout_height="match_parent">

              <LinearLayout android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical">
                  <LinearLayout android:layout_width="match_parent" android:layout_height="65dp" android:background="@color/bg_panel" android:gravity="center_vertical" android:paddingHorizontal="15dp">
                      <ImageButton android:id="@+id/btn_menu" android:layout_width="40dp" android:layout_height="40dp" android:src="@android:drawable/ic_menu_sort_by_size" android:background="?attr/selectableItemBackgroundBorderless" app:tint="@color/accent_gold"/>
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Z-ATOMIC BRAIN" android:textColor="@color/accent_gold" android:textStyle="bold" android:textSize="18sp" android:layout_marginStart="15dp"/>
                  </LinearLayout>

                  <ScrollView android:id="@+id/scroll_view" android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1" android:padding="10dp">
                      <LinearLayout android:id="@+id/chat_container" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" />
                  </ScrollView>

                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:padding="10dp">
                      <EditText android:id="@+id/et_input" android:layout_width="0dp" android:layout_height="50dp" android:layout_weight="1" android:background="@drawable/bg_rounded" android:paddingHorizontal="15dp" android:hint="Kisse call karna hai?" android:textColor="@android:color/white" android:textColorHint="#666"/>
                      <Button android:id="@+id/btn_send" android:layout_width="50dp" android:layout_height="50dp" android:text="➤" android:backgroundTint="@color/matrix_green" android:textColor="@color/bg_dark" android:layout_marginStart="5dp"/>
                  </LinearLayout>
              </LinearLayout>

              <com.google.android.material.navigation.NavigationView
                  android:id="@+id/nav_view"
                  android:layout_width="280dp"
                  android:layout_height="match_parent"
                  android:layout_gravity="start"
                  android:background="@color/bg_panel">
                  <LinearLayout android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:padding="20dp">
                      <TextView android:layout_width="match_parent" android:layout_height="wrap_content" android:text="SYSTEM CONTROL" android:textColor="@color/accent_gold" android:textSize="16sp" android:textStyle="bold"/>
                      <Button android:id="@+id/menu_scan" android:layout_width="match_parent" android:layout_height="60dp" android:text="⚡ START FULL SCAN" android:backgroundTint="@color/matrix_green" android:textColor="@color/bg_dark" android:layout_marginTop="30dp" android:textStyle="bold"/>
                      <TextView android:id="@+id/tv_scan_count" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Memory: Empty" android:textColor="#999" android:layout_marginTop="10dp" android:gravity="center"/>
                  </LinearLayout>
              </com.google.android.material.navigation.NavigationView>
          </androidx.drawerlayout.widget.DrawerLayout>
          EOF

      - name: "7. Java Code (The Scanning Brain)"
        run: |
          cat << 'EOF' > app/src/main/java/com/zatomic/caller/MainActivity.java
          package com.zatomic.caller;

          import android.Manifest;
          import android.app.ProgressDialog;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.database.Cursor;
          import android.net.Uri;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.provider.ContactsContract;
          import android.view.Gravity;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.LinearLayout;
          import android.widget.ScrollView;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import androidx.core.view.GravityCompat;
          import androidx.drawerlayout.widget.DrawerLayout;
          import java.util.ArrayList;

          public class MainActivity extends AppCompatActivity {
              private LinearLayout chatContainer;
              private ScrollView scrollView;
              private EditText etInput;
              private DrawerLayout drawerLayout;
              private TextView tvScanCount;
              private ArrayList<String[]> contactList = new ArrayList<>();

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  chatContainer = findViewById(R.id.chat_container);
                  scrollView = findViewById(R.id.scroll_view);
                  etInput = findViewById(R.id.et_input);
                  drawerLayout = findViewById(R.id.drawer_layout);
                  tvScanCount = findViewById(R.id.tv_scan_count);

                  findViewById(R.id.btn_menu).setOnClickListener(v -> drawerLayout.openDrawer(GravityCompat.START));
                  
                  findViewById(R.id.menu_scan).setOnClickListener(v -> {
                      drawerLayout.closeDrawers();
                      performMatrixScan();
                  });

                  findViewById(R.id.btn_send).setOnClickListener(v -> {
                      String cmd = etInput.getText().toString().trim();
                      if(!cmd.isEmpty()) {
                          addChatBubble("You", cmd, true);
                          etInput.setText("");
                          handleCommand(cmd.toLowerCase());
                      }
                  });

                  checkPermissions();
                  addChatBubble("Z AI", "System Active. Salaam Seth! Menu mein jaakar numbers SCAN karein.", false);
              }

              private void performMatrixScan() {
                  ProgressDialog pd = new ProgressDialog(this);
                  pd.setTitle("ACCESSING DATABASE");
                  pd.setMessage("Decrypting Contacts...\nPlease Wait");
                  pd.setCancelable(false);
                  pd.show();

                  new Handler(Looper.getMainLooper()).postDelayed(() -> {
                      contactList.clear();
                      Cursor cursor = getContentResolver().query(ContactsContract.CommonDataKinds.Phone.CONTENT_URI, null, null, null, null);
                      if (cursor != null) {
                          while (cursor.moveToNext()) {
                              String name = cursor.getString(cursor.getColumnIndex(ContactsContract.CommonDataKinds.Phone.DISPLAY_NAME));
                              String num = cursor.getString(cursor.getColumnIndex(ContactsContract.CommonDataKinds.Phone.NUMBER));
                              contactList.add(new String[]{name.toLowerCase(), num});
                          }
                          cursor.close();
                      }
                      pd.dismiss();
                      tvScanCount.setText("Memory: " + contactList.size() + " Contacts Loaded");
                      addChatBubble("Z AI", "✅ SCAN COMPLETE!\nTotal " + contactList.size() + " numbers stored in my brain.", false);
                  }, 2500);
              }

              private void handleCommand(String input) {
                  String name = input.replaceAll("\\b(call|dial|phone|laga|mila|lagao)\\b", "").trim();
                  boolean found = false;
                  for(String[] contact : contactList) {
                      if(contact[0].contains(name)) {
                          addChatBubble("Z AI", "Ji Seth, " + contact[0].toUpperCase() + " ko call mila raha hoon.", false);
                          startActivity(new Intent(Intent.ACTION_CALL, Uri.parse("tel:" + contact[1])));
                          found = true;
                          break;
                      }
                  }
                  if(!found) addChatBubble("Z AI", "Maaf karna Seth, yeh naam meri memory mein nahi hai. Kya aapne SCAN kiya?", false);
              }

              private void addChatBubble(String sender, String msg, boolean isUser) {
                  TextView tv = new TextView(this);
                  tv.setText(msg);
                  tv.setPadding(35, 20, 35, 20);
                  tv.setTextColor(android.graphics.Color.WHITE);
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(-2, -2);
                  lp.setMargins(0, 10, 0, 10);
                  if (isUser) {
                      tv.setBackgroundResource(R.drawable.bg_rounded);
                      lp.gravity = Gravity.END;
                  } else {
                      tv.setBackgroundResource(R.drawable.bg_rounded);
                      tv.getBackground().setTint(getResources().getColor(R.color.chat_ai));
                      lp.gravity = Gravity.START;
                  }
                  tv.setLayoutParams(lp);
                  chatContainer.addView(tv);
                  scrollView.post(() -> scrollView.fullScroll(ScrollView.FOCUS_DOWN));
              }

              private void checkPermissions() {
                  ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.READ_CONTACTS, Manifest.permission.CALL_PHONE}, 1);
              }
          }
          EOF

      - name: "8. Android Manifest"
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_CONTACTS" />
              <uses-permission android:name="android.permission.CALL_PHONE" />
              <application android:label="Z Scan AI" android:icon="@mipmap/ic_launcher" android:theme="@style/Theme.ZAtomic">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: "9. Build & Upload"
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: "10. Upload Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "Z-Atomic-Scan-AI"
          path: app/build/outputs/apk/debug/app-debug.apk
