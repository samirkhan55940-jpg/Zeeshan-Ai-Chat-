name: Z+2 Monster (Mirror Engine & Turbo)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 2. Create Folders
        run: |
          mkdir -p app/src/main/java/com/zeeshan/monster
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-xxhdpi

      - name: 3. Setup Gradle
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS); repositories { google(); mavenCentral() } }
          rootProject.name = "ZPlus2Monster"
          include ':app'
          EOF
          
          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          EOF
          
          echo "org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties

      - name: 4. App Gradle (Kotlin Killer Added)
        run: |
          cat << 'EOF' > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.zeeshan.monster'
              compileSdk 34
              defaultConfig {
                  applicationId "com.zeeshan.monster"
                  minSdk 24
                  targetSdk 34
                  versionCode 4
                  versionName "4.0-Monster"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          
          configurations.all {
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
          }
          
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: 5. Manifest (Heavy Permissions)
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              
              <application android:label="Z+2 Monster" android:theme="@style/Theme.AppCompat.Light.NoActionBar" android:usesCleartextTraffic="true" android:hardwareAccelerated="true">
                  <activity android:name=".MainActivity" android:exported="true" android:configChanges="orientation|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 6. MainActivity (The Monster Engine)
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/monster/MainActivity.java
          package com.zeeshan.monster;
          
          import android.Manifest;
          import android.app.DownloadManager;
          import android.content.pm.PackageManager;
          import android.graphics.Color;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Environment;
          import android.view.View;
          import android.webkit.*;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          
          public class MainActivity extends AppCompatActivity {
              private WebView webView;
              private ProgressBar progressBar;
              private EditText urlBar;
              private TextView botalCounter;
              private Button btnTurbo;
              
              private boolean isTurboMode = false;
              private int adsTrapped = 0;
              
              // Botal Interface: JS se Android mein data laane ke liye
              public class BotalInterface {
                  @JavascriptInterface
                  public void updateAdCount(int count) {
                      adsTrapped += count;
                      runOnUiThread(() -> botalCounter.setText("🧪 Botal: " + adsTrapped));
                  }
              }
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      if (ContextCompat.checkSelfPermission(this, Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) {
                          ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.POST_NOTIFICATIONS}, 101);
                      }
                  }
                  
                  // VAJUDDHARI UI LAYOUT
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setBackgroundColor(Color.parseColor("#0F172A")); // Deep Monster Blue/Grey
                  
                  LinearLayout toolbar1 = new LinearLayout(this);
                  toolbar1.setOrientation(LinearLayout.HORIZONTAL);
                  toolbar1.setPadding(10, 10, 10, 5);
                  
                  urlBar = new EditText(this);
                  urlBar.setHint("Search Internet...");
                  urlBar.setTextColor(Color.WHITE);
                  urlBar.setHintTextColor(Color.GRAY);
                  urlBar.setLayoutParams(new LinearLayout.LayoutParams(0, -2, 1));
                  
                  Button btnGo = new Button(this);
                  btnGo.setText("GO");
                  btnGo.setBackgroundColor(Color.parseColor("#3B82F6"));
                  btnGo.setTextColor(Color.WHITE);
                  
                  toolbar1.addView(urlBar);
                  toolbar1.addView(btnGo);
                  
                  // TOOLS ROW (Turbo & Botal)
                  LinearLayout toolbar2 = new LinearLayout(this);
                  toolbar2.setOrientation(LinearLayout.HORIZONTAL);
                  toolbar2.setPadding(10, 5, 10, 10);
                  
                  btnTurbo = new Button(this);
                  btnTurbo.setText("⚡ TURBO: OFF");
                  btnTurbo.setBackgroundColor(Color.DKGRAY);
                  btnTurbo.setTextColor(Color.WHITE);
                  btnTurbo.setLayoutParams(new LinearLayout.LayoutParams(0, -2, 1));
                  
                  botalCounter = new TextView(this);
                  botalCounter.setText("🧪 Botal: 0");
                  botalCounter.setTextColor(Color.parseColor("#10B981")); // Neon Green
                  botalCounter.setTextSize(16);
                  botalCounter.setPadding(30, 10, 10, 10);
                  
                  toolbar2.addView(btnTurbo);
                  toolbar2.addView(botalCounter);
                  
                  progressBar = new ProgressBar(this, null, android.R.attr.progressBarStyleHorizontal);
                  progressBar.setMax(100);
                  progressBar.setVisibility(View.GONE);
                  
                  webView = new WebView(this);
                  webView.setLayoutParams(new LinearLayout.LayoutParams(-1, -1));
                  
                  root.addView(toolbar1);
                  root.addView(toolbar2);
                  root.addView(progressBar);
                  root.addView(webView);
                  setContentView(root);
                  
                  // ENGINE SETTINGS
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setUseWideViewPort(true);
                  
                  // Connect Botal Interface
                  webView.addJavascriptInterface(new BotalInterface(), "AndroidBotal");
                  
                  // TURBO BUTTON LOGIC
                  btnTurbo.setOnClickListener(v -> {
                      isTurboMode = !isTurboMode;
                      if(isTurboMode) {
                          btnTurbo.setText("🚀 TURBO: MAX POWER");
                          btnTurbo.setBackgroundColor(Color.parseColor("#EF4444")); // Red Monster Mode
                          Toast.makeText(this, "ALL POWER DIVERTED TO DOWNLOADS!", Toast.LENGTH_SHORT).show();
                      } else {
                          btnTurbo.setText("⚡ TURBO: OFF");
                          btnTurbo.setBackgroundColor(Color.DKGRAY);
                          Toast.makeText(this, "Turbo Mode Disabled", Toast.LENGTH_SHORT).show();
                      }
                  });
                  
                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onProgressChanged(WebView view, int newProgress) {
                          if (newProgress < 100) {
                              progressBar.setVisibility(View.VISIBLE);
                              progressBar.setProgress(newProgress);
                          } else {
                              progressBar.setVisibility(View.GONE);
                              // BOTAL SCRIPT: Ye ads ko 1 pixel ka karke piche dhakel dega (Dhokha System)
                              String botalScript = "javascript:(function() { " +
                                  "var ads = document.querySelectorAll('iframe, .ad, .ads, [id^=\"div-gpt-ad\"], ins.adsbygoogle'); " +
                                  "var count = 0; " +
                                  "ads.forEach(function(ad) { " +
                                  "  if(ad.style.position !== 'absolute') { " +
                                  "    ad.style.position = 'absolute'; " +
                                  "    ad.style.left = '-9999px'; " +
                                  "    ad.style.width = '1px'; " +
                                  "    ad.style.height = '1px'; " +
                                  "    ad.style.opacity = '0.01'; " +
                                  "    count++; " +
                                  "  } " +
                                  "}); " +
                                  "if(count > 0) AndroidBotal.updateAdCount(count); " +
                                  "})();";
                              view.evaluateJavascript(botalScript, null);
                          }
                      }
                  });
                  
                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public void onPageFinished(WebView view, String url) {
                          urlBar.setText(url);
                      }
                  });
                  
                  webView.setDownloadListener((url, userAgent, contentDisposition, mimetype, contentLength) -> {
                      try {
                          if(isTurboMode) {
                              // Turbo Mode: Pause webview background tasks to give RAM to downloader
                              webView.pauseTimers(); 
                          }
                          
                          DownloadManager.Request request = new DownloadManager.Request(Uri.parse(url));
                          request.setMimeType(mimetype);
                          String fileName = URLUtil.guessFileName(url, contentDisposition, mimetype);
                          request.setTitle("Z+2 Monster: " + fileName);
                          request.setDescription("Turbo Engine Running...");
                          request.setAllowedOverMetered(true); // Force download on any network
                          request.setNotificationVisibility(DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED);
                          request.setDestinationInExternalPublicDir(Environment.DIRECTORY_DOWNLOADS, fileName);
                          
                          DownloadManager dm = (DownloadManager) getSystemService(DOWNLOAD_SERVICE);
                          dm.enqueue(request);
                          
                          Toast.makeText(MainActivity.this, "🔥 MONSTER DOWNLOAD STARTED", Toast.LENGTH_LONG).show();
                      } catch (Exception e) {
                          Toast.makeText(MainActivity.this, "Error: " + e.getMessage(), Toast.LENGTH_SHORT).show();
                      }
                  });
                  
                  btnGo.setOnClickListener(v -> {
                      String url = urlBar.getText().toString();
                      if(!url.startsWith("http")) url = "https://www.google.com/search?q=" + url;
                      webView.loadUrl(url);
                      // Reset webview timers if Turbo was off
                      if(!isTurboMode) webView.resumeTimers();
                  });
                  
                  webView.loadUrl("https://www.google.com");
              }
              
              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) webView.goBack();
                  else super.onBackPressed();
              }
          }
          EOF

      - name: 7. Build APK
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 8. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZPlus2-Monster-Engine
          path: app/build/outputs/apk/debug/*.apk
