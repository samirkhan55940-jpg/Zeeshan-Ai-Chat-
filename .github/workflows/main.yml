name: Build Zeeshan Husain Smile (Bulletproof RAM Fix)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Create Architecture Folders
        run: |
          mkdir -p app/src/main/java/com/zeeshan/smile
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/values

      - name: 4. Gradle Setup (RAM Optimized)
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS); repositories { google(); mavenCentral() } }
          rootProject.name = 'Zeeshan-Smile-AI'
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          plugins { id 'com.android.application' version '8.2.0' apply false }
          EOF
          
          # YAHAN FIX HAI: RAM ko strictly control kiya gaya hai aur parallel builds band kiye hain
          cat << 'EOF' > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx3g -XX:+HeapDumpOnOutOfMemoryError
          org.gradle.parallel=false
          EOF

      - name: 5. Download 300MB Offline Brain (The Vault)
        run: |
          wget -q --show-progress https://huggingface.co/Qwen/Qwen1.5-0.5B-Chat-GGUF/resolve/main/qwen1_5-0_5b-chat-q4_k_m.gguf -O app/src/main/assets/z_brain.gguf

      - name: 6. Download Stable Llama Engine (ZIP Method)
        run: |
          wget -q https://github.com/ggerganov/llama.cpp/archive/refs/tags/b2400.zip -O llama.zip
          unzip -q llama.zip
          find . -maxdepth 1 -name "llama.cpp-*" -exec mv {} app/src/main/cpp/llama \;

      - name: 7. Connect Engine to Vault (Safe Logic)
        run: |
          cat << 'EOF' > app/src/main/cpp/native-lib.cpp
          #include <jni.h>
          #include <string>
          #include <vector>
          #include "llama.h"

          extern "C" JNIEXPORT jstring JNICALL
          Java_com_zeeshan_smile_MainActivity_processOfflineAI(JNIEnv* env, jobject, jstring input, jstring modelPath) {
              const char *prompt = env->GetStringUTFChars(input, 0);
              const char *path = env->GetStringUTFChars(modelPath, 0);
              
              llama_backend_init();
              llama_model_params model_params = llama_model_default_params();
              llama_model * model = llama_load_model_from_file(path, model_params);
              
              if (model == NULL) {
                  return env->NewStringUTF("Zeeshan AI Error: 300MB Vault load nahi hua.");
              }

              llama_context_params ctx_params = llama_context_default_params();
              ctx_params.n_ctx = 512;
              llama_context * ctx = llama_new_context_with_model(model, ctx_params);

              std::string response = "Zeeshan Husain Smile AI (Real Engine): \n";
              std::vector<llama_token> tokens(512);
              
              int n_tokens = llama_tokenize(model, prompt, strlen(prompt), tokens.data(), tokens.size(), true, true);
              
              if (n_tokens > 0) {
                  llama_batch batch = llama_batch_get_one(tokens.data(), n_tokens, 0, 0);
                  if (llama_decode(ctx, batch) == 0) {
                      int n_vocab = llama_n_vocab(model);
                      for (int i = 0; i < 30; i++) {
                          float * logits = llama_get_logits_ith(ctx, batch.n_tokens - 1);
                          llama_token new_token_id = 0;
                          float max_prob = -1e9f;
                          
                          for (int j = 0; j < n_vocab; j++) {
                              if (logits[j] > max_prob) {
                                  max_prob = logits[j];
                                  new_token_id = j;
                              }
                          }
                          
                          if (llama_token_is_eog(model, new_token_id)) break;
                          
                          char buf[128];
                          int n_chars = llama_token_to_piece(model, new_token_id, buf, sizeof(buf), 0, true);
                          if (n_chars > 0) response += std::string(buf, n_chars);
                          
                          batch = llama_batch_get_one(&new_token_id, 1, n_tokens + i, 0);
                          if (llama_decode(ctx, batch) != 0) break;
                      }
                  } else {
                      response += "Math error.";
                  }
              }

              llama_free(ctx);
              llama_free_model(model);
              llama_backend_free();

              env->ReleaseStringUTFChars(input, prompt);
              env->ReleaseStringUTFChars(modelPath, path);
              
              return env->NewStringUTF(response.c_str());
          }
          EOF

          cat << 'EOF' > app/src/main/cpp/CMakeLists.txt
          cmake_minimum_required(VERSION 3.22.1)
          project("z_engine")
          
          set(LLAMA_WERROR OFF CACHE BOOL "" FORCE)
          set(GGML_OPENMP OFF CACHE BOOL "" FORCE)
          set(GGML_LLAMAFILE OFF CACHE BOOL "" FORCE)
          set(GGML_RPC OFF CACHE BOOL "" FORCE)
          
          add_subdirectory(llama)
          add_library(z_engine SHARED native-lib.cpp)
          target_include_directories(z_engine PRIVATE llama/include llama llama/ggml/include)
          target_link_libraries(z_engine llama log)
          EOF

      - name: 8. Java Premium UI (Mic + Speaker)
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/smile/MainActivity.java
          package com.zeeshan.smile;

          import android.Manifest;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.graphics.Color;
          import android.graphics.drawable.GradientDrawable;
          import android.os.Bundle;
          import android.speech.RecognizerIntent;
          import android.speech.tts.TextToSpeech;
          import android.view.Gravity;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import java.io.File;
          import java.io.FileOutputStream;
          import java.io.InputStream;
          import java.util.ArrayList;
          import java.util.Locale;

          public class MainActivity extends AppCompatActivity {
              static { System.loadLibrary("z_engine"); }
              public native String processOfflineAI(String input, String modelPath);

              private LinearLayout chatArea;
              private ScrollView scrollView;
              private EditText inputField;
              private Button sendBtn, micBtn;
              private TextToSpeech tts;
              private String absoluteModelPath = "";

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  if (ActivityCompat.checkSelfPermission(this, Manifest.permission.RECORD_AUDIO) != PackageManager.PERMISSION_GRANTED) {
                      ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.RECORD_AUDIO}, 100);
                  }
                  tts = new TextToSpeech(this, status -> {
                      if(status == TextToSpeech.SUCCESS) tts.setLanguage(new Locale("hi", "IN"));
                  });

                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setBackgroundColor(Color.parseColor("#080808"));

                  TextView title = new TextView(this);
                  title.setText("Zeeshan Husain Smile - Real AI");
                  title.setTextColor(Color.parseColor("#FF0000"));
                  title.setTextSize(22);
                  title.setPadding(30, 40, 30, 40);
                  title.setGravity(Gravity.CENTER);
                  root.addView(title);

                  scrollView = new ScrollView(this);
                  scrollView.setLayoutParams(new LinearLayout.LayoutParams(-1, 0, 1.0f));
                  chatArea = new LinearLayout(this);
                  chatArea.setOrientation(LinearLayout.VERTICAL);
                  chatArea.setPadding(20, 20, 20, 20);
                  scrollView.addView(chatArea);
                  root.addView(scrollView);

                  LinearLayout bottomBar = new LinearLayout(this);
                  bottomBar.setOrientation(LinearLayout.HORIZONTAL);
                  bottomBar.setBackgroundColor(Color.parseColor("#151515"));
                  bottomBar.setPadding(20, 20, 20, 20);
                  bottomBar.setGravity(Gravity.CENTER_VERTICAL);

                  micBtn = new Button(this);
                  micBtn.setText("🎤");
                  micBtn.setTextSize(20);
                  micBtn.setBackgroundColor(Color.TRANSPARENT);
                  micBtn.setEnabled(false);
                  micBtn.setOnClickListener(v -> {
                      Intent intent = new Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH);
                      intent.putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL, RecognizerIntent.LANGUAGE_MODEL_FREE_FORM);
                      startActivityForResult(intent, 101);
                  });

                  inputField = new EditText(this);
                  inputField.setHint("Dimaag load ho raha hai...");
                  inputField.setHintTextColor(Color.GRAY);
                  inputField.setTextColor(Color.WHITE);
                  inputField.setEnabled(false);
                  inputField.setLayoutParams(new LinearLayout.LayoutParams(0, -2, 1.0f));

                  sendBtn = new Button(this);
                  sendBtn.setText("➤");
                  sendBtn.setTextColor(Color.WHITE);
                  sendBtn.setBackgroundColor(Color.parseColor("#8B0000"));
                  sendBtn.setEnabled(false);
                  sendBtn.setOnClickListener(v -> handleSend(inputField.getText().toString()));

                  bottomBar.addView(micBtn);
                  bottomBar.addView(inputField);
                  bottomBar.addView(sendBtn);
                  root.addView(bottomBar);
                  setContentView(root);
                  
                  addMessage("System: Asli AI Engine 300MB Vault ko padh raha hai...", false);
                  
                  new Thread(() -> {
                      try {
                          File file = new File(getFilesDir(), "z_brain.gguf");
                          if (!file.exists()) {
                              InputStream is = getAssets().open("z_brain.gguf");
                              FileOutputStream fos = new FileOutputStream(file);
                              byte[] buffer = new byte[8192];
                              int length;
                              while ((length = is.read(buffer)) > 0) fos.write(buffer, 0, length);
                              fos.flush(); fos.close(); is.close();
                          }
                          absoluteModelPath = file.getAbsolutePath();
                          runOnUiThread(() -> {
                              addMessage("System: Engine 100% Ready! Ab duniya ka koi bhi sawal puchiye.", false);
                              inputField.setEnabled(true); inputField.setHint("Yahan likhein...");
                              sendBtn.setEnabled(true); micBtn.setEnabled(true);
                          });
                      } catch (Exception e) {}
                  }).start();
              }

              private void handleSend(String text) {
                  if(text.isEmpty()) return;
                  addMessage(text, true); inputField.setText("");
                  new Thread(() -> {
                      String aiResponse = processOfflineAI(text, absoluteModelPath);
                      runOnUiThread(() -> {
                          addMessage(aiResponse, false);
                          tts.speak(aiResponse, TextToSpeech.QUEUE_FLUSH, null, null);
                      });
                  }).start();
              }

              private void addMessage(String text, boolean isUser) {
                  TextView tv = new TextView(this); tv.setText(text); tv.setTextColor(Color.WHITE);
                  tv.setPadding(30, 20, 30, 20); tv.setTextSize(16);
                  LinearLayout.LayoutParams params = new LinearLayout.LayoutParams(-2, -2);
                  params.setMargins(10, 10, 10, 10);
                  GradientDrawable bg = new GradientDrawable(); bg.setCornerRadius(20f);
                  if(isUser) {
                      bg.setColor(Color.parseColor("#005C4B")); params.gravity = Gravity.END;
                  } else {
                      bg.setColor(Color.parseColor("#4A0000")); params.gravity = Gravity.START;
                  }
                  tv.setBackground(bg); tv.setLayoutParams(params);
                  chatArea.addView(tv); scrollView.post(() -> scrollView.fullScroll(ScrollView.FOCUS_DOWN));
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if (requestCode == 101 && resultCode == RESULT_OK && data != null) {
                      ArrayList<String> res = data.getStringArrayListExtra(RecognizerIntent.EXTRA_RESULTS);
                      if (res != null && !res.isEmpty()) handleSend(res.get(0));
                  }
              }
              @Override
              protected void onDestroy() { if(tts != null) tts.shutdown(); super.onDestroy(); }
          }
          EOF

      - name: 9. App Configuration
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.zeeshan.smile">
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <application android:label="Zeeshan Smile" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.zeeshan.smile'
              compileSdk 34
              defaultConfig {
                  applicationId "com.zeeshan.smile"
                  minSdk 24
                  targetSdk 34
                  versionCode 11
                  versionName "11.0-Bulletproof-Engine"
                  ndk { abiFilters 'arm64-v8a' }
              }
              aaptOptions { noCompress 'gguf' }
              externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt" } }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

      - name: 10. Compile Asli Engine & Build APK
        env:
          # YAHAN MASTER FIX HAI: Engine ko strictly sirf '1 worker' (Single Core) use karne ka order diya hai
          CMAKE_BUILD_PARALLEL_LEVEL: "1"
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          # --no-daemon lagane se Gradle background me RAM nahi khata
          ./gradlew :app:assembleDebug --no-daemon

      - name: 11. Upload Final Master APK
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-Smile-Real-AI-Engine
          path: app/build/outputs/apk/debug/*.apk
