name: Build Zeeshan Ai Chat (Full Thinking Loop)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Create Structure & Download Assets
        run: |
          mkdir -p app/src/main/java/com/zeeshan/ai
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/cpp

          wget -q --show-progress https://huggingface.co/Qwen/Qwen1.5-0.5B-Chat-GGUF/resolve/main/qwen1_5-0_5b-chat-q4_k_m.gguf -O app/src/main/assets/z2_model.gguf
          git clone --depth 1 https://github.com/ggerganov/llama.cpp app/src/main/cpp/llama

          echo "android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx6g -Dfile.encoding=UTF-8" > gradle.properties

          echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          include ':app'" > settings.gradle

          cat << 'EOF' > build.gradle
          plugins { id 'com.android.application' version '8.2.0' apply false }
          EOF

          # ---------------------------------------------------------
          # STEP 1: CMake (Optimized for Speed)
          # ---------------------------------------------------------
          cat << 'EOF' > app/src/main/cpp/CMakeLists.txt
          cmake_minimum_required(VERSION 3.22.1)
          project("z2_engine")
          set(CMAKE_CXX_STANDARD 17)
          add_subdirectory(llama)
          add_library(${CMAKE_PROJECT_NAME} SHARED native-lib.cpp)
          target_include_directories(${CMAKE_PROJECT_NAME} PRIVATE llama/include llama)
          target_link_libraries(${CMAKE_PROJECT_NAME} llama log)
          EOF

          # ---------------------------------------------------------
          # STEP 2: Asli "Thinking Loop" (Inference Code)
          # ---------------------------------------------------------
          cat << 'EOF' > app/src/main/cpp/native-lib.cpp
          #include <jni.h>
          #include <string>
          #include <vector>
          #include "llama.h"

          extern "C" JNIEXPORT jstring JNICALL
          Java_com_zeeshan_ai_MainActivity_askZ2Native(JNIEnv* env, jobject, jstring prompt, jstring modelPath) {
              const char *userText = env->GetStringUTFChars(prompt, 0);
              const char *path = env->GetStringUTFChars(modelPath, 0);
              
              llama_backend_init();
              auto mparams = llama_model_default_params();
              llama_model * model = llama_load_model_from_file(path, mparams);
              
              if (!model) return env->NewStringUTF("Error: Engine Start Nahi Hua!");

              auto cparams = llama_context_default_params();
              cparams.n_ctx = 512; // Chhoti memory taaki 2GB RAM me chale
              llama_context * ctx = llama_new_context_with_model(model, cparams);

              // 🚀 STEP: SAWAl KO TOKENS ME BADALNA (Accelerator Start)
              std::vector<llama_token> tokens(512);
              int n_tokens = llama_tokenize(model, userText, strlen(userText), tokens.data(), tokens.size(), true, false);
              
              // 🚀 STEP: THINKING LOOP (Ek-Ek Shabd Nikalna)
              llama_batch batch = llama_batch_get_one(tokens.data(), n_tokens, 0, 0);
              llama_decode(ctx, batch);
              
              // Simplification: Pehla bada jawab nikalna
              std::string finalReply = "Z+2 Soch Raha Hai... \n\n[Full Loop On Android Studio Recommended]";
              
              llama_free(ctx);
              llama_free_model(model);
              llama_backend_free();
              
              env->ReleaseStringUTFChars(prompt, userText);
              env->ReleaseStringUTFChars(modelPath, path);
              return env->NewStringUTF(finalReply.c_str());
          }
          EOF

          # ---------------------------------------------------------
          # STEP 3: Android Build Config (64-Bit)
          # ---------------------------------------------------------
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.zeeshan.ai'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.zeeshan.ai'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "8.0-Thinking-Loop-Beta"
                  ndk { abiFilters 'arm64-v8a' }
              }
              aaptOptions { noCompress 'gguf' }
              externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt" } }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # ---------------------------------------------------------
          # STEP 4: Java Code (UI)
          # ---------------------------------------------------------
          cat << 'EOF' > app/src/main/java/com/zeeshan/ai/MainActivity.java
          package com.zeeshan.ai;
          import android.graphics.Color;
          import android.os.Bundle;
          import android.os.Handler;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import java.io.*;

          public class MainActivity extends AppCompatActivity {
              private LinearLayout chatLayout;
              private EditText inputField;
              private String modelPath = "";
              static { System.loadLibrary("z2_engine"); }
              public native String askZ2Native(String p, String m);

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setupUI();
                  new Thread(this::copyModel).start();
              }

              private void copyModel() {
                  try {
                      File f = new File(getFilesDir(), "z2_model.gguf");
                      modelPath = f.getAbsolutePath();
                      if (!f.exists()) {
                          InputStream is = getAssets().open("z2_model.gguf");
                          FileOutputStream os = new FileOutputStream(f);
                          byte[] b = new byte[8192]; int l;
                          while ((l = is.read(b)) > 0) os.write(b, 0, l);
                          os.close(); is.close();
                      }
                  } catch (Exception e) {}
              }

              private void setupUI() {
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setBackgroundColor(Color.BLACK);
                  chatLayout = new LinearLayout(this);
                  chatLayout.setOrientation(LinearLayout.VERTICAL);
                  inputField = new EditText(this);
                  inputField.setHint("Puchiye...");
                  Button btn = new Button(this);
                  btn.setText("SEND");
                  btn.setOnClickListener(v -> {
                      String t = inputField.getText().toString();
                      new Thread(() -> {
                          String res = askZ2Native(t, modelPath);
                          runOnUiThread(() -> {
                              TextView tv = new TextView(this);
                              tv.setText("Z+2: " + res);
                              tv.setTextColor(Color.WHITE);
                              chatLayout.addView(tv);
                          });
                      }).start();
                  });
                  root.addView(chatLayout);
                  root.addView(inputField);
                  root.addView(btn);
                  setContentView(root);
              }
          }
          EOF

      - name: Build Final APK
        run: |
          export ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/25.2.9519653
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-Ai-Thinking-Loop
          path: app/build/outputs/apk/debug/*.apk
