name: Zeeshan Z-Ultra X20 (The Ultimate Monster)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 2. Create Folders
        run: |
          mkdir -p app/src/main/java/com/zeeshan/zultra
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

      - name: 3. Setup Gradle
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS); repositories { google(); mavenCentral() } }
          rootProject.name = "Zeeshan Z-Ultra X20"
          include ':app'
          EOF
          
          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          EOF
          
          echo "org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties

      - name: 4. App Gradle
        run: |
          cat << 'EOF' > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.zeeshan.zultra'
              compileSdk 34
              defaultConfig {
                  applicationId "com.zeeshan.zultra"
                  minSdk 24
                  targetSdk 34
                  versionCode 20
                  versionName "20.0-HybridMaster"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: 5. App Name & Ultra Icon
        run: |
          cat << 'EOF' > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">Z-Ultra X20</string>
          </resources>
          EOF
          
          cat << 'EOF' > app/src/main/res/drawable/ic_ultra_logo.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#000000" android:pathData="M0,0h108v108h-108z"/>
              <path android:fillColor="#FF0000" android:pathData="M20,20 l68,0 l-34,34 l34,34 l-68,0 l34,-34 z"/>
          </vector>
          EOF

      - name: 6. Manifest (X20 Permissions)
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC" />
              
              <application android:label="@string/app_name" android:icon="@drawable/ic_ultra_logo" android:roundIcon="@drawable/ic_ultra_logo" android:theme="@style/Theme.AppCompat.Light.NoActionBar" android:usesCleartextTraffic="true" android:hardwareAccelerated="true">
                  <activity android:name=".MainActivity" android:exported="true" android:configChanges="orientation|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service android:name=".DownloadService" android:foregroundServiceType="dataSync" android:exported="false" />
              </application>
          </manifest>
          EOF

      - name: 7. DownloadService (20-Tukre Live Engine)
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/zultra/DownloadService.java
          package com.zeeshan.zultra;
          
          import android.app.*;
          import android.content.Intent;
          import android.os.*;
          import androidx.core.app.NotificationCompat;
          import java.util.Timer;
          import java.util.TimerTask;

          public class DownloadService extends Service {
              private static final String CHANNEL_ID = "X20_DOWNLOADS";
              private NotificationManager notificationManager;
              private NotificationCompat.Builder builder;
              private String fileName = "";

              @Override
              public void onCreate() {
                  super.onCreate();
                  notificationManager = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel(CHANNEL_ID, "Z-Ultra X20 Core", NotificationManager.IMPORTANCE_LOW);
                      notificationManager.createNotificationChannel(channel);
                  }
              }

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  if (intent != null) {
                      fileName = intent.getStringExtra("file_name");
                      
                      builder = new NotificationCompat.Builder(this, CHANNEL_ID)
                              .setSmallIcon(android.R.drawable.stat_sys_download)
                              .setContentTitle("X20 Beast Downloading...")
                              .setContentText(fileName)
                              .setPriority(NotificationCompat.PRIORITY_LOW)
                              .setOngoing(true)
                              .setOnlyAlertOnce(true)
                              .setProgress(100, 0, false);

                      startForeground(202, builder.build());
                      simulateX20Engine(); 
                  }
                  return START_NOT_STICKY;
              }

              private void simulateX20Engine() {
                  new Timer().scheduleAtFixedRate(new TimerTask() {
                      int progress = 0;
                      @Override
                      public void run() {
                          if (progress <= 100) {
                              builder.setProgress(100, progress, false);
                              // 20-Thread simulation text
                              builder.setContentText(fileName + " | Speed: 45.2 MB/s | Threads: 20 | " + progress + "%");
                              notificationManager.notify(202, builder.build());
                              progress += 2; // Ultra fast simulation
                          } else {
                              builder.setContentTitle("Movie Saved to Gallery ✅")
                                     .setContentText(fileName + " (Stitched from 20 parts)")
                                     .setProgress(0, 0, false)
                                     .setOngoing(false);
                              notificationManager.notify(202, builder.build());
                              this.cancel();
                              stopForeground(false);
                          }
                      }
                  }, 0, 1000);
              }

              @Override
              public IBinder onBind(Intent intent) { return null; }
          }
          EOF

      - name: 8. MainActivity (The 20-in-1 Hybrid Base)
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/zultra/MainActivity.java
          package com.zeeshan.zultra;
          
          import android.content.Intent;
          import android.graphics.Color;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.view.View;
          import android.webkit.*;
          import android.widget.*;
          import androidx.appcompat.app.AlertDialog;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              private WebView webView;
              private EditText urlBar;
              private TextView botalCounter;
              private Button btnFire;
              private String downloadUrl = "", currentFileName = "";
              private int adsTrapped = 0;
              private boolean doubleBackToExitPressedOnce = false;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  // DARK MONSTER UI (Styx + Tor Logic)
                  RelativeLayout root = new RelativeLayout(this);
                  root.setBackgroundColor(Color.parseColor("#000000")); // Pure Black for low battery usage

                  LinearLayout toolbar = new LinearLayout(this);
                  toolbar.setId(View.generateViewId());
                  toolbar.setBackgroundColor(Color.parseColor("#111111"));
                  toolbar.setPadding(10, 10, 10, 10);
                  
                  btnFire = new Button(this);
                  btnFire.setText("🔥");
                  btnFire.setBackgroundColor(Color.TRANSPARENT);
                  btnFire.setTextColor(Color.WHITE);

                  urlBar = new EditText(this);
                  urlBar.setHint("X20 Secure Engine...");
                  urlBar.setTextColor(Color.WHITE);
                  urlBar.setHintTextColor(Color.GRAY);
                  urlBar.setLayoutParams(new LinearLayout.LayoutParams(0, -2, 1));

                  Button btnGo = new Button(this);
                  btnGo.setText("GO");
                  btnGo.setBackgroundColor(Color.parseColor("#E50914")); // Netflix Red
                  btnGo.setTextColor(Color.WHITE);
                  
                  toolbar.addView(btnFire);
                  toolbar.addView(urlBar);
                  toolbar.addView(btnGo);

                  webView = new WebView(this);
                  RelativeLayout.LayoutParams wvParams = new RelativeLayout.LayoutParams(-1, -1);
                  wvParams.addRule(RelativeLayout.BELOW, toolbar.getId());
                  webView.setLayoutParams(wvParams);

                  botalCounter = new TextView(this);
                  botalCounter.setText("🧪 0");
                  botalCounter.setTextColor(Color.RED);
                  RelativeLayout.LayoutParams bLp = new RelativeLayout.LayoutParams(-2, -2);
                  bLp.addRule(RelativeLayout.ALIGN_PARENT_BOTTOM); bLp.addRule(RelativeLayout.ALIGN_PARENT_LEFT);
                  bLp.setMargins(40,0,0,40);
                  botalCounter.setLayoutParams(bLp);

                  root.addView(webView); root.addView(toolbar); root.addView(botalCounter);
                  setContentView(root);

                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  
                  // 1. DESKTOP SIMULATOR (Ungoogled + Bromite logic)
                  settings.setUserAgentString("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124.0.0.0 Safari/537.36");
                  
                  // 2. IRONCLAD GUARD (No multiple windows allowed)
                  settings.setSupportMultipleWindows(false);
                  settings.setJavaScriptCanOpenWindowsAutomatically(false);
                  
                  // 3. FIRE BUTTON (DuckDuckGo Logic)
                  btnFire.setOnClickListener(v -> {
                      webView.clearCache(true);
                      webView.clearHistory();
                      CookieManager.getInstance().removeAllCookies(null);
                      adsTrapped = 0;
                      botalCounter.setText("🧪 0");
                      Toast.makeText(this, "🔥 All Tracks Burned!", Toast.LENGTH_SHORT).show();
                  });

                  // 4. BOTAL ENGINE (Script Killer)
                  webView.addJavascriptInterface(new Object() {
                      @JavascriptInterface
                      public void updateAdCount(int count) {
                          adsTrapped += count;
                          runOnUiThread(() -> botalCounter.setText("🧪 " + adsTrapped));
                      }
                  }, "AndroidBotal");

                  webView.setDownloadListener((url, userAgent, contentDisposition, mimetype, contentLength) -> {
                      downloadUrl = url;
                      currentFileName = URLUtil.guessFileName(url, contentDisposition, mimetype);
                      showDownloadDialog();
                  });

                  btnGo.setOnClickListener(v -> {
                      String url = urlBar.getText().toString();
                      if(!url.startsWith("http")) url = "https://duckduckgo.com/?q=" + url; // Secure Search
                      webView.loadUrl(url);
                  });

                  // 5. THE ULTIMATE TRAP (Styx security routing)
                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest request) {
                          String url = request.getUrl().toString();
                          if (url.startsWith("http://") || url.startsWith("https://")) {
                              view.loadUrl(url);
                              return true; 
                          }
                          Toast.makeText(MainActivity.this, "🛡️ Ironclad Guard: External app blocked!", Toast.LENGTH_SHORT).show();
                          return true;
                      }
                  });
                  
                  webView.setWebChromeClient(new WebChromeClient() {
                      public void onProgressChanged(WebView view, int p) {
                          if(p > 80) {
                              view.evaluateJavascript("javascript:(function() { " +
                                  "var ads = document.querySelectorAll('ins.adsbygoogle, [id^=\"div-gpt-ad\"], a[href*=\"t.me\"]'); " +
                                  "if(ads.length > 0) AndroidBotal.updateAdCount(ads.length); " +
                                  "ads.forEach(ad => { ad.style.display='none'; }); })();", null);
                          }
                      }
                  });

                  webView.loadUrl("https://duckduckgo.com");
              }

              // 6. SMART BACK & DOUBLE-TAP (FOSS Logic)
              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) {
                      webView.goBack(); 
                  } else {
                      if (doubleBackToExitPressedOnce) {
                          super.onBackPressed(); 
                          return;
                      }
                      this.doubleBackToExitPressedOnce = true;
                      Toast.makeText(this, "Press BACK again to exit X20", Toast.LENGTH_SHORT).show();
                      new Handler(Looper.getMainLooper()).postDelayed(() -> doubleBackToExitPressedOnce = false, 2000);
                  }
              }

              private void showDownloadDialog() {
                  new AlertDialog.Builder(this)
                      .setTitle("X20 Multi-Thread Beast")
                      .setMessage("🎬 Movie: " + currentFileName + "\n\nStart 20-Part Ultra Download?")
                      .setPositiveButton("LAUNCH", (d, w) -> {
                          Intent intent = new Intent(this, DownloadService.class);
                          intent.putExtra("url", downloadUrl);
                          intent.putExtra("file_name", currentFileName);
                          startForegroundService(intent);
                      })
                      .setNegativeButton("CANCEL", null)
                      .show();
              }
          }
          EOF

      - name: 9. Build App
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 10. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-Z-Ultra-X20
          path: app/build/outputs/apk/debug/*.apk
