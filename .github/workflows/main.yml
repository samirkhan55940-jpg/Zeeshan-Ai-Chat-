name: "Build Z-Atomic Caller (Flawless AI Brain Edition)"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "1. Checkout Code"
        uses: actions/checkout@v4

      - name: "2. Set up JDK 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: "3. Create App Directories"
        run: |
          mkdir -p app/src/main/java/com/zatomic/caller
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/assets

      - name: "4. Initialize Gradle System"
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = "ZAtomicCaller"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          plugins { id 'com.android.application' version '8.3.0' apply false }
          EOF

          cat << 'EOF' > gradle.properties
          org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          EOF
          
          gradle wrapper --gradle-version 8.4

      - name: "5. Download 50MB AI Brain Model (Fixed Curl)"
        run: |
          echo "Downloading Voice Model..."
          curl -L "https://alphacephei.com/vosk/models/vosk-model-small-en-in-0.4.zip" -o vosk-model.zip
          unzip -q vosk-model.zip
          mv vosk-model-small-en-in-0.4 app/src/main/assets/model
          rm vosk-model.zip

      - name: "6. Android Config (Fixed Spelling)"
        run: |
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.zatomic.caller'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.zatomic.caller'
                  minSdk 26
                  targetSdk 34
                  versionCode 3
                  versionName "3.0-Perfect-AI"
              }
              buildTypes {
                  release {
                      minifyEnabled true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              
              implementation 'net.java.dev.jna:jna:5.13.0@aar'
              // Spelling theek kar di gayi hai (alphacephei) - Ab engine yahan se auto-download hoga
              implementation 'com.alphacephei:vosk-android:0.3.38@aar'
          }
          EOF

      - name: "7. Z-Style UI & Resources"
        run: |
          cat << 'EOF' > app/src/main/res/values/colors.xml
          <resources>
              <color name="bg_dark">#000000</color>
              <color name="btn_center">#1C1C1E</color>
              <color name="text_white">#FFFFFF</color>
              <color name="accent_gold">#FFD700</color>
              <color name="accent_green">#34C759</color>
              <color name="accent_red">#FF3B30</color>
          </resources>
          EOF

          cat << 'EOF' > app/src/main/res/drawable/bg_round_z.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="@color/btn_center"/>
              <stroke android:width="3dp" android:color="@color/accent_gold"/>
          </shape>
          EOF

          cat << 'EOF' > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#000000" android:pathData="M0,0h108v108h-108z"/>
              <path android:fillColor="#FFD700" android:pathData="M30,30 h48 v10 l-30,30 h30 v10 h-48 v-10 l30,-30 h-30 z"/>
          </vector>
          EOF

          cat << 'EOF' > app/src/main/res/layout/activity_main.xml
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="@color/bg_dark" android:padding="20dp">

              <TextView android:id="@+id/tv_top_name" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="ZEESHAN" android:textColor="@color/accent_gold" android:textSize="26sp" android:textStyle="bold" android:letterSpacing="0.2" android:layout_centerHorizontal="true" android:layout_marginTop="10dp"/>

              <TextView android:id="@+id/tv_status" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="System Ready" android:textColor="#888888" android:layout_below="@id/tv_top_name" android:layout_centerHorizontal="true" android:layout_marginTop="5dp" android:textSize="14sp" android:gravity="center"/>

              <!-- The Big Number Show Area -->
              <TextView android:id="@+id/tv_big_number" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="" android:textColor="@color/accent_green" android:textSize="40sp" android:textStyle="bold" android:layout_below="@id/tv_status" android:layout_centerHorizontal="true" android:layout_marginTop="20dp"/>

              <TextView android:id="@+id/logo_z" android:layout_width="150dp" android:layout_height="150dp" android:text="Z" android:textColor="@color/accent_gold" android:textSize="80sp" android:textStyle="bold" android:gravity="center" android:background="@drawable/bg_round_z" android:layout_centerInParent="true"/>

              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:layout_alignParentBottom="true" android:orientation="vertical" android:gravity="center" android:layout_marginBottom="20dp">
                  <Button android:id="@+id/btn_sync" android:layout_width="match_parent" android:layout_height="60dp" android:text="LOAD AI BRAIN &amp; CONTACTS" android:backgroundTint="#1C1C1E" android:textColor="@color/text_white" android:textStyle="bold" android:layout_marginBottom="15dp"/>
                  <Button android:id="@+id/btn_toggle_bg" android:layout_width="match_parent" android:layout_height="60dp" android:text="TURN ON BACKGROUND AI" android:backgroundTint="@color/accent_green" android:textColor="@color/bg_dark" android:textStyle="bold"/>
              </LinearLayout>
          </RelativeLayout>
          EOF

      - name: "8. AndroidManifest.xml"
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.READ_CONTACTS" />
              <uses-permission android:name="android.permission.CALL_PHONE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MICROPHONE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              
              <queries>
                  <intent><action android:name="android.speech.RecognitionService" /></intent>
                  <intent><action android:name="android.intent.action.TTS_SERVICE" /></intent>
              </queries>

              <application android:label="Z Pure AI" android:icon="@mipmap/ic_launcher" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="portrait" android:launchMode="singleTop">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service android:name=".VoiceBackgroundService" android:foregroundServiceType="microphone" android:exported="false" />
              </application>
          </manifest>
          EOF

      - name: "9. Java Code: VoiceBackgroundService"
        run: |
          cat << 'EOF' > app/src/main/java/com/zatomic/caller/VoiceBackgroundService.java
          package com.zatomic.caller;

          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.Service;
          import android.content.Intent;
          import android.database.Cursor;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.IBinder;
          import android.os.Looper;
          import android.provider.ContactsContract;
          import android.speech.tts.TextToSpeech;
          import android.speech.tts.UtteranceProgressListener;

          import androidx.annotation.Nullable;
          import androidx.core.app.NotificationCompat;

          import org.json.JSONObject;
          import org.vosk.Model;
          import org.vosk.Recognizer;
          import org.vosk.android.RecognitionListener;
          import org.vosk.android.SpeechService;
          import org.vosk.android.StorageService;

          import java.util.ArrayList;
          import java.util.Locale;

          public class VoiceBackgroundService extends Service implements RecognitionListener {

              private SpeechService voskSpeechService;
              private Model voskModel;
              private TextToSpeech tts;
              private Handler restartHandler = new Handler(Looper.getMainLooper());

              private static class MyContact {
                  String name; String number;
                  MyContact(String n, String num) { this.name = n; this.number = num; }
              }
              
              private ArrayList<MyContact> allContacts = new ArrayList<>();
              
              private boolean isWaitingForDialOrHold = false;
              private String pendingNumberToCall = "";
              private boolean isEngineReady = false;

              @Override
              public void onCreate() {
                  super.onCreate();
                  createNotificationChannel();
                  startForeground(1, getNotification("100% Offline AI Brain Running..."));
                  
                  loadContacts();
                  setupTTS();
                  initVoskEngine();
              }

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  return START_STICKY; 
              }

              private void initVoskEngine() {
                  StorageService.unpack(this, "model", "model",
                          (model) -> {
                              this.voskModel = model;
                              isEngineReady = true;
                              if(MainActivity.instance != null) {
                                  MainActivity.instance.updateStatus("System Ready! Say 'Z Call [Name]'");
                              }
                              startVoskListening();
                          },
                          (exception) -> { 
                              if(MainActivity.instance != null) MainActivity.instance.updateStatus("Engine Load Error!");
                          }
                  );
              }

              private void startVoskListening() {
                  if(!isEngineReady) return;
                  if (voskSpeechService != null) {
                      voskSpeechService.stop();
                      voskSpeechService = null;
                  }
                  try {
                      Recognizer rec = new Recognizer(voskModel, 16000.0f);
                      voskSpeechService = new SpeechService(rec, 16000.0f);
                      voskSpeechService.startListening(this);
                  } catch (Exception e) {}
              }

              private void stopVoskListeningTemporarily() {
                  if (voskSpeechService != null) {
                      voskSpeechService.stop();
                      voskSpeechService = null;
                  }
              }

              private void loadContacts() {
                  allContacts.clear();
                  try {
                      Cursor cursor = getContentResolver().query(ContactsContract.CommonDataKinds.Phone.CONTENT_URI, null, null, null, null);
                      if (cursor != null) {
                          while (cursor.moveToNext()) {
                              int nameIndex = cursor.getColumnIndex(ContactsContract.CommonDataKinds.Phone.DISPLAY_NAME);
                              int numberIndex = cursor.getColumnIndex(ContactsContract.CommonDataKinds.Phone.NUMBER);
                              if (nameIndex != -1 && numberIndex != -1) {
                                  String name = cursor.getString(nameIndex).toLowerCase().trim();
                                  String number = cursor.getString(numberIndex).replaceAll("[^0-9+]", "");
                                  allContacts.add(new MyContact(name, number));
                              }
                          }
                          cursor.close();
                      }
                  } catch (Exception e) {}
              }

              private void setupTTS() {
                  tts = new TextToSpeech(this, status -> {
                      if (status == TextToSpeech.SUCCESS) {
                          tts.setLanguage(new Locale("hi", "IN"));
                          tts.setOnUtteranceProgressListener(new UtteranceProgressListener() {
                              @Override public void onStart(String utteranceId) {}
                              @Override public void onError(String utteranceId) { startVoskListening(); }
                              @Override public void onDone(String utteranceId) {
                                  restartHandler.post(() -> startVoskListening());
                              }
                          });
                      }
                  });
              }

              @Override
              public void onResult(String hypothesis) {
                  try {
                      JSONObject obj = new JSONObject(hypothesis);
                      String spokenText = obj.getString("text").toLowerCase().trim();
                      if(spokenText.isEmpty()) return;
                      
                      if(isWaitingForDialOrHold) {
                          processDialOrHold(spokenText);
                      } else {
                          processMainCommand(spokenText);
                      }
                  } catch(Exception e){}
              }

              @Override public void onPartialResult(String h) {}
              @Override public void onFinalResult(String h) { onResult(h); }
              @Override public void onError(Exception e) { 
                  restartHandler.postDelayed(() -> startVoskListening(), 1000); 
              }
              @Override public void onTimeout() { startVoskListening(); }

              private void processMainCommand(String spokenText) {
                  if (spokenText.contains("z ") || spokenText.startsWith("z") || spokenText.contains("zed ")) {
                      
                      boolean wantsToCall = spokenText.contains("call") || spokenText.contains("phone") || 
                                            spokenText.contains("lagao") || spokenText.contains("dial") || 
                                            spokenText.contains("mila") || spokenText.contains("baat kara") || 
                                            spokenText.contains("number likh");

                      if (wantsToCall) {
                          String targetData = spokenText.replaceAll("\\b(zed|z|call|phone|ko|lagao|karo|dial|number|likho|mila|do|baat|karao)\\b", "").trim();
                          targetData = targetData.replaceAll("\\s+", " "); 
                          
                          String spokenAsNumbers = targetData.replace("zero", "0").replace("one", "1").replace("two", "2")
                                  .replace("three", "3").replace("four", "4").replace("five", "5")
                                  .replace("six", "6").replace("seven", "7").replace("eight", "8")
                                  .replace("nine", "9").replaceAll("[^0-9]", "");

                          MyContact foundContact = null;
                          for(MyContact c : allContacts) {
                              if (!c.name.isEmpty() && !targetData.isEmpty()) {
                                  if(c.name.contains(targetData) || targetData.contains(c.name) || 
                                    (!spokenAsNumbers.isEmpty() && c.name.contains(spokenAsNumbers))) {
                                      foundContact = c; break;
                                  }
                              }
                          }
                          
                          if(foundContact != null) {
                              pendingNumberToCall = foundContact.number;
                              isWaitingForDialOrHold = true;
                              
                              if (MainActivity.instance != null) {
                                  MainActivity.instance.updateScreenNumber(pendingNumberToCall, "Number found: " + foundContact.name);
                              }

                              Intent bringToFront = new Intent(getApplicationContext(), MainActivity.class);
                              bringToFront.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK | Intent.FLAG_ACTIVITY_SINGLE_TOP);
                              startActivity(bringToFront);

                              stopVoskListeningTemporarily();
                              
                              Bundle params = new Bundle();
                              params.putString(TextToSpeech.Engine.KEY_PARAM_UTTERANCE_ID, "ASK_DIAL_HOLD");
                              tts.speak("Ji Seth, number screen par hai. Dial karun ya hold par rakhun?", TextToSpeech.QUEUE_FLUSH, params, "ASK_DIAL_HOLD");
                          } else {
                              stopVoskListeningTemporarily();
                              Bundle params = new Bundle();
                              params.putString(TextToSpeech.Engine.KEY_PARAM_UTTERANCE_ID, "NOT_FOUND");
                              tts.speak("Maaf karna Seth, yeh number meri list mein nahi mila.", TextToSpeech.QUEUE_FLUSH, params, "NOT_FOUND");
                          }
                      }
                  }
              }

              private void processDialOrHold(String text) {
                  boolean isDial = text.contains("dial") || text.contains("call") || text.contains("laga") || 
                                   text.contains("yes") || text.contains("haan") || text.contains("kar do");
                  
                  boolean isHold = text.contains("hold") || text.contains("ruk") || text.contains("wait") || 
                                   text.contains("cancel") || text.contains("nahi");

                  if (isDial) {
                      stopVoskListeningTemporarily();
                      tts.speak("Ji Seth, call mila raha hoon.", TextToSpeech.QUEUE_FLUSH, null, null);
                      isWaitingForDialOrHold = false;
                      makeCall(pendingNumberToCall);
                  } 
                  else if (isHold) {
                      stopVoskListeningTemporarily();
                      Bundle params = new Bundle();
                      params.putString(TextToSpeech.Engine.KEY_PARAM_UTTERANCE_ID, "HOLD_DONE");
                      tts.speak("Theek hai Seth, number hold kar diya hai.", TextToSpeech.QUEUE_FLUSH, params, "HOLD_DONE");
                      isWaitingForDialOrHold = false;
                  } 
                  else {
                      stopVoskListeningTemporarily();
                      Bundle params = new Bundle();
                      params.putString(TextToSpeech.Engine.KEY_PARAM_UTTERANCE_ID, "ASK_DIAL_HOLD");
                      tts.speak("Seth Dial karna hai ya Hold?", TextToSpeech.QUEUE_FLUSH, params, "ASK_DIAL_HOLD");
                  }
              }

              private void makeCall(String number) {
                  try {
                      Intent intent = new Intent(Intent.ACTION_CALL);
                      intent.setData(Uri.parse("tel:" + number));
                      intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                      startActivity(intent);
                      
                      if(MainActivity.instance != null) {
                          MainActivity.instance.finishAffinity();
                          System.exit(0);
                      }
                  } catch (SecurityException e) { }
              }

              private Notification getNotification(String text) {
                  return new NotificationCompat.Builder(this, "Z_CHANNEL")
                          .setContentTitle("Z AI Assistant")
                          .setContentText(text)
                          .setSmallIcon(R.mipmap.ic_launcher)
                          .setPriority(NotificationCompat.PRIORITY_LOW)
                          .build();
              }

              private void createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel("Z_CHANNEL", "Z AI Service", NotificationManager.IMPORTANCE_LOW);
                      NotificationManager manager = getSystemService(NotificationManager.class);
                      if (manager != null) manager.createNotificationChannel(channel);
                  }
              }

              @Nullable @Override public IBinder onBind(Intent intent) { return null; }

              @Override
              public void onDestroy() {
                  if(tts != null) { tts.stop(); tts.shutdown(); }
                  if(voskSpeechService != null) { voskSpeechService.stop(); voskSpeechService.shutdown(); }
                  restartHandler.removeCallbacksAndMessages(null);
                  super.onDestroy();
              }
          }
          EOF

      - name: "10. Java Code: MainActivity (UI Updater)"
        run: |
          cat << 'EOF' > app/src/main/java/com/zatomic/caller/MainActivity.java
          package com.zatomic.caller;

          import android.Manifest;
          import android.app.ActivityManager;
          import android.content.Context;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.os.Build;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.TextView;
          import android.widget.Toast;

          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;

          public class MainActivity extends AppCompatActivity {

              public static MainActivity instance;

              private TextView tvStatus, tvBigNumber;
              private Button btnSync, btnToggleBg;
              private boolean isServiceRunning = false;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  instance = this;

                  tvStatus = findViewById(R.id.tv_status);
                  tvBigNumber = findViewById(R.id.tv_big_number);
                  btnSync = findViewById(R.id.btn_sync);
                  btnToggleBg = findViewById(R.id.btn_toggle_bg);

                  requestPermissions();
                  checkServiceStatus();

                  btnSync.setOnClickListener(v -> {
                      Toast.makeText(this, "Smart Logic Engine Updated!", Toast.LENGTH_SHORT).show();
                  });

                  btnToggleBg.setOnClickListener(v -> {
                      Intent serviceIntent = new Intent(this, VoiceBackgroundService.class);
                      if (isServiceRunning) {
                          stopService(serviceIntent);
                          btnToggleBg.setText("TURN ON BACKGROUND AI");
                          btnToggleBg.setBackgroundColor(0xFF34C759); 
                          tvStatus.setText("Background AI Stopped.");
                          isServiceRunning = false;
                      } else {
                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                              startForegroundService(serviceIntent);
                          } else {
                              startService(serviceIntent);
                          }
                          btnToggleBg.setText("TURN OFF BACKGROUND AI");
                          btnToggleBg.setBackgroundColor(0xFFFF3B30); 
                          tvStatus.setText("Engine Booting...");
                          isServiceRunning = true;
                      }
                  });
              }

              public void updateStatus(String status) {
                  runOnUiThread(() -> tvStatus.setText(status));
              }

              public void updateScreenNumber(String number, String nameStatus) {
                  runOnUiThread(() -> {
                      tvBigNumber.setText(number);
                      tvStatus.setText(nameStatus + "\n\nWaiting: Dial or Hold?");
                  });
              }

              private void checkServiceStatus() {
                  ActivityManager manager = (ActivityManager) getSystemService(Context.ACTIVITY_SERVICE);
                  for (ActivityManager.RunningServiceInfo service : manager.getRunningServices(Integer.MAX_VALUE)) {
                      if (VoiceBackgroundService.class.getName().equals(service.service.getClassName())) {
                          isServiceRunning = true;
                          btnToggleBg.setText("TURN OFF BACKGROUND AI");
                          btnToggleBg.setBackgroundColor(0xFFFF3B30);
                          return;
                      }
                  }
                  isServiceRunning = false;
              }

              private void requestPermissions() {
                  String[] perms;
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      perms = new String[]{Manifest.permission.RECORD_AUDIO, Manifest.permission.READ_CONTACTS, Manifest.permission.CALL_PHONE, Manifest.permission.POST_NOTIFICATIONS};
                  } else {
                      perms = new String[]{Manifest.permission.RECORD_AUDIO, Manifest.permission.READ_CONTACTS, Manifest.permission.CALL_PHONE};
                  }
                  boolean needed = false;
                  for (String p : perms) {
                      if (ContextCompat.checkSelfPermission(this, p) != PackageManager.PERMISSION_GRANTED) needed = true;
                  }
                  if (needed) ActivityCompat.requestPermissions(this, perms, 1);
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  if(instance == this) instance = null;
              }
          }
          EOF

      - name: "11. Build Final APK"
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: "12. Upload App Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "Z-Atomic-Pure-Vosk-AI"
          path: app/build/outputs/apk/debug/app-debug.apk
