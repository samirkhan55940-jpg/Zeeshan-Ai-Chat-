name: Build Zeeshan Z+2 AI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. JDK Setup
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. App Folders
        run: |
          mkdir -p app/src/main/java/com/zeeshan/z2
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/res/values

      - name: 4. Gradle Setup
        run: |
          echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }" > settings.gradle
          echo "dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS); repositories { google(); mavenCentral() } }" >> settings.gradle
          echo "rootProject.name = 'Zeeshan-Z2-Chat'" >> settings.gradle
          echo "include ':app'" >> settings.gradle
          echo "plugins { id 'com.android.application' version '8.2.0' apply false }" > build.gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: 5. Native Logic (Arabi Brain)
        run: |
          cat << 'EOF' > app/src/main/cpp/native-lib.cpp
          #include <jni.h>
          #include <string>
          #include <map>
          #include <algorithm>
          extern "C" JNIEXPORT jstring JNICALL
          Java_com_zeeshan_z2_MainActivity_processZ2(JNIEnv* env, jobject, jstring input) {
              const char *text = env->GetStringUTFChars(input, 0);
              std::string inStr = text;
              std::transform(inStr.begin(), inStr.end(), inStr.begin(), ::tolower);
              
              std::map<std::string, std::string> brain = {
                  {"paani", "Paani zindagi ki buniyaad hai. (Root: M-A-A)"},
                  {"hindi", "Hindi ek mahan bhasha hai. (Root: H-N-D)"},
                  {"insaan", "Insaan mitti se bana hai. (Root: I-N-S)"},
                  {"chai", "Chai dosti aur sukoon ka rishta hai. (Root: SH-A-Y)"}
              };
              
              std::string res = "Z+2 Engine: Arabi Jan ID process hua. Soch taiyar hai.";
              if (brain.find(inStr) != brain.end()) res = brain[inStr];
              
              env->ReleaseStringUTFChars(input, text);
              return env->NewStringUTF(res.c_str());
          }
          EOF
          
          cat << 'EOF' > app/src/main/cpp/CMakeLists.txt
          cmake_minimum_required(VERSION 3.22.1)
          project("z2_core")
          add_library(z2_core SHARED native-lib.cpp)
          find_library(log-lib log)
          target_link_libraries(z2_core ${log-lib})
          EOF

      - name: 6. UI and App Config
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/z2/MainActivity.java
          package com.zeeshan.z2;
          import android.graphics.Color;
          import android.os.Bundle;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              static { System.loadLibrary("z2_core"); }
              public native String processZ2(String input);
              @Override protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setBackgroundColor(Color.parseColor("#0A0000"));
                  root.setPadding(40, 40, 40, 40);
                  
                  TextView out = new TextView(this);
                  out.setTextColor(Color.GREEN);
                  out.setText("Z+2 AI Dimaag Load ho gaya hai...");
                  out.setPadding(0, 40, 0, 40);
                  out.setTextSize(18);
                  
                  EditText in = new EditText(this);
                  in.setTextColor(Color.WHITE);
                  in.setHint("Yahan Type Karein (eg. paani, hindi)");
                  in.setHintTextColor(Color.DKGRAY);
                  
                  Button btn = new Button(this);
                  btn.setText("AI SE PUCHO");
                  btn.setBackgroundColor(Color.RED);
                  btn.setTextColor(Color.WHITE);
                  btn.setOnClickListener(v -> out.setText(processZ2(in.getText().toString().trim())));
                  
                  root.addView(out); root.addView(in); root.addView(btn);
                  setContentView(root);
              }
          }
          EOF
          
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.zeeshan.z2">
              <application android:label="Z+2 AI" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.zeeshan.z2'
              compileSdk 34
              defaultConfig {
                  applicationId "com.zeeshan.z2"
                  minSdk 24
                  targetSdk 34
                  versionCode 2
                  versionName "Z2-Full-Brain"
                  ndk { abiFilters 'arm64-v8a' }
              }
              externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt" } }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

      - name: 7. Build
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      - name: 8. Upload
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-Z2-AI-Brain
          path: app/build/outputs/apk/debug/*.apk
