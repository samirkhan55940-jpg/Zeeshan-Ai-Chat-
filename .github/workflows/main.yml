name: "Build VIP Scanner Z+2"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Step 1: Checkout Repository"
        uses: actions/checkout@v4

      - name: "Step 2: Set up Java 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: "Step 3: Create App Structure"
        run: |
          mkdir -p app/src/main/java/com/zatomic/scanner
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26

      - name: "Step 4: Master Gradle Settings"
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = "VIPScannerZ"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          plugins { id 'com.android.application' version '8.3.0' apply false; id 'org.jetbrains.kotlin.android' version '1.9.0' apply false }
          EOF

          cat << 'EOF' > gradle.properties
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
          EOF
          
          # Gradle wrapper ko theek se init karna taaki GitHub fail na ho
          gradle wrapper --gradle-version 8.4 --distribution-type bin

      - name: "Step 5: Add VIP Logo (Shield Icon)"
        run: |
          # Logo ka Vector XML (Neele aur sunehre rang ki dhaal/shield)
          cat << 'EOF' > app/src/main/res/drawable/ic_launcher_foreground.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#1E88E5"
                    android:pathData="M54,12 L20,26 V50 C20,74 34,96 54,104 C74,96 88,74 88,50 V26 Z"/>
              <path android:fillColor="#FFD700"
                    android:pathData="M44,68 L32,56 L38,50 L44,56 L70,30 L76,36 Z"/>
          </vector>
          EOF

          # Adaptive Icon Config
          cat << 'EOF' > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@android:color/black"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          
          cat << 'EOF' > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@android:color/black"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

      - name: "Step 6: Android App Config"
        run: |
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android' }
          android {
              namespace 'com.zatomic.scanner'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.zatomic.scanner'
                  minSdk 26
                  targetSdk 34
                  versionCode 3
                  versionName "3.0-VIP-Logo"
                  externalNativeBuild { cmake { cppFlags "" } }
              }
              externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt"; version "3.22.1" } }
              buildTypes { release { minifyEnabled true; proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro' } }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
          }
          EOF

      - name: "Step 7: C++ Engine Config"
        run: |
          cat << 'EOF' > app/src/main/cpp/CMakeLists.txt
          cmake_minimum_required(VERSION 3.22.1)
          project("vipscanner")
          add_library(vipscanner SHARED native-lib.cpp)
          find_library(log-lib log)
          target_link_libraries(vipscanner ${log-lib})
          EOF

      - name: "Step 8: C++ Engine Code"
        run: |
          cat << 'EOF' > app/src/main/cpp/native-lib.cpp
          #include <jni.h>
          #include <string>
          #include <vector>

          extern "C" JNIEXPORT jobjectArray JNICALL
          Java_com_zatomic_scanner_MainActivity_scanForMovieSites(JNIEnv* env, jobject /* this */, jstring browserName) {
              std::vector<std::string> sites = {
                  "filmyzilla.to", "khatrimaza.org", "tamilrockers.cc", "moviesflix.in"
              };
              
              jclass stringClass = env->FindClass("java/lang/String");
              jobjectArray stringArray = env->NewObjectArray(sites.size(), stringClass, nullptr);
              
              for (size_t i = 0; i < sites.size(); ++i) {
                  env->SetObjectArrayElement(stringArray, i, env->NewStringUTF(sites[i].c_str()));
              }
              return stringArray;
          }
          EOF

      - name: "Step 9: UI Layouts"
        run: |
          cat << 'EOF' > app/src/main/res/layout/activity_main.xml
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent" android:background="#FFFFFF" android:padding="16dp">
              <Button android:id="@+id/btnHistory" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="History" android:layout_alignParentEnd="true"/>
              <Button android:id="@+id/btnScanNow" android:layout_width="200dp" android:layout_height="60dp" android:text="Scan Now" android:layout_centerInParent="true" android:backgroundTint="#000000" android:textColor="#FFFFFF"/>
              <androidx.recyclerview.widget.RecyclerView android:id="@+id/recyclerView" android:layout_width="match_parent" android:layout_height="match_parent" android:layout_below="@id/btnHistory" android:visibility="gone"/>
          </RelativeLayout>
          EOF

          cat << 'EOF' > app/src/main/res/layout/item_site_row.xml
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:padding="12dp" android:background="?android:attr/selectableItemBackground">
              <TextView android:id="@+id/tvSerial" android:layout_width="40dp" android:layout_height="wrap_content" android:textColor="#000" android:textStyle="bold"/>
              <TextView android:id="@+id/tvName" android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:textColor="#0000FF" android:textStyle="bold"/>
              <TextView android:id="@+id/tvStatus" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Unsafe" android:textColor="#FF0000"/>
          </LinearLayout>
          EOF

      - name: "Step 10: Kotlin Code"
        run: |
          cat << 'EOF' > app/src/main/java/com/zatomic/scanner/SiteAdapter.kt
          package com.zatomic.scanner
          import android.view.LayoutInflater
          import android.view.View
          import android.view.ViewGroup
          import android.widget.TextView
          import androidx.recyclerview.widget.RecyclerView

          class SiteAdapter(private val siteList: List<String>, private val onItemClick: (String) -> Unit) : RecyclerView.Adapter<SiteAdapter.ViewHolder>() {
              class ViewHolder(view: View) : RecyclerView.ViewHolder(view) {
                  val tvSerial: TextView = view.findViewById(R.id.tvSerial)
                  val tvName: TextView = view.findViewById(R.id.tvName)
              }
              override fun onCreateViewHolder(parent: ViewGroup, viewType: Int): ViewHolder {
                  val view = LayoutInflater.from(parent.context).inflate(R.layout.item_site_row, parent, false)
                  return ViewHolder(view)
              }
              override fun onBindViewHolder(holder: ViewHolder, position: Int) {
                  val name = siteList[position]
                  holder.tvSerial.text = "${position + 1}."
                  holder.tvName.text = name
                  holder.itemView.setOnClickListener { onItemClick(name) }
              }
              override fun getItemCount() = siteList.size
          }
          EOF

          cat << 'EOF' > app/src/main/java/com/zatomic/scanner/MainActivity.kt
          package com.zatomic.scanner

          import android.Manifest
          import android.content.ClipData
          import android.content.ClipboardManager
          import android.content.Context
          import android.content.Intent
          import android.content.pm.PackageManager
          import android.os.Build
          import android.os.Bundle
          import android.view.View
          import android.widget.Button
          import android.widget.Toast
          import androidx.appcompat.app.AlertDialog
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.app.ActivityCompat
          import androidx.core.content.ContextCompat
          import androidx.recyclerview.widget.LinearLayoutManager
          import androidx.recyclerview.widget.RecyclerView

          class MainActivity : AppCompatActivity() {

              init { System.loadLibrary("vipscanner") }
              private external fun scanForMovieSites(browserName: String): Array<String>

              private lateinit var btnScanNow: Button
              private lateinit var recyclerView: RecyclerView
              private val PERMISSION_REQUEST_CODE = 100

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)

                  btnScanNow = findViewById(R.id.btnScanNow)
                  recyclerView = findViewById(R.id.recyclerView)
                  recyclerView.layoutManager = LinearLayoutManager(this)

                  checkAndRequestPermissions()

                  btnScanNow.setOnClickListener { showBrowserSelection() }
              }

              private fun checkAndRequestPermissions() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      if (ContextCompat.checkSelfPermission(this, Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) {
                          ActivityCompat.requestPermissions(this, arrayOf(Manifest.permission.POST_NOTIFICATIONS), PERMISSION_REQUEST_CODE)
                      }
                  }
              }

              override fun onRequestPermissionsResult(requestCode: Int, permissions: Array<out String>, grantResults: IntArray) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults)
                  if (requestCode == PERMISSION_REQUEST_CODE) {
                      if (grantResults.isNotEmpty() && grantResults[0] == PackageManager.PERMISSION_GRANTED) {
                          Toast.makeText(this, "Permission Granted!", Toast.LENGTH_SHORT).show()
                      } else {
                          Toast.makeText(this, "Permission Denied. App needs this to run properly.", Toast.LENGTH_LONG).show()
                      }
                  }
              }

              private fun showBrowserSelection() {
                  val browserIntent = Intent(Intent.ACTION_VIEW, android.net.Uri.parse("http://www.google.com"))
                  
                  val resolveInfoList = if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      packageManager.queryIntentActivities(browserIntent, PackageManager.ResolveInfoFlags.of(PackageManager.MATCH_DEFAULT_ONLY.toLong()))
                  } else {
                      packageManager.queryIntentActivities(browserIntent, PackageManager.MATCH_DEFAULT_ONLY)
                  }
                  
                  val browserNames = resolveInfoList.map { it.loadLabel(packageManager).toString() }

                  AlertDialog.Builder(this)
                      .setTitle("Choose Browser to Scan")
                      .setItems(browserNames.toTypedArray()) { _, which ->
                          startScanning(browserNames[which])
                      }.show()
              }

              private fun startScanning(browserName: String) {
                  Toast.makeText(this, "Scanning via $browserName...", Toast.LENGTH_SHORT).show()
                  btnScanNow.visibility = View.GONE
                  recyclerView.visibility = View.VISIBLE

                  val resultSites = scanForMovieSites(browserName)
                  
                  recyclerView.adapter = SiteAdapter(resultSites.toList()) { siteName ->
                      val clipboard = getSystemService(Context.CLIPBOARD_SERVICE) as ClipboardManager
                      val clip = ClipData.newPlainText("Piracy Site", siteName)
                      clipboard.setPrimaryClip(clip)
                      Toast.makeText(this, "Copied securely! Link won't open.", Toast.LENGTH_LONG).show()
                  }
              }
          }
          EOF

      - name: "Step 11: Official Android Manifest (With Logo Bound)"
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              
              <application android:label="Z+2 Scanner" 
                           android:icon="@mipmap/ic_launcher"
                           android:roundIcon="@mipmap/ic_launcher_round"
                           android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: "Step 12: Build Final VIP APK"
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug
          
      - name: "Step 13: Upload Final APK"
        uses: actions/upload-artifact@v4
        with:
          name: "Z+2-Scanner-App"
          path: app/build/outputs/apk/debug/app-debug.apk
