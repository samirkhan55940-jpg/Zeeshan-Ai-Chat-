name: Build Zeeshan Z+2 (Ultimate Fix)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Create Clean Architecture
        run: |
          mkdir -p app/src/main/java/com/zeeshan/z2
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets
          
          # Root Config
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties

      - name: 4. Arabi Jan & Madam Engine (Hardcoded Logic)
        run: |
          cat << 'EOF' > app/src/main/cpp/native-lib.cpp
          #include <jni.h>
          #include <string>
          extern "C" JNIEXPORT jstring JNICALL
          Java_com_zeeshan_z2_MainActivity_processZ2(JNIEnv* env, jobject, jstring input) {
              const char *text = env->GetStringUTFChars(input, 0);
              std::string response = "Z+2 Arabi Jan Engine: '";
              response += text;
              response += "' processed successfully.";
              env->ReleaseStringUTFChars(input, text);
              return env->NewStringUTF(response.c_str());
          }
          EOF

          cat << 'EOF' > app/src/main/cpp/CMakeLists.txt
          cmake_minimum_required(VERSION 3.22.1)
          project("z2_engine")
          add_library(z2_engine SHARED native-lib.cpp)
          find_library(log-lib log)
          target_link_libraries(z2_engine ${log-lib})
          EOF

      - name: 5. Root & App Build Config (Fixed Paths)
        run: |
          # Root build.gradle
          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # App build.gradle
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.zeeshan.z2'
              compileSdk 34
              defaultConfig {
                  applicationId "com.zeeshan.z2"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "Z2-Perfect"
                  ndk { abiFilters 'arm64-v8a' }
              }
              externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt" } }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

      - name: 6. Z+2 Red UI & Manifest (Safe Version)
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/z2/MainActivity.java
          package com.zeeshan.z2;
          import android.graphics.Color;
          import android.os.Bundle;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              static { System.loadLibrary("z2_engine"); }
              public native String processZ2(String input);

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setBackgroundColor(Color.parseColor("#1A0000")); // Deep Red
                  root.setPadding(40, 40, 40, 40);

                  TextView title = new TextView(this);
                  title.setText("Zeeshan Z+2 Chat");
                  title.setTextColor(Color.RED);
                  title.setTextSize(24);

                  final TextView output = new TextView(this);
                  output.setTextColor(Color.WHITE);
                  output.setPadding(0, 40, 0, 40);

                  final EditText inputField = new EditText(this);
                  inputField.setHint("Arabi Jan Logic...");
                  inputField.setHintTextColor(Color.GRAY);
                  inputField.setTextColor(Color.WHITE);

                  Button btn = new Button(this);
                  btn.setText("SOCH KAR JAWAB DO");
                  btn.setBackgroundColor(Color.RED);
                  btn.setTextColor(Color.WHITE);
                  btn.setOnClickListener(v -> {
                      output.setText(processZ2(inputField.getText().toString()));
                  });

                  root.addView(title); root.addView(output); root.addView(inputField); root.addView(btn);
                  setContentView(root);
              }
          }
          EOF

          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.zeeshan.z2">
              <application android:label="Z+2 Chat" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 7. Step-by-Step Build (No-Failure Mode)
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      - name: 8. Upload Z+2 Perfect APK
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-Z2-Chat-Fixed
          path: app/build/outputs/apk/debug/*.apk
