name: Z+2 Monster (Smart Bodyguard Edition)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 2. Create Folders
        run: |
          mkdir -p app/src/main/java/com/zeeshan/monster
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-xxhdpi

      - name: 3. Setup Gradle
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS); repositories { google(); mavenCentral() } }
          rootProject.name = "ZPlus2Monster"
          include ':app'
          EOF
          
          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          EOF
          
          echo "org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties

      - name: 4. App Gradle (Kotlin Killer Added)
        run: |
          cat << 'EOF' > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.zeeshan.monster'
              compileSdk 34
              defaultConfig {
                  applicationId "com.zeeshan.monster"
                  minSdk 24
                  targetSdk 34
                  versionCode 7
                  versionName "7.0-SmartBodyguard"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          
          configurations.all {
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
          }
          
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: 5. Manifest (Vibration & Heavy Permissions)
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.VIBRATE" />
              
              <application android:label="Z+2 Monster" android:theme="@style/Theme.AppCompat.Light.NoActionBar" android:usesCleartextTraffic="true" android:hardwareAccelerated="true">
                  <activity android:name=".MainActivity" android:exported="true" android:configChanges="orientation|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 6. MainActivity (Smart Logic - No Red Boxes)
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/monster/MainActivity.java
          package com.zeeshan.monster;
          
          import android.Manifest;
          import android.app.DownloadManager;
          import android.content.Context;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.graphics.Color;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Environment;
          import android.os.Vibrator;
          import android.view.View;
          import android.webkit.*;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          
          public class MainActivity extends AppCompatActivity {
              private WebView webView;
              private ProgressBar progressBar;
              private EditText urlBar;
              private TextView botalCounter;
              private Button btnTurbo;
              
              private boolean isTurboMode = false;
              private int adsTrapped = 0;
              private Vibrator vibrator;
              
              public class BotalInterface {
                  @JavascriptInterface
                  public void updateAdCount(int count) {
                      adsTrapped += count;
                      runOnUiThread(() -> botalCounter.setText("🧪 " + adsTrapped));
                  }
              }
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  vibrator = (Vibrator) getSystemService(Context.VIBRATOR_SERVICE);
                  
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      if (ContextCompat.checkSelfPermission(this, Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) {
                          ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.POST_NOTIFICATIONS}, 101);
                      }
                  }
                  
                  RelativeLayout root = new RelativeLayout(this);
                  root.setBackgroundColor(Color.parseColor("#0F172A"));
                  
                  LinearLayout toolbar = new LinearLayout(this);
                  toolbar.setId(View.generateViewId());
                  toolbar.setOrientation(LinearLayout.HORIZONTAL);
                  toolbar.setPadding(10, 10, 10, 10);
                  toolbar.setBackgroundColor(Color.parseColor("#1E293B"));
                  
                  urlBar = new EditText(this);
                  urlBar.setHint("Search Internet...");
                  urlBar.setTextColor(Color.WHITE);
                  urlBar.setHintTextColor(Color.GRAY);
                  urlBar.setLayoutParams(new LinearLayout.LayoutParams(0, -2, 1));
                  urlBar.setMaxLines(1);
                  urlBar.setSingleLine(true);
                  
                  Button btnGo = new Button(this);
                  btnGo.setText("GO");
                  btnGo.setBackgroundColor(Color.parseColor("#3B82F6"));
                  btnGo.setTextColor(Color.WHITE);
                  
                  toolbar.addView(urlBar);
                  toolbar.addView(btnGo);
                  
                  webView = new WebView(this);
                  RelativeLayout.LayoutParams wvParams = new RelativeLayout.LayoutParams(-1, -1);
                  wvParams.addRule(RelativeLayout.BELOW, toolbar.getId());
                  webView.setLayoutParams(wvParams);
                  
                  progressBar = new ProgressBar(this, null, android.R.attr.progressBarStyleHorizontal);
                  progressBar.setMax(100);
                  progressBar.setVisibility(View.GONE);
                  RelativeLayout.LayoutParams progParams = new RelativeLayout.LayoutParams(-1, 10);
                  progParams.addRule(RelativeLayout.BELOW, toolbar.getId());
                  progressBar.setLayoutParams(progParams);
                  
                  btnTurbo = new Button(this);
                  btnTurbo.setText("⚡"); 
                  btnTurbo.setTextSize(20);
                  btnTurbo.setBackgroundColor(Color.parseColor("#99000000"));
                  btnTurbo.setTextColor(Color.WHITE);
                  RelativeLayout.LayoutParams turboParams = new RelativeLayout.LayoutParams(-2, -2);
                  turboParams.addRule(RelativeLayout.ALIGN_PARENT_BOTTOM);
                  turboParams.addRule(RelativeLayout.ALIGN_PARENT_RIGHT);
                  turboParams.setMargins(0, 0, 40, 40);
                  btnTurbo.setLayoutParams(turboParams);
                  
                  botalCounter = new TextView(this);
                  botalCounter.setText("🧪 0");
                  botalCounter.setTextSize(18);
                  botalCounter.setBackgroundColor(Color.parseColor("#99000000"));
                  botalCounter.setTextColor(Color.parseColor("#10B981"));
                  botalCounter.setPadding(30, 20, 30, 20);
                  RelativeLayout.LayoutParams botalParams = new RelativeLayout.LayoutParams(-2, -2);
                  botalParams.addRule(RelativeLayout.ALIGN_PARENT_BOTTOM);
                  botalParams.addRule(RelativeLayout.ALIGN_PARENT_LEFT);
                  botalParams.setMargins(40, 0, 0, 40);
                  botalCounter.setLayoutParams(botalParams);
                  
                  root.addView(webView);
                  root.addView(toolbar);
                  root.addView(progressBar);
                  root.addView(btnTurbo);
                  root.addView(botalCounter);
                  setContentView(root);
                  
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setSupportMultipleWindows(false);
                  settings.setJavaScriptCanOpenWindowsAutomatically(false);
                  
                  webView.addJavascriptInterface(new BotalInterface(), "AndroidBotal");
                  
                  btnTurbo.setOnClickListener(v -> {
                      isTurboMode = !isTurboMode;
                      if(isTurboMode) {
                          btnTurbo.setBackgroundColor(Color.parseColor("#E11D48"));
                          Toast.makeText(this, "MAX TURBO ACTIVE!", Toast.LENGTH_SHORT).show();
                      } else {
                          btnTurbo.setBackgroundColor(Color.parseColor("#99000000"));
                      }
                  });
                  
                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onProgressChanged(WebView view, int newProgress) {
                          if (newProgress < 100) {
                              progressBar.setVisibility(View.VISIBLE);
                              progressBar.setProgress(newProgress);
                          } else {
                              progressBar.setVisibility(View.GONE);
                              // Saaf suthra Botal script, koi laal dabba nahi
                              String cleanScript = "javascript:(function() { " +
                                  "var ads = document.querySelectorAll('iframe, .ad, .ads, [id^=\"div-gpt-ad\"]'); " +
                                  "var count = 0; ads.forEach(function(ad) { " +
                                  "if(ad.style.position !== 'absolute') { ad.style.position = 'absolute'; ad.style.left = '-9999px'; ad.style.width = '1px'; count++; } " +
                                  "}); " +
                                  "if(count > 0) AndroidBotal.updateAdCount(count); })();";
                              view.evaluateJavascript(cleanScript, null);
                          }
                      }
                  });
                  
                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest request) {
                          String newUrl = request.getUrl().toString();
                          
                          // Intent System Fix (Telegram apps etc)
                          if (!newUrl.startsWith("http://") && !newUrl.startsWith("https://")) {
                              try {
                                  Intent intent = Intent.parseUri(newUrl, Intent.URI_INTENT_SCHEME);
                                  if (intent != null) view.getContext().startActivity(intent);
                              } catch (Exception e) {}
                              return true;
                          }
                          
                          // SMART DOMAIN JAIL: Sirf bina touch kiye open hone wali fake sites ko rokega
                          if (!request.hasGesture()) {
                              try {
                                  String currentHost = Uri.parse(view.getUrl()).getHost();
                                  String newHost = Uri.parse(newUrl).getHost();
                                  // Agar domain alag hai aur user ne touch nahi kiya
                                  if (currentHost != null && newHost != null && !newHost.contains(currentHost) && !currentHost.contains(newHost)) {
                                      if (vibrator != null) vibrator.vibrate(100);
                                      Toast.makeText(MainActivity.this, "🚨 Fake Auto-Redirect Blocked!", Toast.LENGTH_SHORT).show();
                                      return true; // Block kar diya!
                                  }
                              } catch (Exception e) {}
                          }
                          
                          return false; // User ne khud click kiya hai, toh khulne do
                      }

                      @Override
                      public void onPageFinished(WebView view, String url) {
                          try {
                              String host = Uri.parse(url).getHost();
                              if(host != null) { urlBar.setText(host); }
                          } catch (Exception e) { urlBar.setText(url); }
                      }
                  });
                  
                  webView.setDownloadListener((url, userAgent, contentDisposition, mimetype, contentLength) -> {
                      try {
                          if(isTurboMode) webView.pauseTimers(); 
                          DownloadManager.Request request = new DownloadManager.Request(Uri.parse(url));
                          request.setMimeType(mimetype);
                          String fileName = URLUtil.guessFileName(url, contentDisposition, mimetype);
                          request.setTitle(fileName);
                          request.setAllowedOverMetered(true);
                          request.setNotificationVisibility(DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED);
                          request.setDestinationInExternalPublicDir(Environment.DIRECTORY_DOWNLOADS, fileName);
                          
                          DownloadManager dm = (DownloadManager) getSystemService(DOWNLOAD_SERVICE);
                          dm.enqueue(request);
                          Toast.makeText(MainActivity.this, "🔥 DOWNLOADING...", Toast.LENGTH_SHORT).show();
                      } catch (Exception e) {}
                  });
                  
                  btnGo.setOnClickListener(v -> {
                      String url = urlBar.getText().toString();
                      if(!url.startsWith("http")) {
                          url = "https://www.google.com/search?q=" + url;
                      }
                      webView.loadUrl(url);
                      if(!isTurboMode) webView.resumeTimers();
                  });
                  
                  webView.loadUrl("https://www.google.com");
              }
              
              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) webView.goBack();
                  else super.onBackPressed();
              }
          }
          EOF

      - name: 7. Build Bodyguard APK
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 8. Upload Z+2 Smart Monster
        uses: actions/upload-artifact@v4
        with:
          name: ZPlus2-Smart-Bodyguard
          path: app/build/outputs/apk/debug/*.apk
