name: Zeeshan Z+2 Browser (10-Tukre Monster)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 2. Create Folders
        run: |
          mkdir -p app/src/main/java/com/zeeshan/browser
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26

      - name: 3. Setup Gradle
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS); repositories { google(); mavenCentral() } }
          rootProject.name = "Zeeshan Z+2 Browser"
          include ':app'
          EOF
          
          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          EOF
          
          echo "org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties

      - name: 4. App Gradle
        run: |
          cat << 'EOF' > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.zeeshan.browser'
              compileSdk 34
              defaultConfig {
                  applicationId "com.zeeshan.browser"
                  minSdk 24
                  targetSdk 34
                  versionCode 12
                  versionName "12.0-MultiThreadMaster"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: 5. App Name & Icon Setup
        run: |
          cat << 'EOF' > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">Z+2 Browser</string>
          </resources>
          EOF
          
          # Zeeshan's Custom Lightning Z Icon
          cat << 'EOF' > app/src/main/res/drawable/ic_monster_logo.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#0F172A" android:pathData="M0,0h108v108h-108z"/>
              <path android:fillColor="#3B82F6" android:pathData="M24,30 l40,0 l-20,24 l30,0 l-45,36 l10,-24 l-25,0 z"/>
          </vector>
          EOF
          
          cat << 'EOF' > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_monster_logo" />
              <foreground android:drawable="@drawable/ic_monster_logo" />
          </adaptive-icon>
          EOF

      - name: 6. Manifest
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.VIBRATE" />
              
              <application android:label="@string/app_name" android:icon="@mipmap/ic_launcher" android:roundIcon="@mipmap/ic_launcher" android:theme="@style/Theme.AppCompat.Light.NoActionBar" android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true" android:configChanges="orientation|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 7. MainActivity (10-Tukre Vajuddhari Engine)
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/browser/MainActivity.java
          package com.zeeshan.browser;
          
          import android.content.Context;
          import android.content.Intent;
          import android.graphics.Color;
          import android.net.Uri;
          import android.os.Bundle;
          import android.os.Environment;
          import android.os.Handler;
          import android.os.Looper;
          import android.view.View;
          import android.webkit.*;
          import android.widget.*;
          import androidx.appcompat.app.AlertDialog;
          import androidx.appcompat.app.AppCompatActivity;
          import java.io.*;
          import java.net.HttpURLConnection;
          import java.net.URL;
          import java.util.concurrent.ExecutorService;
          import java.util.concurrent.Executors;
          import java.util.concurrent.atomic.AtomicLong;
          import java.util.concurrent.atomic.AtomicInteger;

          public class MainActivity extends AppCompatActivity {
              private WebView webView;
              private EditText urlBar;
              private TextView botalCounter;
              private Button btnDownloads;
              private int adsTrapped = 0;
              
              // Multi-thread Tracking
              private boolean isDownloading = false;
              private AtomicLong totalBytesDownloaded = new AtomicLong(0);
              private long totalFileSize = 0;
              private String currentSpeed = "0 MB/s";
              private long lastTime = 0;
              private long lastBytes = 0;
              private Handler mainHandler = new Handler(Looper.getMainLooper());
              private String currentFileName = "";

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  RelativeLayout root = new RelativeLayout(this);
                  root.setBackgroundColor(Color.parseColor("#0F172A"));

                  LinearLayout toolbar = new LinearLayout(this);
                  toolbar.setId(View.generateViewId());
                  toolbar.setBackgroundColor(Color.parseColor("#1E293B"));
                  toolbar.setPadding(10, 10, 10, 10);
                  
                  btnDownloads = new Button(this);
                  btnDownloads.setText("📂");
                  btnDownloads.setBackgroundColor(Color.TRANSPARENT);
                  btnDownloads.setTextColor(Color.WHITE);

                  urlBar = new EditText(this);
                  urlBar.setHint("Search Zeeshan Z+2...");
                  urlBar.setTextColor(Color.WHITE);
                  urlBar.setLayoutParams(new LinearLayout.LayoutParams(0, -2, 1));

                  Button btnGo = new Button(this);
                  btnGo.setText("GO");
                  btnGo.setBackgroundColor(Color.parseColor("#3B82F6"));
                  
                  toolbar.addView(btnDownloads);
                  toolbar.addView(urlBar);
                  toolbar.addView(btnGo);

                  webView = new WebView(this);
                  RelativeLayout.LayoutParams wvParams = new RelativeLayout.LayoutParams(-1, -1);
                  wvParams.addRule(RelativeLayout.BELOW, toolbar.getId());
                  webView.setLayoutParams(wvParams);

                  botalCounter = new TextView(this);
                  botalCounter.setText("🧪 0");
                  botalCounter.setTextColor(Color.GREEN);
                  RelativeLayout.LayoutParams bLp = new RelativeLayout.LayoutParams(-2, -2);
                  bLp.addRule(RelativeLayout.ALIGN_PARENT_BOTTOM); bLp.addRule(RelativeLayout.ALIGN_PARENT_LEFT);
                  bLp.setMargins(40,0,0,40);
                  botalCounter.setLayoutParams(bLp);

                  root.addView(webView); root.addView(toolbar); root.addView(botalCounter);
                  setContentView(root);

                  CookieManager.getInstance().setAcceptCookie(true);
                  webView.getSettings().setJavaScriptEnabled(true);
                  webView.getSettings().setDomStorageEnabled(true);
                  webView.getSettings().setUserAgentString("Mozilla/5.0 (Linux; Android 14) AppleWebKit/537.36 Chrome/124.0.0.0 Mobile Safari/537.36");
                  
                  webView.addJavascriptInterface(new Object() {
                      @JavascriptInterface
                      public void updateAdCount(int count) {
                          adsTrapped += count;
                          runOnUiThread(() -> botalCounter.setText("🧪 " + adsTrapped));
                      }
                  }, "AndroidBotal");

                  // CUSTOM 10-TUKRE DOWNLOAD LISTENER
                  webView.setDownloadListener((url, userAgent, contentDisposition, mimetype, contentLength) -> {
                      if(isDownloading) {
                          Toast.makeText(this, "Pehle ek movie puri hone de Bhai!", Toast.LENGTH_SHORT).show();
                          return;
                      }
                      String fileName = URLUtil.guessFileName(url, contentDisposition, mimetype);
                      String cookies = CookieManager.getInstance().getCookie(url);
                      startMonsterDownload(url, fileName, cookies);
                  });

                  btnDownloads.setOnClickListener(v -> showDownloadProgress());

                  btnGo.setOnClickListener(v -> {
                      String url = urlBar.getText().toString();
                      if(!url.startsWith("http")) url = "https://www.google.com/search?q=" + url;
                      webView.loadUrl(url);
                  });

                  webView.setWebChromeClient(new WebChromeClient() {
                      public void onProgressChanged(WebView view, int p) {
                          if(p > 80) {
                              view.evaluateJavascript("javascript:(function() { " +
                                  "var ads = document.querySelectorAll('ins.adsbygoogle, [id^=\"div-gpt-ad\"], a[href*=\"t.me\"]'); " +
                                  "if(ads.length > 0) AndroidBotal.updateAdCount(ads.length); " +
                                  "ads.forEach(ad => { ad.style.display='none'; }); })();", null);
                          }
                      }
                  });

                  webView.loadUrl("https://www.google.com");
              }

              // ==========================================
              // 10-TUKRE MULTI-THREAD ENGINE (Vajuddhari Logic)
              // ==========================================
              private void startMonsterDownload(String downloadUrl, String fileName, String cookies) {
                  isDownloading = true;
                  totalBytesDownloaded.set(0);
                  currentFileName = fileName;
                  Toast.makeText(this, "🔥 10-Tukre Monster Download Shuru!", Toast.LENGTH_LONG).show();

                  new Thread(() -> {
                      try {
                          URL url = new URL(downloadUrl);
                          HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                          conn.setRequestProperty("Cookie", cookies);
                          conn.connect();
                          
                          totalFileSize = conn.getContentLength();
                          String acceptRanges = conn.getHeaderField("Accept-Ranges");
                          
                          File moviesDir = Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_MOVIES);
                          File finalFile = new File(moviesDir, fileName);

                          // Agar server Tukde support na kare, toh Normal download
                          if (acceptRanges == null || !acceptRanges.equals("bytes") || totalFileSize <= 0) {
                              mainHandler.post(() -> Toast.makeText(this, "Server support nahi kar raha, Normal mode on", Toast.LENGTH_SHORT).show());
                              downloadSingle(downloadUrl, finalFile, cookies);
                              return;
                          }

                          // 10 TUKRE CALCULATION
                          int numThreads = 10;
                          long chunkSize = totalFileSize / numThreads;
                          ExecutorService executor = Executors.newFixedThreadPool(numThreads);
                          AtomicInteger completedThreads = new AtomicInteger(0);
                          
                          lastTime = System.currentTimeMillis();
                          lastBytes = 0;

                          for (int i = 0; i < numThreads; i++) {
                              long startByte = i * chunkSize;
                              long endByte = (i == numThreads - 1) ? totalFileSize - 1 : (startByte + chunkSize - 1);
                              final int partId = i;
                              
                              executor.execute(() -> {
                                  try {
                                      HttpURLConnection partConn = (HttpURLConnection) url.openConnection();
                                      partConn.setRequestProperty("Cookie", cookies);
                                      partConn.setRequestProperty("Range", "bytes=" + startByte + "-" + endByte);
                                      partConn.connect();
                                      
                                      File partFile = new File(moviesDir, fileName + ".part" + partId);
                                      InputStream is = partConn.getInputStream();
                                      FileOutputStream fos = new FileOutputStream(partFile);
                                      
                                      byte[] buffer = new byte[8192]; // Light on RAM
                                      int read;
                                      while ((read = is.read(buffer)) != -1) {
                                          fos.write(buffer, 0, read);
                                          totalBytesDownloaded.addAndGet(read);
                                          calculateSpeed();
                                      }
                                      fos.close();
                                      is.close();
                                      partConn.disconnect();
                                      
                                      if (completedThreads.incrementAndGet() == numThreads) {
                                          stitchFiles(moviesDir, fileName, numThreads, finalFile);
                                      }
                                  } catch (Exception e) {}
                              });
                          }
                      } catch (Exception e) {
                          isDownloading = false;
                      }
                  }).start();
              }

              private void calculateSpeed() {
                  long currentTime = System.currentTimeMillis();
                  long timeDiff = currentTime - lastTime;
                  if (timeDiff >= 1000) {
                      long bytesDiff = totalBytesDownloaded.get() - lastBytes;
                      double speed = bytesDiff / 1024.0 / 1024.0;
                      currentSpeed = String.format("%.2f MB/s", speed);
                      lastBytes = totalBytesDownloaded.get();
                      lastTime = currentTime;
                  }
              }

              // SAARE TUKDON KO MILAKAR EK MOVIE BANANA
              private void stitchFiles(File dir, String fileName, int numThreads, File finalFile) {
                  mainHandler.post(() -> Toast.makeText(this, "Stitching 10 Parts... Please wait!", Toast.LENGTH_SHORT).show());
                  try {
                      FileOutputStream fos = new FileOutputStream(finalFile);
                      for (int i = 0; i < numThreads; i++) {
                          File partFile = new File(dir, fileName + ".part" + i);
                          FileInputStream fis = new FileInputStream(partFile);
                          byte[] buffer = new byte[8192]; // Safe for 4GB RAM
                          int read;
                          while ((read = fis.read(buffer)) != -1) {
                              fos.write(buffer, 0, read);
                          }
                          fis.close();
                          partFile.delete(); // Tukda delete taaki space bache
                      }
                      fos.close();
                      
                      // Notify Gallery
                      sendBroadcast(new Intent(Intent.ACTION_MEDIA_SCANNER_SCAN_FILE, Uri.fromFile(finalFile)));
                      
                      isDownloading = false;
                      mainHandler.post(() -> Toast.makeText(this, "✅ Movie Saved in Gallery!", Toast.LENGTH_LONG).show());
                  } catch (Exception e) {
                      isDownloading = false;
                  }
              }

              private void downloadSingle(String url, File finalFile, String cookies) {
                  // Fallback for servers that block parts
                  try {
                      HttpURLConnection conn = (HttpURLConnection) new URL(url).openConnection();
                      conn.setRequestProperty("Cookie", cookies);
                      InputStream is = conn.getInputStream();
                      FileOutputStream fos = new FileOutputStream(finalFile);
                      byte[] buffer = new byte[8192];
                      int read;
                      while ((read = is.read(buffer)) != -1) {
                          fos.write(buffer, 0, read);
                          totalBytesDownloaded.addAndGet(read);
                          calculateSpeed();
                      }
                      fos.close();
                      is.close();
                      sendBroadcast(new Intent(Intent.ACTION_MEDIA_SCANNER_SCAN_FILE, Uri.fromFile(finalFile)));
                      isDownloading = false;
                      mainHandler.post(() -> Toast.makeText(this, "✅ Movie Saved in Gallery!", Toast.LENGTH_LONG).show());
                  } catch (Exception e) {
                      isDownloading = false;
                  }
              }

              private void showDownloadProgress() {
                  if (!isDownloading) {
                      Toast.makeText(this, "No Active Downloads", Toast.LENGTH_SHORT).show();
                      return;
                  }
                  
                  long downloaded = totalBytesDownloaded.get();
                  int progress = (int) ((downloaded * 100L) / (totalFileSize > 0 ? totalFileSize : 1));
                  
                  new AlertDialog.Builder(this)
                      .setTitle("Z+2 Download Center")
                      .setMessage("🎬 Movie: " + currentFileName + 
                                  "\n🚀 Speed: " + currentSpeed + 
                                  "\n⚡ Multi-Thread: Active (10 Parts)" +
                                  "\n📊 Progress: " + progress + "%" +
                                  "\n📂 Size: " + (totalFileSize/1024/1024) + " MB")
                      .setPositiveButton("Refresh", (d, w) -> showDownloadProgress())
                      .setNeutralButton("Open Gallery", (d, w) -> {
                          startActivity(new Intent(Intent.ACTION_VIEW, Uri.parse("content://media/external/video/media")));
                      })
                      .show();
              }
          }
          EOF

      - name: 8. Build Perfect App
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 9. Upload Z+2 Browser
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-Z-Plus-2-Browser
          path: app/build/outputs/apk/debug/*.apk
