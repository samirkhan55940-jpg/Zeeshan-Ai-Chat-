name: Z+2 Turbo Browser

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 2. Create Folders
        run: |
          mkdir -p app/src/main/java/com/zeeshan/browser
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-xxhdpi

      - name: 3. Setup Gradle
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS); repositories { google(); mavenCentral() } }
          rootProject.name = "ZPlus2Browser"
          include ':app'
          EOF
          
          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          EOF
          
          echo "org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties

      - name: 4. App Gradle (WITH KOTLIN KILLER FIX)
        run: |
          cat << 'EOF' > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.zeeshan.browser'
              compileSdk 34
              defaultConfig {
                  applicationId "com.zeeshan.browser"
                  minSdk 24
                  targetSdk 34
                  versionCode 3
                  versionName "3.0-Stable"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          
          // YEH HISSA DUPLICATE KOTLIN FILES KO BAHAR NIKAL DEGA
          configurations.all {
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
          }
          
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core-ktx:1.10.1'
          }
          EOF

      - name: 5. Manifest
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <application android:label="Z+2 Browser" android:theme="@style/Theme.AppCompat.Light.NoActionBar" android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true" android:configChanges="orientation|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 6. MainActivity
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/browser/MainActivity.java
          package com.zeeshan.browser;
          import android.Manifest;
          import android.app.DownloadManager;
          import android.content.pm.PackageManager;
          import android.graphics.Color;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Environment;
          import android.view.View;
          import android.webkit.*;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import java.io.ByteArrayInputStream;
          
          public class MainActivity extends AppCompatActivity {
              private WebView webView;
              private ProgressBar progressBar;
              private EditText urlBar;
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      if (ContextCompat.checkSelfPermission(this, Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) {
                          ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.POST_NOTIFICATIONS}, 101);
                      }
                  }
                  
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setBackgroundColor(Color.parseColor("#121212"));
                  
                  LinearLayout toolbar = new LinearLayout(this);
                  urlBar = new EditText(this);
                  urlBar.setHint("Search Google...");
                  urlBar.setTextColor(Color.WHITE);
                  urlBar.setHintTextColor(Color.GRAY);
                  urlBar.setLayoutParams(new LinearLayout.LayoutParams(0, -2, 1));
                  
                  Button btnGo = new Button(this);
                  btnGo.setText("GO");
                  btnGo.setBackgroundColor(Color.parseColor("#008CBA"));
                  btnGo.setTextColor(Color.WHITE);
                  
                  toolbar.addView(urlBar);
                  toolbar.addView(btnGo);
                  
                  progressBar = new ProgressBar(this, null, android.R.attr.progressBarStyleHorizontal);
                  progressBar.setMax(100);
                  progressBar.setVisibility(View.GONE);
                  
                  webView = new WebView(this);
                  webView.setLayoutParams(new LinearLayout.LayoutParams(-1, -1));
                  
                  root.addView(toolbar);
                  root.addView(progressBar);
                  root.addView(webView);
                  setContentView(root);
                  
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  
                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onProgressChanged(WebView view, int newProgress) {
                          if (newProgress < 100) {
                              progressBar.setVisibility(View.VISIBLE);
                              progressBar.setProgress(newProgress);
                          } else {
                              progressBar.setVisibility(View.GONE);
                          }
                      }
                  });
                  
                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public WebResourceResponse shouldInterceptRequest(WebView view, WebResourceRequest request) {
                          String url = request.getUrl().toString().toLowerCase();
                          if (url.contains("ads") || url.contains("banner") || url.contains("popunder")) {
                              return new WebResourceResponse("text/plain", "UTF-8", new ByteArrayInputStream("".getBytes()));
                          }
                          return super.shouldInterceptRequest(view, request);
                      }
                      @Override
                      public void onPageFinished(WebView view, String url) {
                          urlBar.setText(url);
                      }
                  });
                  
                  webView.setDownloadListener((url, userAgent, contentDisposition, mimetype, contentLength) -> {
                      try {
                          DownloadManager.Request request = new DownloadManager.Request(Uri.parse(url));
                          request.setMimeType(mimetype);
                          String fileName = URLUtil.guessFileName(url, contentDisposition, mimetype);
                          request.setTitle(fileName);
                          request.setDescription("Z+2 Downloading...");
                          request.setNotificationVisibility(DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED);
                          request.setDestinationInExternalPublicDir(Environment.DIRECTORY_DOWNLOADS, fileName);
                          DownloadManager dm = (DownloadManager) getSystemService(DOWNLOAD_SERVICE);
                          dm.enqueue(request);
                          Toast.makeText(MainActivity.this, "Download Shuru Hua...", Toast.LENGTH_LONG).show();
                      } catch (Exception e) {
                          Toast.makeText(MainActivity.this, "Error: " + e.getMessage(), Toast.LENGTH_SHORT).show();
                      }
                  });
                  
                  btnGo.setOnClickListener(v -> {
                      String url = urlBar.getText().toString();
                      if(!url.startsWith("http")) url = "https://www.google.com/search?q=" + url;
                      webView.loadUrl(url);
                  });
                  
                  webView.loadUrl("https://www.google.com");
              }
              
              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) webView.goBack();
                  else super.onBackPressed();
              }
          }
          EOF

      - name: 7. Build APK
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 8. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZPlus2-Turbo-Chrome
          path: app/build/outputs/apk/debug/*.apk
