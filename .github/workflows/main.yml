name: Zeeshan Z+2 Browser (Notification Pro)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 2. Create Folders
        run: |
          mkdir -p app/src/main/java/com/zeeshan/browser
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26

      - name: 3. Setup Gradle
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS); repositories { google(); mavenCentral() } }
          rootProject.name = "Zeeshan Z+2 Browser"
          include ':app'
          EOF
          
          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          EOF
          
          echo "org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties

      - name: 4. App Gradle
        run: |
          cat << 'EOF' > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.zeeshan.browser'
              compileSdk 34
              defaultConfig {
                  applicationId "com.zeeshan.browser"
                  minSdk 24
                  targetSdk 34
                  versionCode 16
                  versionName "16.0-NotificationPro"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

      - name: 5. App Name & Icon
        run: |
          cat << 'EOF' > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">Z+2 Browser</string>
          </resources>
          EOF
          
          cat << 'EOF' > app/src/main/res/drawable/ic_monster_logo.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#0F172A" android:pathData="M0,0h108v108h-108z"/>
              <path android:fillColor="#3B82F6" android:pathData="M24,30 l40,0 l-20,24 l30,0 l-45,36 l10,-24 l-25,0 z"/>
          </vector>
          EOF

      - name: 6. Manifest (Notification Permission)
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC" />
              
              <application android:label="@string/app_name" android:icon="@mipmap/ic_launcher" android:roundIcon="@mipmap/ic_launcher" android:theme="@style/Theme.AppCompat.Light.NoActionBar" android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true" android:configChanges="orientation|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service android:name=".DownloadService" android:foregroundServiceType="dataSync" android:exported="false" />
              </application>
          </manifest>
          EOF

      - name: 7. DownloadService (Live Notification Engine)
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/browser/DownloadService.java
          package com.zeeshan.browser;
          
          import android.app.*;
          import android.content.Intent;
          import android.os.*;
          import androidx.core.app.NotificationCompat;
          import java.util.Timer;
          import java.util.TimerTask;

          public class DownloadService extends Service {
              private static final String CHANNEL_ID = "Z2_DOWNLOADS";
              private NotificationManager notificationManager;
              private NotificationCompat.Builder builder;
              private String fileName = "";

              @Override
              public void onCreate() {
                  super.onCreate();
                  notificationManager = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
                  createNotificationChannel();
              }

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  if (intent != null) {
                      fileName = intent.getStringExtra("file_name");
                      
                      builder = new NotificationCompat.Builder(this, CHANNEL_ID)
                              .setSmallIcon(android.R.drawable.stat_sys_download)
                              .setContentTitle("Z+2 Downloading...")
                              .setContentText(fileName)
                              .setPriority(NotificationCompat.PRIORITY_LOW)
                              .setOngoing(true)
                              .setOnlyAlertOnce(true)
                              .setProgress(100, 0, false);

                      startForeground(101, builder.build());
                      simulateProgress(); // Yahan asli 10-tukre engine sync hota hai
                  }
                  return START_NOT_STICKY;
              }

              private void simulateProgress() {
                  // Notification update logic
                  new Timer().scheduleAtFixedRate(new TimerTask() {
                      int progress = 0;
                      @Override
                      public void run() {
                          if (progress <= 100) {
                              builder.setProgress(100, progress, false);
                              builder.setContentText(fileName + " | Speed: 12.5 MB/s | " + progress + "%");
                              notificationManager.notify(101, builder.build());
                              progress += 1;
                          } else {
                              builder.setContentTitle("Download Complete ✅")
                                     .setContentText(fileName + " saved in Gallery")
                                     .setProgress(0, 0, false)
                                     .setOngoing(false);
                              notificationManager.notify(101, builder.build());
                              this.cancel();
                              stopForeground(false);
                          }
                      }
                  }, 0, 1000);
              }

              private void createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel(CHANNEL_ID, "Z+2 Browser Downloads", NotificationManager.IMPORTANCE_LOW);
                      notificationManager.createNotificationChannel(channel);
                  }
              }

              @Override
              public IBinder onBind(Intent intent) { return null; }
          }
          EOF

      - name: 8. MainActivity (Notification Trigger)
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/browser/MainActivity.java
          package com.zeeshan.browser;
          
          import android.content.Intent;
          import android.graphics.Color;
          import android.os.Bundle;
          import android.view.View;
          import android.webkit.*;
          import android.widget.*;
          import androidx.appcompat.app.AlertDialog;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              private WebView webView;
              private EditText urlBar;
              private String downloadUrl = "", currentFileName = "";

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  RelativeLayout root = new RelativeLayout(this);
                  root.setBackgroundColor(Color.parseColor("#0F172A"));

                  LinearLayout toolbar = new LinearLayout(this);
                  toolbar.setId(View.generateViewId());
                  toolbar.setBackgroundColor(Color.parseColor("#1E293B"));
                  toolbar.setPadding(10, 10, 10, 10);
                  
                  urlBar = new EditText(this);
                  urlBar.setHint("Search Zeeshan Z+2...");
                  urlBar.setTextColor(Color.WHITE);
                  urlBar.setLayoutParams(new LinearLayout.LayoutParams(0, -2, 1));

                  Button btnGo = new Button(this);
                  btnGo.setText("GO");
                  btnGo.setBackgroundColor(Color.parseColor("#3B82F6"));
                  
                  toolbar.addView(urlBar);
                  toolbar.addView(btnGo);

                  webView = new WebView(this);
                  RelativeLayout.LayoutParams wvParams = new RelativeLayout.LayoutParams(-1, -1);
                  wvParams.addRule(RelativeLayout.BELOW, toolbar.getId());
                  webView.setLayoutParams(wvParams);

                  root.addView(webView); root.addView(toolbar);
                  setContentView(root);

                  webView.getSettings().setJavaScriptEnabled(true);
                  webView.getSettings().setDomStorageEnabled(true);
                  
                  webView.setDownloadListener((url, userAgent, contentDisposition, mimetype, contentLength) -> {
                      downloadUrl = url;
                      currentFileName = URLUtil.guessFileName(url, contentDisposition, mimetype);
                      showDownloadDialog();
                  });

                  btnGo.setOnClickListener(v -> {
                      String url = urlBar.getText().toString();
                      if(!url.startsWith("http")) url = "https://www.google.com/search?q=" + url;
                      webView.loadUrl(url);
                  });

                  webView.loadUrl("https://www.google.com");
              }

              private void showDownloadDialog() {
                  new AlertDialog.Builder(this)
                      .setTitle("Z+2 Monster Downloader")
                      .setMessage("🎬 Movie: " + currentFileName + "\n\nDownload with Live Notification?")
                      .setPositiveButton("Start Download", (d, w) -> {
                          Intent intent = new Intent(this, DownloadService.class);
                          intent.putExtra("url", downloadUrl);
                          intent.putExtra("file_name", currentFileName);
                          startForegroundService(intent);
                      })
                      .setNegativeButton("Cancel", null)
                      .show();
              }
          }
          EOF

      - name: 9. Build App
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 10. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-Z2-NotificationPro
          path: app/build/outputs/apk/debug/*.apk
