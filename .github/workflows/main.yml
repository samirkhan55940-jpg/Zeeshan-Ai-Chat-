name: Build Zeeshan Husain Smile (NH Master Wikipedia Edition)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Setup Virtual RAM (8GB Swap Fix)
        run: |
          sudo fallocate -l 8G /mnt/swapfile2
          sudo chmod 600 /mnt/swapfile2
          sudo mkswap /mnt/swapfile2
          sudo swapon /mnt/swapfile2

      - name: 4. Create Folders
        run: |
          mkdir -p app/src/main/java/com/zeeshan/smile
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/res/values

      - name: 5. Gradle Setup (Jo pichli baar chhut gaya tha)
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS); repositories { google(); mavenCentral() } }
          rootProject.name = 'Zeeshan-Smile-AI'
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          plugins { id 'com.android.application' version '8.2.0' apply false }
          EOF

      - name: 6. Download Stable Arabi Jan Engine
        run: |
          wget -q https://github.com/ggerganov/llama.cpp/archive/refs/tags/b2400.zip -O llama.zip
          unzip -q llama.zip
          find . -maxdepth 1 -name "llama.cpp-*" -exec mv {} app/src/main/cpp/llama \;

      - name: 7. Connect NH Engine (Correction & History Logic)
        run: |
          cat << 'EOF' > app/src/main/cpp/native-lib.cpp
          #include <jni.h>
          #include <string>
          #include <vector>
          #include "llama.h"

          extern "C" JNIEXPORT jstring JNICALL
          Java_com_zeeshan_smile_MainActivity_processOfflineAI(JNIEnv* env, jobject, jstring input, jstring modelPath) {
              const char *prompt = env->GetStringUTFChars(input, 0);
              const char *path = env->GetStringUTFChars(modelPath, 0);
              
              llama_backend_init();
              llama_model_params model_params = llama_model_default_params();
              model_params.use_mmap = true; 
              
              llama_model * model = llama_load_model_from_file(path, model_params);
              if (model == NULL) return env->NewStringUTF("Error: Engine Load Fail.");

              llama_context_params ctx_params = llama_context_default_params();
              ctx_params.n_ctx = 1024; 
              llama_context * ctx = llama_new_context_with_model(model, ctx_params);

              std::string response = "";
              std::vector<llama_token> tokens(1024);
              int n_tokens = llama_tokenize(model, prompt, strlen(prompt), tokens.data(), tokens.size(), true, true);
              
              if (n_tokens > 0) {
                  llama_batch batch = llama_batch_get_one(tokens.data(), n_tokens, 0, 0);
                  if (llama_decode(ctx, batch) == 0) {
                      int n_vocab = llama_n_vocab(model);
                      for (int i = 0; i < 150; i++) { 
                          float * logits = llama_get_logits_ith(ctx, batch.n_tokens - 1);
                          llama_token new_token_id = 0;
                          float max_prob = -1e9f;
                          for (int j = 0; j < n_vocab; j++) {
                              if (logits[j] > max_prob) { max_prob = logits[j]; new_token_id = j; }
                          }
                          if (llama_token_is_eog(model, new_token_id)) break;
                          char buf[128];
                          int n_chars = llama_token_to_piece(model, new_token_id, buf, sizeof(buf), 0, true);
                          if (n_chars > 0) response += std::string(buf, n_chars);
                          batch = llama_batch_get_one(&new_token_id, 1, n_tokens + i, 0);
                          if (llama_decode(ctx, batch) != 0) break;
                      }
                  }
              }
              llama_free(ctx);
              llama_free_model(model);
              llama_backend_free();
              env->ReleaseStringUTFChars(input, prompt);
              env->ReleaseStringUTFChars(modelPath, path);
              return env->NewStringUTF(response.c_str());
          }
          EOF

          cat << 'EOF' > app/src/main/cpp/CMakeLists.txt
          cmake_minimum_required(VERSION 3.22.1)
          project("z_engine")
          set(LLAMA_BUILD_TESTS OFF CACHE BOOL "" FORCE)
          set(LLAMA_BUILD_EXAMPLES OFF CACHE BOOL "" FORCE)
          set(GGML_OPENMP OFF CACHE BOOL "" FORCE)
          add_subdirectory(llama)
          add_library(z_engine SHARED native-lib.cpp)
          target_include_directories(z_engine PRIVATE llama/include llama llama/ggml/include)
          target_link_libraries(z_engine llama log)
          EOF

      - name: 8. Build WhatsApp UI & Smart Logic
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/smile/MainActivity.java
          package com.zeeshan.smile;

          import android.Manifest;
          import android.content.SharedPreferences;
          import android.graphics.Color;
          import android.graphics.drawable.GradientDrawable;
          import android.os.Bundle;
          import android.speech.tts.TextToSpeech;
          import android.view.Gravity;
          import android.view.View;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import java.io.*;
          import java.net.URL;
          import java.util.Locale;

          public class MainActivity extends AppCompatActivity {
              static { System.loadLibrary("z_engine"); }
              public native String processOfflineAI(String input, String modelPath);

              private LinearLayout chatContainer;
              private ScrollView scrollView;
              private EditText inputEdit;
              private String modelPath;
              private TextToSpeech tts;
              private SharedPreferences history;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  history = getSharedPreferences("ZeeshanHistory", MODE_PRIVATE);
                  modelPath = new File(getFilesDir(), "z_brain.gguf").getAbsolutePath();
                  
                  setupWhatsAppUI();
                  
                  tts = new TextToSpeech(this, status -> {
                      if(status == TextToSpeech.SUCCESS) tts.setLanguage(new Locale("hi", "IN"));
                  });

                  if (!new File(modelPath).exists()) downloadModel();
                  else addMessage("Zeeshan AI: Welcome back! System ready.", false);
              }

              private void setupWhatsAppUI() {
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setBackgroundColor(Color.parseColor("#121B22"));

                  TextView header = new TextView(this);
                  header.setText("Zeeshan Husain Smile AI");
                  header.setTextColor(Color.WHITE);
                  header.setBackgroundColor(Color.parseColor("#075E54"));
                  header.setPadding(40, 40, 40, 40);
                  header.setTextSize(20);
                  root.addView(header);

                  scrollView = new ScrollView(this);
                  scrollView.setLayoutParams(new LinearLayout.LayoutParams(-1, 0, 1f));
                  chatContainer = new LinearLayout(this);
                  chatContainer.setOrientation(LinearLayout.VERTICAL);
                  chatContainer.setPadding(20, 20, 20, 20);
                  scrollView.addView(chatContainer);
                  root.addView(scrollView);

                  LinearLayout inputBar = new LinearLayout(this);
                  inputBar.setPadding(20, 20, 20, 20);
                  inputBar.setBackgroundColor(Color.parseColor("#1F2C34"));

                  inputEdit = new EditText(this);
                  inputEdit.setHint("Write or correct here...");
                  inputEdit.setHintTextColor(Color.GRAY);
                  inputEdit.setTextColor(Color.WHITE);
                  inputEdit.setLayoutParams(new LinearLayout.LayoutParams(0, -2, 1f));
                  inputBar.addView(inputEdit);

                  Button sendBtn = new Button(this);
                  sendBtn.setText("➤");
                  sendBtn.setTextColor(Color.WHITE);
                  sendBtn.setBackgroundColor(Color.parseColor("#00A884"));
                  sendBtn.setOnClickListener(v -> sendMessage());
                  inputBar.addView(sendBtn);

                  root.addView(inputBar);
                  setContentView(root);
              }

              private void sendMessage() {
                  String text = inputEdit.getText().toString();
                  if (text.isEmpty()) return;
                  addMessage(text, true);
                  inputEdit.setText("");
                  
                  new Thread(() -> {
                      if(text.toLowerCase().contains("correct answer is")) {
                          String key = text.split("correct answer is")[0].trim();
                          String value = text.split("correct answer is")[1].trim();
                          history.edit().putString(key, value).apply();
                          runOnUiThread(() -> addMessage("System: Correction saved for Arabi Jan Engine.", false));
                          return;
                      }

                      String savedResponse = history.getString(text, null);
                      String finalResponse = (savedResponse != null) ? "Saved: " + savedResponse : processOfflineAI(text, modelPath);

                      runOnUiThread(() -> {
                          addMessage(finalResponse, false);
                          tts.speak(finalResponse, TextToSpeech.QUEUE_FLUSH, null, null);
                      });
                  }).start();
              }

              private void addMessage(String text, boolean isUser) {
                  TextView tv = new TextView(this);
                  tv.setText(text);
                  tv.setTextColor(Color.WHITE);
                  tv.setPadding(30, 20, 30, 20);
                  LinearLayout.LayoutParams params = new LinearLayout.LayoutParams(-2, -2);
                  params.setMargins(0, 10, 0, 10);
                  GradientDrawable gd = new GradientDrawable();
                  gd.setCornerRadius(20);
                  if (isUser) {
                      gd.setColor(Color.parseColor("#005C4B"));
                      params.gravity = Gravity.END;
                  } else {
                      gd.setColor(Color.parseColor("#202C33"));
                      params.gravity = Gravity.START;
                  }
                  tv.setBackground(gd);
                  tv.setLayoutParams(params);
                  chatContainer.addView(tv);
                  scrollView.post(() -> scrollView.fullScroll(View.FOCUS_DOWN));
              }

              private void downloadModel() {
                  new Thread(() -> {
                      try {
                          addMessage("System: Downloading 300MB Wikipedia Brain...", false);
                          InputStream in = new URL("https://huggingface.co/Qwen/Qwen1.5-0.5B-Chat-GGUF/resolve/main/qwen1_5-0_5b-chat-q4_k_m.gguf").openStream();
                          OutputStream out = new FileOutputStream(modelPath);
                          byte[] buffer = new byte[8192];
                          int bytesRead;
                          while ((bytesRead = in.read(buffer)) != -1) out.write(buffer, 0, bytesRead);
                          out.close(); in.close();
                          runOnUiThread(() -> addMessage("System: Brain Locked. Enjoy Offline AI!", false));
                      } catch (Exception e) { e.printStackTrace(); }
                  }).start();
              }
          }
          EOF

      - name: 9. Setup Build Configuration
        run: |
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.zeeshan.smile'
              compileSdk 34
              defaultConfig {
                  applicationId "com.zeeshan.smile"
                  minSdk 24
                  targetSdk 34
                  versionCode 18
                  versionName "18.0-Flawless-Master"
                  ndk { abiFilters 'arm64-v8a' }
                  externalNativeBuild { cmake { arguments "-j1" } }
              }
              externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt" } }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.zeeshan.smile">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <application android:label="Zeeshan Smile" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat << 'EOF' > gradle.properties
          org.gradle.jvmargs=-Xmx3g
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

      - name: 10. Build Master APK
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: 11. Upload Final Master APK
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-Husain-Smile-NH-Wikipedia
          path: app/build/outputs/apk/debug/*.apk
