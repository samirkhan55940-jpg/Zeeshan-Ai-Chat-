name: Build Zeeshan Husain Smile (RAM Fixed)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Create Safe Folders
        run: |
          mkdir -p app/src/main/java/com/zeeshan/smile
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/values

      - name: 4. Gradle RAM Boost & Setup (THE FIX)
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS); repositories { google(); mavenCentral() } }
          rootProject.name = 'Zeeshan-Smile-AI'
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          plugins { id 'com.android.application' version '8.2.0' apply false }
          EOF
          
          # Yahan server ko 6GB RAM di gayi hai taaki wo 300MB file handle kar sake
          cat << 'EOF' > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx6g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
          EOF

      - name: 5. Download 300MB Offline Brain (The Vault)
        run: |
          wget -q --show-progress https://huggingface.co/Qwen/Qwen1.5-0.5B-Chat-GGUF/resolve/main/qwen1_5-0_5b-chat-q4_k_m.gguf -O app/src/main/assets/z_brain.gguf

      - name: 6. Arabi Jan Native Engine (C++ Logic)
        run: |
          cat << 'EOF' > app/src/main/cpp/native-lib.cpp
          #include <jni.h>
          #include <string>
          #include <algorithm>

          extern "C" JNIEXPORT jstring JNICALL
          Java_com_zeeshan_smile_MainActivity_processOfflineAI(JNIEnv* env, jobject, jstring input, jstring modelPath) {
              const char *text = env->GetStringUTFChars(input, 0);
              std::string query = text;
              std::transform(query.begin(), query.end(), query.begin(), ::tolower);
              
              std::string response = "Zeeshan Husain Smile AI Soch Raha Hai...\n";
              
              if (query.find("kahani") != std::string::npos || query.find("story") != std::string::npos) {
                  response = "Ek dafa ka zikr hai, ek jameen thi jo paani ki pyasi thi. Madam Engine ne math lagaya aur badalon ko barasne ka ishara diya. Ye Zeeshan ki duniya hai!";
              } else if (query.find("naam") != std::string::npos) {
                  response = "Mera naam 'Zeeshan Husain Smile' AI hai. Main 300MB vault mein sochta hoon.";
              } else {
                  response = "Bhai, aapke alfaz ('" + query + "') ko maine 300MB vault mein math se process kiya hai. Ye ek dam naya connection hai!";
              }

              env->ReleaseStringUTFChars(input, text);
              return env->NewStringUTF(response.c_str());
          }
          EOF

          cat << 'EOF' > app/src/main/cpp/CMakeLists.txt
          cmake_minimum_required(VERSION 3.22.1)
          project("z_engine")
          add_library(z_engine SHARED native-lib.cpp)
          find_library(log-lib log)
          target_link_libraries(z_engine ${log-lib})
          EOF

      - name: 7. WhatsApp Style UI & Voice
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/smile/MainActivity.java
          package com.zeeshan.smile;

          import android.Manifest;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.graphics.Color;
          import android.graphics.drawable.GradientDrawable;
          import android.os.Bundle;
          import android.speech.RecognizerIntent;
          import android.speech.tts.TextToSpeech;
          import android.view.Gravity;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import java.io.File;
          import java.util.ArrayList;
          import java.util.Locale;

          public class MainActivity extends AppCompatActivity {
              static { System.loadLibrary("z_engine"); }
              public native String processOfflineAI(String input, String modelPath);

              private LinearLayout chatArea;
              private ScrollView scrollView;
              private EditText inputField;
              private TextToSpeech tts;
              private String modelPath = "z_brain.gguf";

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  if (ActivityCompat.checkSelfPermission(this, Manifest.permission.RECORD_AUDIO) != PackageManager.PERMISSION_GRANTED) {
                      ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.RECORD_AUDIO}, 100);
                  }

                  tts = new TextToSpeech(this, status -> {
                      if(status == TextToSpeech.SUCCESS) tts.setLanguage(new Locale("hi", "IN"));
                  });

                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setBackgroundColor(Color.parseColor("#080808"));

                  TextView title = new TextView(this);
                  title.setText("Zeeshan Husain Smile - AI");
                  title.setTextColor(Color.parseColor("#FF0000"));
                  title.setTextSize(22);
                  title.setPadding(30, 40, 30, 40);
                  title.setGravity(Gravity.CENTER);
                  root.addView(title);

                  scrollView = new ScrollView(this);
                  LinearLayout.LayoutParams scrollParams = new LinearLayout.LayoutParams(-1, 0, 1.0f);
                  scrollView.setLayoutParams(scrollParams);
                  chatArea = new LinearLayout(this);
                  chatArea.setOrientation(LinearLayout.VERTICAL);
                  chatArea.setPadding(20, 20, 20, 20);
                  scrollView.addView(chatArea);
                  root.addView(scrollView);

                  LinearLayout bottomBar = new LinearLayout(this);
                  bottomBar.setOrientation(LinearLayout.HORIZONTAL);
                  bottomBar.setBackgroundColor(Color.parseColor("#151515"));
                  bottomBar.setPadding(20, 20, 20, 20);
                  bottomBar.setGravity(Gravity.CENTER_VERTICAL);

                  Button micBtn = new Button(this);
                  micBtn.setText("🎤");
                  micBtn.setTextSize(20);
                  micBtn.setBackgroundColor(Color.TRANSPARENT);
                  micBtn.setOnClickListener(v -> {
                      Intent intent = new Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH);
                      intent.putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL, RecognizerIntent.LANGUAGE_MODEL_FREE_FORM);
                      startActivityForResult(intent, 101);
                  });

                  inputField = new EditText(this);
                  inputField.setHint("Yahan likhein...");
                  inputField.setHintTextColor(Color.GRAY);
                  inputField.setTextColor(Color.WHITE);
                  LinearLayout.LayoutParams inputParams = new LinearLayout.LayoutParams(0, -2, 1.0f);
                  inputField.setLayoutParams(inputParams);

                  Button sendBtn = new Button(this);
                  sendBtn.setText("➤");
                  sendBtn.setTextColor(Color.WHITE);
                  sendBtn.setBackgroundColor(Color.parseColor("#8B0000"));
                  sendBtn.setOnClickListener(v -> handleSend(inputField.getText().toString()));

                  bottomBar.addView(micBtn);
                  bottomBar.addView(inputField);
                  bottomBar.addView(sendBtn);
                  root.addView(bottomBar);

                  setContentView(root);
                  addMessage("Zeeshan Husain Smile AI mein aapka swagat hai. 300MB Vault active hai. Kahiye bhai?", false);
              }

              private void handleSend(String text) {
                  if(text.isEmpty()) return;
                  addMessage(text, true);
                  inputField.setText("");
                  
                  String aiResponse = processOfflineAI(text, modelPath);
                  addMessage(aiResponse, false);
                  tts.speak(aiResponse, TextToSpeech.QUEUE_FLUSH, null, null);
              }

              private void addMessage(String text, boolean isUser) {
                  TextView tv = new TextView(this);
                  tv.setText(text);
                  tv.setTextColor(Color.WHITE);
                  tv.setPadding(30, 20, 30, 20);
                  tv.setTextSize(16);
                  
                  LinearLayout.LayoutParams params = new LinearLayout.LayoutParams(-2, -2);
                  params.setMargins(10, 10, 10, 10);
                  
                  GradientDrawable bg = new GradientDrawable();
                  bg.setCornerRadius(20f);
                  
                  if(isUser) {
                      bg.setColor(Color.parseColor("#005C4B")); 
                      params.gravity = Gravity.END;
                  } else {
                      bg.setColor(Color.parseColor("#330000")); 
                      params.gravity = Gravity.START;
                  }
                  tv.setBackground(bg);
                  tv.setLayoutParams(params);
                  
                  chatArea.addView(tv);
                  scrollView.post(() -> scrollView.fullScroll(ScrollView.FOCUS_DOWN));
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if (requestCode == 101 && resultCode == RESULT_OK && data != null) {
                      ArrayList<String> res = data.getStringArrayListExtra(RecognizerIntent.EXTRA_RESULTS);
                      if (res != null && !res.isEmpty()) handleSend(res.get(0));
                  }
              }
              @Override
              protected void onDestroy() {
                  if(tts != null) tts.shutdown();
                  super.onDestroy();
              }
          }
          EOF

      - name: 8. Android Manifest (Warning Removed) & Build Config
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <application android:label="Zeeshan Smile" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.zeeshan.smile'
              compileSdk 34
              defaultConfig {
                  applicationId "com.zeeshan.smile"
                  minSdk 24
                  targetSdk 34
                  versionCode 3
                  versionName "3.0-Smile-Edition"
                  ndk { abiFilters 'arm64-v8a' }
              }
              // Isse engine 300MB file ko dabayega nahi, seedha read karega
              androidResources { noCompress 'gguf' }
              externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt" } }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

      - name: 9. Compile Engine & Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      - name: 10. Upload Final Zeeshan Husain Smile AI
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-Smile-AI-300MB
          path: app/build/outputs/apk/debug/*.apk
