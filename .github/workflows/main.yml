name: "Build Z-Atomic Caller (VIP Edition)"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "1. Checkout Code"
        uses: actions/checkout@v4

      - name: "2. Set up JDK 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: "3. Create App Directories"
        run: |
          mkdir -p app/src/main/java/com/zatomic/caller
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/assets

      - name: "4. Initialize Gradle System"
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = "ZAtomicCaller"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          plugins { id 'com.android.application' version '8.3.0' apply false }
          EOF

          cat << 'EOF' > gradle.properties
          org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          EOF
          
          gradle wrapper --gradle-version 8.4

      - name: "5. Android Config & AI Dependencies (Fixed JNA Bug)"
        run: |
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.zatomic.caller'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.zatomic.caller'
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0-VIP-Atomic"
              }
              buildTypes {
                  release {
                      minifyEnabled true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              
              // Google ML Kit Vision (Camera Number Scanner)
              implementation 'com.google.android.gms:play-services-mlkit-text-recognition:19.0.0'
              
              // Vosk Offline Voice Engine (JNA Bug Fixed: removed @aar)
              implementation 'net.java.dev.jna:jna:5.13.0'
              implementation 'com.alphacep:vosk-android:0.3.38@aar'
          }
          EOF

      - name: "6. Download Vosk Offline Model"
        run: |
          wget https://alphacephei.com/vosk/models/vosk-model-small-en-in-0.4.zip
          unzip vosk-model-small-en-in-0.4.zip
          mv vosk-model-small-en-in-0.4 app/src/main/assets/model

      - name: "7. App Resources & UI (VIP Clean Screen)"
        run: |
          cat << 'EOF' > app/src/main/res/values/colors.xml
          <resources>
              <color name="bg_dark">#050A0E</color>
              <color name="btn_bg">#121B22</color>
              <color name="text_white">#FFFFFF</color>
              <color name="accent_gold">#FFD700</color>
              <color name="accent_green">#00A884</color>
          </resources>
          EOF

          cat << 'EOF' > app/src/main/res/drawable/bg_round_btn.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="@color/btn_bg"/>
              <corners android:radius="20dp"/>
              <stroke android:width="1dp" android:color="#2A3942"/>
          </shape>
          EOF

          cat << 'EOF' > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#050A0E" android:pathData="M0,0h108v108h-108z"/>
              <path android:fillColor="#00A884" android:pathData="M24,24 h60 a12,12 0 0,1 12,12 v40 a12,12 0 0,1 -12,12 h-10 l-14,14 l-6,-14 h-30 a12,12 0 0,1 -12,-12 v-40 a12,12 0 0,1 12,-12 z"/>
          </vector>
          EOF

          cat << 'EOF' > app/src/main/res/layout/activity_main.xml
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="@color/bg_dark">

              <!-- VIP Center Logo -->
              <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_centerInParent="true" android:orientation="vertical" android:gravity="center">
                  <TextView android:layout_width="100dp" android:layout_height="100dp" android:text="Z" android:textColor="@color/accent_green" android:textSize="70sp" android:textStyle="bold" android:gravity="center" android:background="@drawable/bg_round_btn"/>
                  <TextView android:id="@+id/tv_status" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="System Standby" android:textColor="#8696A0" android:textSize="16sp" android:layout_marginTop="15dp"/>
                  <TextView android:id="@+id/tv_wake_word" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Voice Lock: Not Set" android:textColor="@color/accent_gold" android:textSize="14sp" android:layout_marginTop="5dp"/>
              </LinearLayout>

              <!-- The 3 Master Buttons -->
              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:layout_alignParentBottom="true" android:orientation="horizontal" android:weightSum="3" android:padding="15dp" android:background="#0A1014">
                  
                  <LinearLayout android:id="@+id/btn_voice_lock" android:layout_width="0dp" android:layout_height="80dp" android:layout_weight="1" android:orientation="vertical" android:gravity="center" android:background="?attr/selectableItemBackground" android:clickable="true">
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="🎙️" android:textSize="28sp"/>
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Voice Lock" android:textColor="@color/text_white" android:textSize="12sp" android:textStyle="bold" android:layout_marginTop="5dp"/>
                  </LinearLayout>

                  <LinearLayout android:id="@+id/btn_scan_cam" android:layout_width="0dp" android:layout_height="80dp" android:layout_weight="1" android:orientation="vertical" android:gravity="center" android:background="?attr/selectableItemBackground" android:clickable="true">
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="📸" android:textSize="28sp"/>
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Scan Number" android:textColor="@color/text_white" android:textSize="12sp" android:textStyle="bold" android:layout_marginTop="5dp"/>
                  </LinearLayout>

                  <LinearLayout android:id="@+id/btn_radar_sync" android:layout_width="0dp" android:layout_height="80dp" android:layout_weight="1" android:orientation="vertical" android:gravity="center" android:background="?attr/selectableItemBackground" android:clickable="true">
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="🔄" android:textSize="28sp"/>
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Smart Radar" android:textColor="@color/text_white" android:textSize="12sp" android:textStyle="bold" android:layout_marginTop="5dp"/>
                  </LinearLayout>

              </LinearLayout>
          </RelativeLayout>
          EOF

      - name: "8. AndroidManifest.xml (Fixed Camera Security Bug)"
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-feature android:name="android.hardware.camera" android:required="false" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.READ_CONTACTS" />
              <uses-permission android:name="android.permission.CALL_PHONE" />
              
              <!-- Android 11+ Camera Visibility Fix -->
              <queries>
                  <intent>
                      <action android:name="android.media.action.IMAGE_CAPTURE" />
                  </intent>
              </queries>

              <application android:label="Z-Atomic Caller" android:icon="@mipmap/ic_launcher" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: "9. Java Code: MainActivity"
        run: |
          cat << 'EOF' > app/src/main/java/com/zatomic/caller/MainActivity.java
          package com.zatomic.caller;

          import android.Manifest;
          import android.app.AlertDialog;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.content.pm.PackageManager;
          import android.database.Cursor;
          import android.graphics.Bitmap;
          import android.net.Uri;
          import android.os.Bundle;
          import android.provider.ContactsContract;
          import android.provider.MediaStore;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import android.widget.Toast;

          import androidx.annotation.Nullable;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;

          import com.google.mlkit.vision.common.InputImage;
          import com.google.mlkit.vision.text.TextRecognition;
          import com.google.mlkit.vision.text.TextRecognizer;
          import com.google.mlkit.vision.text.latin.TextRecognizerOptions;

          import org.json.JSONObject;
          import org.vosk.Model;
          import org.vosk.Recognizer;
          import org.vosk.android.RecognitionListener;
          import org.vosk.android.SpeechService;
          import org.vosk.android.StorageService;

          import java.util.HashMap;
          import java.util.Map;
          import java.util.regex.Matcher;
          import java.util.regex.Pattern;

          public class MainActivity extends AppCompatActivity implements RecognitionListener {

              private TextView tvStatus, tvWakeWord;
              private LinearLayout btnVoiceLock, btnScanCam, btnRadarSync;
              
              private HashMap<String, String> contactsMap = new HashMap<>();
              private SharedPreferences prefs;
              
              private Model voskModel;
              private SpeechService speechService;
              private boolean isListening = false;
              private boolean isTrainingMode = false;
              
              private static final int REQUEST_IMAGE_CAPTURE = 101;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  prefs = getSharedPreferences("Z_ATOMIC_PREFS", MODE_PRIVATE);

                  tvStatus = findViewById(R.id.tv_status);
                  tvWakeWord = findViewById(R.id.tv_wake_word);
                  btnVoiceLock = findViewById(R.id.btn_voice_lock);
                  btnScanCam = findViewById(R.id.btn_scan_cam);
                  btnRadarSync = findViewById(R.id.btn_radar_sync);

                  String savedWord = prefs.getString("wake_word", "");
                  if(!savedWord.isEmpty()) {
                      tvWakeWord.setText("Voice Lock: [" + savedWord.toUpperCase() + "]");
                  }

                  requestAppPermissions();

                  btnVoiceLock.setOnClickListener(v -> {
                      AlertDialog.Builder builder = new AlertDialog.Builder(this);
                      builder.setTitle("Set Voice Lock Password");
                      builder.setMessage("Bhai, apna secret naam ya password boliye. Jab main beep karu tab bolna shuru karein.");
                      builder.setPositiveButton("Start Recording", (dialog, which) -> {
                          isTrainingMode = true;
                          tvStatus.setText("Listening for Password...");
                          tvStatus.setTextColor(0xFFFFD700);
                      });
                      builder.show();
                  });

                  btnScanCam.setOnClickListener(v -> {
                      Intent takePictureIntent = new Intent(MediaStore.ACTION_IMAGE_CAPTURE);
                      if (takePictureIntent.resolveActivity(getPackageManager()) != null) {
                          startActivityForResult(takePictureIntent, REQUEST_IMAGE_CAPTURE);
                      } else {
                          Toast.makeText(this, "Camera App blocked or not found!", Toast.LENGTH_SHORT).show();
                      }
                  });

                  btnRadarSync.setOnClickListener(v -> {
                      tvStatus.setText("Radar Active: Syncing Contacts...");
                      new Thread(() -> {
                          int count = syncLocalContacts();
                          runOnUiThread(() -> {
                              tvStatus.setText("Radar Complete: " + count + " VIPs Ready!");
                              Toast.makeText(this, "Contacts Updated!", Toast.LENGTH_SHORT).show();
                          });
                      }).start();
                  });

                  initVoskModel();
              }

              private void requestAppPermissions() {
                  String[] permissions = {Manifest.permission.RECORD_AUDIO, Manifest.permission.CAMERA, Manifest.permission.READ_CONTACTS, Manifest.permission.CALL_PHONE};
                  boolean needed = false;
                  for(String p : permissions) {
                      if(ContextCompat.checkSelfPermission(this, p) != PackageManager.PERMISSION_GRANTED) needed = true;
                  }
                  if(needed) ActivityCompat.requestPermissions(this, permissions, 1);
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, @Nullable Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if (requestCode == REQUEST_IMAGE_CAPTURE && resultCode == RESULT_OK && data != null) {
                      Bundle extras = data.getExtras();
                      Bitmap imageBitmap = (Bitmap) extras.get("data");
                      if(imageBitmap != null) {
                          processImageForNumber(imageBitmap);
                      }
                  }
              }

              private void processImageForNumber(Bitmap bitmap) {
                  tvStatus.setText("Scanning Image for Number...");
                  InputImage image = InputImage.fromBitmap(bitmap, 0);
                  TextRecognizer recognizer = TextRecognition.getClient(TextRecognizerOptions.DEFAULT_OPTIONS);
                  
                  recognizer.process(image)
                          .addOnSuccessListener(visionText -> {
                              String fullText = visionText.getText();
                              Pattern p = Pattern.compile("\\b\\d{10}\\b");
                              Matcher m = p.matcher(fullText.replaceAll("[\\s\\-\\(\\)]", ""));
                              if(m.find()) {
                                  String number = m.group();
                                  tvStatus.setText("Number Found: " + number);
                                  executeDirectCall(number);
                              } else {
                                  tvStatus.setText("No valid number found in image.");
                                  Toast.makeText(this, "Image mein number nahi mila bhai.", Toast.LENGTH_SHORT).show();
                              }
                          })
                          .addOnFailureListener(e -> tvStatus.setText("Scan Failed."));
              }

              private int syncLocalContacts() {
                  contactsMap.clear();
                  try {
                      Cursor cursor = getContentResolver().query(ContactsContract.CommonDataKinds.Phone.CONTENT_URI, null, null, null, null);
                      if (cursor != null) {
                          while (cursor.moveToNext()) {
                              int nameIndex = cursor.getColumnIndex(ContactsContract.CommonDataKinds.Phone.DISPLAY_NAME);
                              int numberIndex = cursor.getColumnIndex(ContactsContract.CommonDataKinds.Phone.NUMBER);
                              if (nameIndex != -1 && numberIndex != -1) {
                                  String name = cursor.getString(nameIndex).toLowerCase();
                                  String number = cursor.getString(numberIndex).replaceAll("[^0-9+]", "");
                                  contactsMap.put(name, number);
                              }
                          }
                          cursor.close();
                      }
                  } catch (Exception e) { e.printStackTrace(); }
                  return contactsMap.size();
              }

              private void initVoskModel() {
                  tvStatus.setText("Loading Offline Micro-Engine...");
                  StorageService.unpack(this, "model", "model",
                          (model) -> {
                              this.voskModel = model;
                              tvStatus.setText("System Ready. Listening...");
                              startBackgroundListening();
                          },
                          (exception) -> tvStatus.setText("Engine Load Failed: " + exception.getMessage()));
              }

              private void startBackgroundListening() {
                  if (speechService != null) {
                      speechService.stop();
                      speechService = null;
                  }
                  try {
                      Recognizer rec = new Recognizer(voskModel, 16000.0f);
                      speechService = new SpeechService(rec, 16000.0f);
                      speechService.startListening(this);
                      isListening = true;
                  } catch (Exception e) {}
              }

              @Override
              public void onResult(String hypothesis) {
                  try {
                      JSONObject obj = new JSONObject(hypothesis);
                      String spokenText = obj.getString("text").toLowerCase().trim();
                      if(spokenText.isEmpty()) return;

                      if (isTrainingMode) {
                          String newPassword = spokenText.split(" ")[0]; 
                          if(!newPassword.isEmpty() && newPassword.length() > 2) {
                              prefs.edit().putString("wake_word", newPassword).apply();
                              tvWakeWord.setText("Voice Lock: [" + newPassword.toUpperCase() + "]");
                              tvStatus.setText("Voice Lock Updated!");
                              isTrainingMode = false;
                          }
                          return;
                      }

                      String myLock = prefs.getString("wake_word", "").toLowerCase();
                      if (!myLock.isEmpty() && spokenText.contains(myLock)) {
                          
                          if(spokenText.contains("call") || spokenText.contains("phone")) {
                              String targetName = spokenText.replace(myLock, "").replace("call", "").replace("phone", "").replace("ko", "").replace("lagao", "").trim();
                              
                              String targetNumber = null;
                              for(Map.Entry<String, String> entry : contactsMap.entrySet()) {
                                  if(entry.getKey().contains(targetName) || targetName.contains(entry.getKey())) {
                                      targetNumber = entry.getValue();
                                      break;
                                  }
                              }
                              
                              if(targetNumber != null) {
                                  tvStatus.setText("Dialing " + targetName + "...");
                                  executeDirectCall(targetNumber);
                              } else {
                                  tvStatus.setText("Name not found in Radar.");
                              }
                          }
                      }
                  } catch(Exception e){}
              }

              private void executeDirectCall(String number) {
                  try {
                      Intent intent = new Intent(Intent.ACTION_CALL);
                      intent.setData(Uri.parse("tel:" + number));
                      startActivity(intent);
                  } catch (SecurityException e) {
                      Toast.makeText(this, "Call permission missing!", Toast.LENGTH_SHORT).show();
                  }
              }

              @Override public void onFinalResult(String h) { onResult(h); }
              @Override public void onPartialResult(String h) {}
              @Override public void onError(Exception e) { if(isListening) startBackgroundListening(); }
              @Override public void onTimeout() { if(isListening) startBackgroundListening(); }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  if (speechService != null) {
                      speechService.stop();
                      speechService.shutdown();
                  }
              }
          }
          EOF

      - name: "10. Build Z-Atomic APK"
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: "11. Upload App Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "Z-Atomic-Caller"
          path: app/build/outputs/apk/debug/app-debug.apk
